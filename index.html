      document.addEventListener("click", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;

        const { action, value, id, mode, status, roleId, moduleKey, permissionAction, entity } = target.dataset;
        if (action === "toggle-form-expanded") {
          const ent = target.dataset.entity || entity;
          if (!ent) return;
          const current = isFormSectionExpanded(ent, state.activeForm?.mode || "new");
          const nextMap = { ...(state.formExpanded || {}), [ent]: !current };
          setState({ formExpanded: nextMap });
          return;
        }

        switch (action) {
          case "toggle-sidebar":
            setState({ mobileNav: !state.mobileNav });
            return;
          case "close-sidebar":
            setState({ mobileNav: false }, { focusSelector: ".mobile-toggle" });
            return;
          case "toggle-sidebar-collapsed":
            setState({ sidebarCollapsed: !state.sidebarCollapsed });
            return;
          case "toggle-advanced-mode": {
            const next = !state.advancedMode;
            const patch = { advancedMode: next };
            if (!next) {
              const coreViews = ["dashboard", "leads", "creators", "chatting", "content", "tasks", "sops", "manual"];
              if (!coreViews.includes(state.view)) patch.view = "dashboard";
            }
            setState(patch);
            return;
          }
          case "set-view":
            if (!canView(value)) {
              return;
            }
            callModeStartTs = null;
            setState({
              view: value,
              mobileNav: false,
              activeSopId: null,
              activeForm: null,
              activeCreatorId: null,
              activeChatChannelId: null,
              activeCallLeadId: null,
              creatorComposer: null,
              channelComposer: null,
              channelEditingNoteId: null,
              creatorShowCompleted: false
            });
            return;
          case "set-funnel-range": {
            const nextRange = ["7d", "30d", "month", "custom"].includes(value) ? value : "7d";
            const patch = { funnelRange: nextRange };
            if (nextRange === "custom") {
              const defaultRange = getDashboardFunnelRange();
              patch.funnelStartDate = state.funnelStartDate || defaultRange.start;
              patch.funnelEndDate = state.funnelEndDate || defaultRange.end;
            }
            setState(patch, { focusSelector: `[data-action="set-funnel-range"][data-value="${nextRange}"]` });
            return;
          }
          case "set-leads-view":
            setState({ leadsView: value });
            return;
          case "lead-step-next":
          case "lead-step-prev": {
            if (!canPerformEntityAction("lead", "edit", id || "")) return;
            const lead = getEntityItem("lead", id || "");
            if (!lead) return;
            const nextStatus = action === "lead-step-next" ? getNextLeadStatus(lead.status) : getPrevLeadStatus(lead.status);
            if (!nextStatus) return;
            lead.status = nextStatus;
            lead.updated = formatDateTimeLabel();
            touchEntityItem(lead, `${getActorName()} cambio estado a ${LEAD_STATUS_LABELS[nextStatus] || nextStatus}`);
            queueSave();
            render({ focusSelector: `[data-action="${action}"][data-id="${id}"]` });
            return;
          }
          case "open-call-mode": {
            if (!canPerformEntityAction("lead", "edit", id || "")) return;
            const lead = getEntityItem("lead", id || "");
            if (!lead || (lead.status !== "call1" && lead.status !== "call2")) return;
            modalReturnFocusSelector = `[data-action="open-call-mode"][data-id="${id}"]`;
            callModeStartTs = Date.now();
            setState({
              activeSopId: null,
              activeForm: null,
              activeCreatorId: null,
              activeChatChannelId: null,
              activeCallLeadId: id,
              callDrawerPhase: "phase1"
            });
            return;
          }
          case "set-call-phase":
            setState({ callDrawerPhase: value || "phase1" });
            return;
          case "lead-step-next-from-call": {
            if (!canPerformEntityAction("lead", "edit", id || "")) return;
            const lead = getEntityItem("lead", id || "");
            if (!lead) return;
            const nextStatus = getNextLeadStatus(lead.status);

            setState({ contentTab: value });
            return;
          case "set-content-creator":

          case "set-content-type":

          case "open-form":
            const formIntent = mode === "edit" ? "edit" : "create";

            return;
          case "download-file": {
            if (!canPerformEntityAction(entity, "download", id || "")) {
              return;
            }
            const item = getEntityItem(entity, id);
            if (item?.fileData) {
              downloadStoredFile(item.fileName, item.fileData);
            }
            return;
          }
          case "delete-file": {
            if (!window.confirm("Quieres quitar este archivo adjunto?")) return;
            if (deleteStoredFile(entity, id)) {
              render({ focusSelector: `[data-action="open-form"][data-value="${entity}"]` });
            }
            return;
          }
          case "duplicate-item": {
            if (duplicateEntityItem(value, id)) {
              render({ focusId: VIEW_FOCUS_IDS[state.view] || null });
            }
            return;
          }
          case "archive-item": {
            const archiveSchema = getEntitySchema(value);
            const archiveLabel = archiveSchema?.singular || "elemento";
            if (!window.confirm(`Quieres archivar este ${archiveLabel}?`)) {
              return;
            }
            if (archiveEntityItem(value, id)) {
              render({ focusId: VIEW_FOCUS_IDS[state.view] || null });
            }
            return;
          }
          case "mark-done": {
            if (markEntityDone(value, id)) {
              render({ focusId: VIEW_FOCUS_IDS[state.view] || null });
            }
            return;
          }
          case "delete-item": {
            if (!canPerformEntityAction(value, "delete", id || "")) {
              return;
            }
            const deleteLabels = {
	              lead: "lead",
	              creator: "creadora",
              task: "tarea",
              appUser: "usuario",
              passwordCredential: "credencial",
              appRole: "rol interno",
              contract: "contrato",
              chatRole: "rol",
              chatChannel: "canal",
              chatAgent: "chatter",
	              chatTraining: "formacion",
	              eosReport: "reporte EOS",
              chatMonitoring: "revision",
              chatApproval: "aprobacion",
              fanProfile: "fan",
	              fanFlow: "flujo",
              gfStage: "etapa GF",
              shift: "turno",
              sop: "SOP",
              hiringCandidate: "candidato",
              processMap: "proceso",
              governanceEntry: "entrada",
              payment: "pago",
              accountInfrastructure: "acceso",
              contentDoc: "documento de contenido",
	              contentStyle: "estilo",
	              contentVehicle: "vehiculo",
	              deliveryFlow: "entrega"
            };
            const label = getEntitySchema(value)?.singular || deleteLabels[value] || "elemento";
            if (!window.confirm(`Quieres borrar este ${label}? Esta accion no se puede deshacer.`)) {
              return;
            }

            deleteEntityItem(value, id);

            if (state.activeForm && state.activeForm.id === id) {
              closeModal();
            } else {
              render({ focusId: VIEW_FOCUS_IDS[state.view] || null });
            }
            return;
          }
          case "close-modal":
            if ((target.classList.contains("modal-backdrop") || target.classList.contains("drawer-backdrop")) && event.target !== target) {
              return;
            }
            closeModal();
            return;
          case "sign-out":
            signOut();
            return;
          default:
            return;
        }
      });

      document.addEventListener("submit", async (event) => {
        /* ── Login form ── */
        const loginForm = event.target.closest("form[data-auth-form='login']");
        if (loginForm) {
          event.preventDefault();
          const formData = new FormData(loginForm);
          const email    = String(formData.get("email") || "").trim();
          const password = String(formData.get("password") || "");
          const remember = formData.get("remember") === "on";
          authDraft = { email, password, remember };
          persistRememberedAuth(authDraft);
          if (email && password) {
            signIn(email, password);
          }
          return;
        }

        /* ── Formularios inline de perfil ── */
        const profileForm = event.target.closest("form[data-profile-form]");
        if (profileForm) {
          event.preventDefault();
          saveProfileInlineForm(profileForm);
          return;
        }

        const channelForm = event.target.closest("form[data-channel-form]");
        if (channelForm) {
          event.preventDefault();
          saveChannelInlineForm(channelForm);
          return;
        }

        const callNotesForm = event.target.closest("form[data-call-notes-form]");
        if (callNotesForm) {
          event.preventDefault();
          const leadId = callNotesForm.dataset.id || "";
          if (!canPerformEntityAction("lead", "edit", leadId)) return;
          const lead = getEntityItem("lead", leadId);
          if (!lead) return;
          const fd = new FormData(callNotesForm);
          lead.coachability = String(fd.get("coachability") || "").trim();
          lead.objections = String(fd.get("objections") || "").trim();
          lead.preSignDecision = String(fd.get("preSignDecision") || "").trim();
          lead.updated = formatDateTimeLabel();
          touchEntityItem(lead, `${getActorName()} actualizo notas de call`);
          queueSave();
          const status = callNotesForm.querySelector("[data-call-notes-status]");
          if (status) {
            status.textContent = `Guardado · ${formatDateTimeLabel()}`;
          }
          return;
        }

        /* ── Formularios de entidades (modal) ── */
        const form = event.target.closest("form[data-entity-form]");
        if (!form) return;

        event.preventDefault();
        const saved = await saveEntityForm(form);
        if (saved !== false) closeModal();
      });

      document.addEventListener("input", (event) => {
        const target = event.target;

        if (target.id === "leads-search") {
          setState({ leadsSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "creators-search") {
          setState({ creatorsSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "task-search") {
          setState({ taskSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "sop-search") {
          setState({ sopSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "contracts-search") {
          setState({ contractsSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "hiring-search") {
          setState({ hiringSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "governance-search") {
          setState({ governanceSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "fan-search") {
          setState({ fanSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "channel-search") {
          setState({ channelSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "manual-search") {
          setState({ manualSearch: target.value }, { focusId: target.id });
        }

        const leadForm = target.closest?.('form[data-entity-form="lead"]');
        if (leadForm && target.name === "dmScript") {
          target.dataset.autoDmScript = "false";
        }
      });

      document.addEventListener("change", (event) => {
        const target = event.target;
        const multiName = target.dataset ? target.dataset.multiCheckbox : null;
        if (multiName) {
          const widget = target.closest(".multi-select-panel");
          if (widget) updateMultiSelectWidget(widget, multiName);
          return;
        }

        const leadForm = target.closest?.('form[data-entity-form="lead"]');
        if (leadForm && target.name === "niche") {
          syncLeadNicheForm(leadForm);
          return;
        }

        if (leadForm && target.name === "qualityFlags") {
          syncLeadQualityForm(leadForm);
          return;
        }

        const inlineEntity = target.dataset ? target.dataset.inlineEntity : null;
        const inlineField = target.dataset ? target.dataset.inlineField : null;
        if (inlineEntity && inlineField) {
          updateInlineEntityField(inlineEntity, target.dataset.id || "", inlineField, target.value);
          render({ focusSelector: `[data-inline-entity="${inlineEntity}"][data-inline-field="${inlineField}"][data-id="${target.dataset.id || ""}"]` });
          return;
        }

        if (target.id === "channel-type-filter") {
          setState({ channelType: target.value }, { focusId: target.id });
          return;
        }

        if (target.id === "channel-status-filter") {
          setState({ channelStatus: target.value }, { focusId: target.id });
          return;
        }

        if (target.id === "channel-creator-filter") {
          setState({ channelCreator: target.value }, { focusId: target.id });
          return;
        }

        if (target.id === "funnel-start-date") {
          setState({ funnelRange: "custom", funnelStartDate: target.value }, { focusId: target.id });
          return;
        }

        if (target.id === "funnel-end-date") {
          setState({ funnelRange: "custom", funnelEndDate: target.value }, { focusId: target.id });
          return;
        }

        const taskId = target.dataset ? target.dataset.taskSelect : null;
        if (!taskId) return;

        const task = DATA.tasks.find((item) => item.id === taskId);
        if (!task) return;

        task.status = target.value;
        queueSave();
        render({ focusSelector: `[data-task-select="${taskId}"]` });
      });

      window.addEventListener("keydown", (event) => {
        if ((event.key === "Enter" || event.key === " ") && event.target.matches?.('[data-action="open-creator-detail"]')) {
          event.preventDefault();
          event.target.click();
          return;
        }

        if ((event.key === "Enter" || event.key === " ") && event.target.matches?.('[data-action="open-channel-detail"]')) {
          event.preventDefault();
          event.target.click();
          return;
        }

        if (event.key === "Escape" && (state.activeSopId || state.activeForm || state.activeCreatorId || state.activeChatChannelId || state.activeCallLeadId)) {
          closeModal();
          return;
        }

        if (event.key === "Escape" && state.mobileNav) {
          setState({ mobileNav: false }, { focusSelector: ".mobile-toggle" });
          return;
        }

        if (event.key === "Tab" && (state.activeSopId || state.activeForm || state.activeCreatorId || state.activeChatChannelId || state.activeCallLeadId)) {
          const modal = document.querySelector(".modal") || document.querySelector(".profile-drawer") || document.querySelector(".channel-drawer") || document.querySelector(".call-drawer");
          if (!modal) return;

          const focusable = Array.from(
            modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])')
          ).filter((element) => !element.hasAttribute("disabled"));

          if (!focusable.length) return;

          const first = focusable[0];
          const last = focusable[focusable.length - 1];

          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        }
      });

      window.addEventListener("resize", () => {
        if (window.innerWidth > 1024 && state.mobileNav) {
          state.mobileNav = false;
          render();
        }
      });

      window.addEventListener("beforeunload", () => {
        if (presenceChannel) {
          try {
            presenceChannel.untrack();
          } catch (error) {
            console.error("No se pudo cerrar la presencia antes de salir:", error);
          }
        }
      });

      async function boot() {
        /* Mostrar pantalla de carga mientras se verifica la sesión */
        renderAuthLoading();
        /* initAuth() decide entre renderLogin() o cargar la app */
        await initAuth();
      }

      boot().catch((error) => {
        console.error("Error arrancando la app:", error);
        authLoading = false;
        renderLogin();
      });
    </script>
  </body>
</html>
