<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel OFM | Control editable</title>
    <style>
      :root {
        --bg: #070b12;
        --bg-soft: #0d131d;
        --panel: rgba(14, 19, 31, 0.92);
        --panel-strong: #121a29;
        --panel-muted: #182131;
        --panel-subtle: rgba(255, 255, 255, 0.03);
        --border: rgba(150, 167, 206, 0.14);
        --border-strong: rgba(176, 193, 236, 0.28);
        --text: #f3f6ff;
        --text-soft: #b8c4de;
        --text-dim: #8b97b8;
        --primary: #8b6bff;
        --primary-soft: rgba(139, 107, 255, 0.16);
        --success: #31c48d;
        --success-soft: rgba(49, 196, 141, 0.16);
        --warning: #f5a524;
        --warning-soft: rgba(245, 165, 36, 0.16);
        --danger: #f05f73;
        --danger-soft: rgba(240, 95, 115, 0.14);
        --info: #58a6ff;
        --info-soft: rgba(88, 166, 255, 0.14);
        --shadow: 0 24px 56px rgba(4, 8, 16, 0.32);
        --shadow-soft: 0 16px 34px rgba(4, 8, 16, 0.2);
        --radius-xl: 26px;
        --radius-lg: 20px;
        --radius-md: 16px;
        --radius-sm: 12px;
        --headline-font: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
        --body-font: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(82, 62, 165, 0.18), transparent 28%),
          radial-gradient(circle at 86% 12%, rgba(28, 104, 186, 0.12), transparent 22%),
          linear-gradient(180deg, #060a11 0%, #0a101a 100%);
        color: var(--text);
        font-family: var(--body-font);
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 28px 28px;
        opacity: 0.08;
        pointer-events: none;
        mask-image: radial-gradient(circle at center, black 28%, transparent 88%);
      }

      body.modal-open,
      body.sidebar-open {
        overflow: hidden;
      }

      ::selection {
        background: rgba(139, 107, 255, 0.34);
        color: #fff;
      }

      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(139, 151, 184, 0.25);
        border-radius: 999px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
        border: 0;
        background: none;
        color: inherit;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      a {
        color: inherit;
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible,
      [tabindex]:focus-visible {
        outline: none;
        border-color: rgba(88, 166, 255, 0.48);
        box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.12);
      }

      .screen-reader {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .skip-link {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 60;
        transform: translateY(-160%);
        padding: 10px 14px;
        border-radius: 12px;
        background: #fff;
        color: #09111d;
        font-weight: 700;
        text-decoration: none;
        transition: 180ms ease;
      }

      .skip-link:focus {
        transform: translateY(0);
      }

      .app-shell {
        position: relative;
        display: grid;
        grid-template-columns: 292px minmax(0, 1fr);
        gap: 24px;
        min-height: 100vh;
        padding: 24px;
      }

      .sidebar {
        position: sticky;
        top: 24px;
        height: calc(100vh - 48px);
        display: flex;
        flex-direction: column;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(180deg, rgba(15, 21, 33, 0.98), rgba(10, 15, 25, 0.96)),
          linear-gradient(180deg, rgba(139, 107, 255, 0.05), transparent 42%);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .sidebar::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 24%);
        pointer-events: none;
      }

      .sidebar::after {
        content: "";
        position: absolute;
        right: -50px;
        bottom: -70px;
        width: 170px;
        height: 170px;
        background: radial-gradient(circle, rgba(139, 107, 255, 0.12), transparent 72%);
        pointer-events: none;
      }

      .logo-block {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 8px 10px 18px;
        border-bottom: 1px solid var(--border);
      }

      .logo-brand {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .logo-glyph {
        width: 46px;
        height: 46px;
        display: grid;
        place-items: center;
        border-radius: 15px;
        border: 1px solid rgba(139, 107, 255, 0.32);
        background: linear-gradient(135deg, rgba(139, 107, 255, 0.22), rgba(88, 166, 255, 0.12));
        color: #f7f2ff;
      }

      .logo-copy h1 {
        margin: 0;
        font: 700 1rem/1 var(--headline-font);
        letter-spacing: -0.03em;
      }

      .logo-copy p {
        margin: 6px 0 0;
        color: var(--text-dim);
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .sidebar-collapse,
      .mobile-toggle,
      .icon-button {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-soft);
        transition: 180ms ease;
      }

      .sidebar-collapse:hover,
      .mobile-toggle:hover,
      .icon-button:hover {
        color: var(--text);
        border-color: var(--border-strong);
        background: rgba(255, 255, 255, 0.05);
      }

      .mobile-toggle {
        display: none;
      }

      .sidebar nav {
        flex: 1;
        padding: 18px 4px 8px;
        overflow: auto;
      }

      .nav-group {
        margin-bottom: 18px;
      }

      .nav-label {
        margin: 0 8px 12px;
        color: rgba(184, 196, 222, 0.52);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .nav-button {
        width: 100%;
        display: grid;
        grid-template-columns: 36px minmax(0, 1fr);
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        margin-bottom: 6px;
        border: 1px solid transparent;
        border-radius: 15px;
        color: var(--text-soft);
        text-align: left;
        transition: 180ms ease;
      }

      .nav-button:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.035);
      }

      .nav-button.active {
        color: var(--text);
        border-color: rgba(139, 107, 255, 0.18);
        background:
          linear-gradient(135deg, rgba(139, 107, 255, 0.14), rgba(88, 166, 255, 0.06)),
          rgba(255, 255, 255, 0.025);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .nav-icon {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        color: inherit;
      }

      .nav-button.active .nav-icon {
        background: rgba(139, 107, 255, 0.18);
      }

      .nav-copy strong {
        display: block;
        margin-bottom: 2px;
        font-size: 0.92rem;
      }

      .nav-copy span {
        display: block;
        color: var(--text-dim);
        font-size: 0.74rem;
      }

      .sidebar-footer {
        display: grid;
        gap: 12px;
        margin-top: auto;
      }

      .sidebar-note,
      .user-card {
        position: relative;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
      }

      .sidebar-note {
        padding: 14px;
      }

      .sidebar-note-label {
        display: block;
        color: var(--text-dim);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .sidebar-note strong {
        display: block;
        margin-top: 10px;
        font: 700 1rem/1.2 var(--headline-font);
      }

      .sidebar-note p {
        margin: 6px 0 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .user-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px;
      }

      .avatar {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(139, 107, 255, 0.26), rgba(88, 166, 255, 0.16));
        color: #fff;
        font-weight: 700;
        flex: 0 0 42px;
      }

      .user-card strong {
        display: block;
        margin-bottom: 3px;
        font-size: 0.92rem;
      }

      .user-card span {
        display: block;
        color: var(--text-dim);
        font-size: 0.74rem;
      }

      .main-panel {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .topbar {
        position: sticky;
        top: 24px;
        z-index: 15;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 22px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background: rgba(13, 18, 29, 0.88);
        backdrop-filter: blur(20px);
        box-shadow: var(--shadow-soft);
      }

      .topbar-main {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        min-width: 0;
      }

      .topbar-kicker {
        margin-bottom: 8px;
        color: rgba(184, 196, 222, 0.6);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .topbar h2 {
        margin: 0;
        font: 700 1.32rem/1.08 var(--headline-font);
        letter-spacing: -0.04em;
      }

      .topbar p {
        margin: 6px 0 0;
        color: var(--text-soft);
        font-size: 0.9rem;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-soft);
        font-size: 0.8rem;
        white-space: nowrap;
      }

      .chip strong {
        color: var(--text);
        font-size: 0.84rem;
      }

      .chip-danger {
        border-color: rgba(240, 95, 115, 0.24);
        background: rgba(240, 95, 115, 0.08);
        color: #f7c7cf;
      }

      .chip-success {
        border-color: rgba(49, 196, 141, 0.24);
        background: rgba(49, 196, 141, 0.08);
        color: #9deccc;
      }

      .chip-warning {
        border-color: rgba(245, 165, 36, 0.24);
        background: rgba(245, 165, 36, 0.08);
        color: #ffd59d;
      }

      .chip-info {
        border-color: rgba(88, 166, 255, 0.24);
        background: rgba(88, 166, 255, 0.08);
        color: #bedfff;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }

      .section {
        display: flex;
        flex-direction: column;
        gap: 22px;
        animation: fade-in 220ms ease;
      }

      .hero-banner {
        display: grid;
        grid-template-columns: minmax(0, 1.7fr) minmax(310px, 1fr);
        gap: 20px;
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(180deg, rgba(16, 22, 36, 0.98), rgba(11, 16, 27, 0.98)),
          radial-gradient(circle at top right, rgba(139, 107, 255, 0.1), transparent 34%);
        box-shadow: var(--shadow);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: rgba(184, 196, 222, 0.76);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .hero-copy {
        display: grid;
        gap: 16px;
        align-content: start;
      }

      .hero-banner h3 {
        margin: 0;
        font: 700 2rem/1.02 var(--headline-font);
        letter-spacing: -0.05em;
        max-width: 14ch;
      }

      .hero-banner p {
        margin: 0;
        color: #d6def4;
        max-width: 62ch;
      }

      .hero-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .hero-primary {
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
      }

      .hero-primary-label {
        display: block;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .hero-primary strong {
        display: block;
        margin-top: 10px;
        font-size: 1rem;
      }

      .hero-primary p {
        margin-top: 6px;
        color: var(--text-soft);
        font-size: 0.86rem;
      }

      .hero-side {
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .hero-stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .hero-stat {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
      }

      .hero-stat span {
        display: block;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .hero-stat strong {
        display: block;
        margin-top: 10px;
        font: 700 1.52rem/1 var(--headline-font);
      }

      .brief-card {
        padding: 16px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
      }

      .brief-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .brief-card-head strong {
        font: 700 0.96rem/1.1 var(--headline-font);
      }

      .brief-list {
        display: grid;
        gap: 10px;
      }

      .brief-item {
        width: 100%;
        display: grid;
        grid-template-columns: 30px minmax(0, 1fr);
        gap: 12px;
        align-items: flex-start;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.025);
        text-align: left;
        transition: 180ms ease;
      }

      .brief-item:hover {
        border-color: rgba(139, 107, 255, 0.22);
        background: rgba(255, 255, 255, 0.04);
      }

      .brief-index {
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        border-radius: 11px;
        background: rgba(139, 107, 255, 0.16);
        color: #ded2ff;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .brief-copy strong {
        display: block;
        font-size: 0.88rem;
      }

      .brief-copy span {
        display: block;
        margin-top: 4px;
        color: var(--text-soft);
        font-size: 0.78rem;
      }

      .priority-grid,
      .grid-4,
      .grid-3,
      .grid-2,
      .warning-grid,
      .creator-grid,
      .sop-grid {
        display: grid;
        gap: 16px;
      }

      .priority-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card,
      .stat-card,
      .priority-card {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background:
          linear-gradient(180deg, rgba(18, 25, 41, 0.96), rgba(12, 17, 29, 0.96)),
          rgba(18, 25, 41, 0.96);
        box-shadow: var(--shadow-soft);
      }

      .priority-card {
        padding: 18px;
      }

      .priority-card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .priority-card-label {
        margin: 0 0 6px;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .priority-card strong {
        display: block;
        font-size: 1rem;
      }

      .priority-card p {
        margin: 8px 0 0;
        color: var(--text-soft);
        font-size: 0.84rem;
      }

      .priority-value {
        font: 700 2rem/1 var(--headline-font);
      }

      .stat-card {
        padding: 18px;
      }

      .stat-card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .stat-card-label {
        margin: 0;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .stat-card-value {
        margin: 14px 0 0;
        font: 700 1.92rem/1 var(--headline-font);
        letter-spacing: -0.04em;
      }

      .stat-card-sub {
        margin: 10px 0 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
      }

      .card-header h3,
      .card-header h4 {
        margin: 0;
        font: 700 1rem/1.1 var(--headline-font);
        letter-spacing: -0.03em;
      }

      .card-header span {
        color: var(--text-dim);
        font-size: 0.8rem;
      }

      .card-body {
        padding: 18px 20px;
      }

      .subsection {
        display: grid;
        gap: 12px;
      }

      .subsection + .subsection {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
      }

      .subsection-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .subsection-head strong {
        font-size: 0.9rem;
      }

      .subsection-head span {
        color: var(--text-dim);
        font-size: 0.78rem;
      }

      .ghost-button,
      .primary-button,
      .filter-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 40px;
        padding: 0 14px;
        border-radius: 14px;
        border: 1px solid var(--border);
        transition: 180ms ease;
      }

      .ghost-button,
      .filter-button {
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-soft);
      }

      .ghost-button:hover,
      .filter-button:hover {
        color: var(--text);
        border-color: var(--border-strong);
        background: rgba(255, 255, 255, 0.05);
      }

      .primary-button {
        background: linear-gradient(135deg, rgba(139, 107, 255, 0.9), rgba(88, 166, 255, 0.64));
        color: #fff;
        box-shadow: 0 10px 24px rgba(139, 107, 255, 0.2);
      }

      .primary-button:hover {
        filter: brightness(1.03);
      }

      .filter-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .filter-spacer {
        flex: 1 1 auto;
      }

      .filter-group {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        padding: 7px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
      }

      .filter-button {
        min-height: 34px;
        padding: 0 12px;
        border-radius: 12px;
      }

      .filter-button.active {
        color: var(--text);
        border-color: rgba(139, 107, 255, 0.28);
        background: rgba(139, 107, 255, 0.16);
      }

      .search-input,
      .select {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        outline: none;
      }

      .search-input {
        min-width: min(320px, 100%);
        height: 42px;
        padding: 0 14px;
      }

      .search-input::placeholder {
        color: var(--text-dim);
      }

      .select {
        height: 38px;
        padding: 0 10px;
      }

      .section-actions,
      .table-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .table-actions {
        justify-content: flex-end;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        color: var(--text-soft);
        font-size: 0.78rem;
        font-weight: 600;
      }

      .field-input,
      .field-textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
      }

      .field-input {
        min-height: 44px;
        padding: 0 14px;
      }

      .field-textarea {
        min-height: 120px;
        padding: 12px 14px;
        resize: vertical;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .field-grid .field.full {
        grid-column: 1 / -1;
      }

      .checkbox-field {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--text-soft);
        font-size: 0.86rem;
      }

      .checkbox-field input {
        width: 18px;
        height: 18px;
      }

      .helper-text {
        margin: 0;
        color: var(--text-dim);
        font-size: 0.76rem;
      }

      .list {
        display: flex;
        flex-direction: column;
      }

      .list-item {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
      }

      .list-item:last-child {
        border-bottom: 0;
      }

      .list-item:hover {
        background: rgba(255, 255, 255, 0.025);
      }

      .list-item-main {
        flex: 1;
        min-width: 0;
      }

      .list-item-main strong {
        display: block;
        font-size: 0.92rem;
      }

      .list-item-main p {
        margin: 4px 0 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .list-item-meta {
        min-width: fit-content;
        text-align: right;
        color: var(--text-dim);
        font-size: 0.76rem;
      }

      .list-item-meta strong {
        color: var(--text);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 0.74rem;
        font-weight: 600;
        white-space: nowrap;
      }

      .tone-default {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.08);
        color: var(--text-soft);
      }

      .tone-primary {
        background: var(--primary-soft);
        border-color: rgba(139, 107, 255, 0.28);
        color: #d9cbff;
      }

      .tone-success {
        background: var(--success-soft);
        border-color: rgba(49, 196, 141, 0.28);
        color: #96edca;
      }

      .tone-warning {
        background: var(--warning-soft);
        border-color: rgba(245, 165, 36, 0.28);
        color: #ffd59d;
      }

      .tone-danger {
        background: var(--danger-soft);
        border-color: rgba(240, 95, 115, 0.28);
        color: #ffc1c9;
      }

      .tone-info {
        background: var(--info-soft);
        border-color: rgba(88, 166, 255, 0.28);
        color: #bedfff;
      }

      .card-tags {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .tag {
        padding: 5px 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-dim);
        font-size: 0.7rem;
      }

      .table-wrap {
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 15px 18px;
        text-align: left;
        vertical-align: top;
      }

      thead th {
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        border-bottom: 1px solid var(--border);
      }

      tbody td {
        border-bottom: 1px solid rgba(150, 167, 206, 0.08);
        color: var(--text-soft);
        font-size: 0.86rem;
      }

      tbody tr:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      .table-title {
        color: var(--text);
        font-weight: 600;
      }

      .table-caption {
        display: block;
        margin-top: 4px;
        color: var(--text-dim);
        font-size: 0.76rem;
      }

      .kanban {
        display: grid;
        gap: 14px;
        overflow: auto;
        padding-bottom: 4px;
      }

      .kanban.full {
        grid-template-columns: repeat(8, minmax(228px, 1fr));
      }

      .kanban.tight {
        grid-template-columns: repeat(5, minmax(228px, 1fr));
      }

      .kanban-column {
        min-width: 228px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(18, 25, 41, 0.88);
      }

      .kanban-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--border);
      }

      .kanban-head strong {
        font-size: 0.82rem;
      }

      .kanban-stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 14px;
        min-height: 210px;
      }

      .kanban-card {
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
      }

      .kanban-card strong {
        display: block;
        margin-bottom: 6px;
        font-size: 0.88rem;
      }

      .kanban-card p {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.78rem;
      }

      .creator-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .creator-card,
      .sop-card {
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: rgba(18, 25, 41, 0.94);
        box-shadow: var(--shadow-soft);
      }

      .creator-card.interactive {
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .creator-card.interactive:hover {
        transform: translateY(-2px);
        border-color: rgba(139, 107, 255, 0.24);
        background: rgba(20, 28, 46, 0.98);
      }

      .creator-card-head,
      .sop-card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .creator-card h4,
      .sop-card h4 {
        margin: 12px 0 4px;
        font: 700 1rem/1.1 var(--headline-font);
      }

      .creator-card p,
      .sop-card p {
        margin: 0;
      }

      .muted {
        color: var(--text-soft);
      }

      .dim {
        color: var(--text-dim);
      }

      .progress {
        margin-top: 14px;
      }

      .progress-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
        color: var(--text-soft);
        font-size: 0.76rem;
      }

      .progress-track {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #8b6bff, #5ab0ff);
      }

      .insight-box {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.03);
      }

      .insight-box strong {
        display: block;
        margin-bottom: 4px;
        font-size: 0.84rem;
      }

      .insight-box p {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.78rem;
      }

      .chart-shell {
        padding: 18px;
      }

      .bar-legend {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 18px;
        color: var(--text-soft);
        font-size: 0.78rem;
      }

      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .bar-chart {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
        gap: 12px;
        align-items: end;
        min-height: 220px;
      }

      .bar-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .bar-columns {
        height: 180px;
        display: flex;
        align-items: end;
        gap: 8px;
      }

      .bar {
        width: 20px;
        min-height: 6px;
        border-radius: 999px 999px 6px 6px;
      }

      .bar.revenue {
        background: linear-gradient(180deg, #8b6bff, #654eff);
      }

      .bar.margin {
        background: linear-gradient(180deg, #3fd1a4, #19956a);
      }

      .bar-label {
        color: var(--text-soft);
        font-size: 0.76rem;
      }

      .bar-note {
        color: var(--text-dim);
        font-size: 0.72rem;
      }

      .donut-shell {
        display: grid;
        gap: 16px;
        align-content: start;
      }

      .donut {
        width: min(220px, 100%);
        aspect-ratio: 1;
        margin: 0 auto;
        border-radius: 50%;
        position: relative;
      }

      .donut::after {
        content: "";
        position: absolute;
        inset: 24%;
        border-radius: 50%;
        background: #101726;
        border: 1px solid var(--border);
      }

      .donut-center {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        z-index: 1;
        text-align: center;
      }

      .donut-center strong {
        display: block;
        font: 700 1.45rem/1 var(--headline-font);
      }

      .donut-center span {
        display: block;
        margin-top: 6px;
        color: var(--text-dim);
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }

      .metric-split {
        display: grid;
        gap: 10px;
      }

      .metric-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .metric-line strong {
        font-size: 0.88rem;
      }

      .readiness {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(260px, 0.82fr);
        gap: 18px;
        padding: 24px;
        border: 2px solid rgba(240, 95, 115, 0.24);
        border-radius: var(--radius-xl);
        background: linear-gradient(135deg, rgba(240, 95, 115, 0.1), rgba(18, 25, 41, 0.98));
      }

      .readiness.ok {
        border-color: rgba(49, 196, 141, 0.28);
        background: linear-gradient(135deg, rgba(49, 196, 141, 0.1), rgba(18, 25, 41, 0.98));
      }

      .readiness h3 {
        margin: 0;
        font: 700 1.68rem/1.04 var(--headline-font);
        letter-spacing: -0.04em;
      }

      .readiness p {
        margin: 10px 0 0;
        color: var(--text-soft);
      }

      .readiness-meta {
        padding: 18px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(8, 11, 19, 0.28);
        align-self: stretch;
      }

      .readiness-meta span {
        display: block;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .readiness-meta strong {
        display: block;
        margin-top: 10px;
        font: 700 2.3rem/1 var(--headline-font);
      }

      .warning-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .warning-card {
        padding: 18px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: rgba(18, 25, 41, 0.94);
      }

      .warning-card.bad {
        border-color: rgba(240, 95, 115, 0.28);
      }

      .warning-card.good {
        border-color: rgba(49, 196, 141, 0.28);
      }

      .warning-card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .warning-card strong {
        display: block;
        font-size: 0.95rem;
      }

      .warning-card p {
        margin: 6px 0 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .warning-count {
        font: 700 2.2rem/1 var(--headline-font);
      }

      .detail-list {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--border);
      }

      .detail-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 10px;
        color: var(--text-soft);
        font-size: 0.8rem;
      }

      .detail-item:last-child {
        margin-bottom: 0;
      }

      .detail-bullet {
        width: 8px;
        height: 8px;
        margin-top: 6px;
        border-radius: 50%;
        background: var(--danger);
        flex: 0 0 8px;
      }

      .recommendation {
        width: 100%;
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 14px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        text-align: left;
        transition: 180ms ease;
      }

      .recommendation:hover {
        border-color: rgba(139, 107, 255, 0.24);
        background: rgba(255, 255, 255, 0.04);
      }

      .recommendation strong {
        display: block;
        margin-bottom: 4px;
      }

      .recommendation p {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 168px;
        padding: 24px;
        color: var(--text-soft);
        text-align: center;
      }

      .empty.compact {
        min-height: 110px;
        padding: 18px;
      }

      .empty strong {
        display: block;
        margin-bottom: 8px;
        color: var(--text);
        font-size: 0.92rem;
      }

      .empty p {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.82rem;
        max-width: 42ch;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(4, 7, 14, 0.72);
        backdrop-filter: blur(8px);
        z-index: 40;
      }

      .modal {
        width: min(620px, 100%);
        max-height: min(80vh, 760px);
        border: 1px solid var(--border);
        border-radius: 26px;
        background: linear-gradient(180deg, #141c2f, #0f1524);
        box-shadow: var(--shadow);
        overflow: auto;
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 22px;
        border-bottom: 1px solid var(--border);
      }

      .modal-header h3 {
        margin: 0;
        font: 700 1.12rem/1.1 var(--headline-font);
      }

      .modal-body {
        padding: 22px;
        display: grid;
        gap: 16px;
      }

      .modal-footer {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        padding: 0 22px 22px;
        flex-wrap: wrap;
      }

      .drawer-backdrop {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: flex-end;
        padding: 18px;
        background: rgba(4, 7, 14, 0.76);
        backdrop-filter: blur(10px);
        z-index: 40;
      }

      .profile-drawer {
        width: min(1220px, calc(100vw - 36px));
        height: calc(100vh - 36px);
        margin-left: auto;
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        border: 1px solid var(--border);
        border-radius: 30px;
        background: linear-gradient(180deg, #12192a, #0c1220);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .profile-drawer-side {
        display: grid;
        align-content: start;
        gap: 18px;
        padding: 22px;
        border-right: 1px solid var(--border);
        background:
          linear-gradient(180deg, rgba(17, 24, 39, 0.98), rgba(11, 16, 27, 0.98)),
          radial-gradient(circle at top right, rgba(139, 107, 255, 0.08), transparent 44%);
        overflow: auto;
      }

      .profile-drawer-main {
        min-width: 0;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        background:
          linear-gradient(180deg, rgba(17, 24, 39, 0.98), rgba(10, 15, 26, 0.98)),
          radial-gradient(circle at top left, rgba(88, 166, 255, 0.06), transparent 40%);
      }

      .profile-summary-card {
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.03);
      }

      .profile-summary-card h3,
      .profile-panel h3,
      .profile-phase h4,
      .profile-info-block h4 {
        margin: 0;
        font: 700 1rem/1.1 var(--headline-font);
      }

      .profile-summary-card p {
        margin: 8px 0 0;
        color: var(--text-soft);
        font-size: 0.84rem;
      }

      .profile-header {
        padding: 24px 24px 18px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .profile-header-main {
        min-width: 0;
        display: grid;
        gap: 12px;
      }

      .profile-kicker {
        color: rgba(184, 196, 222, 0.64);
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .profile-title-row {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      .profile-title-row h3 {
        margin: 0;
        font: 700 1.5rem/1 var(--headline-font);
        letter-spacing: -0.04em;
      }

      .profile-subtitle {
        color: var(--text-soft);
        font-size: 0.88rem;
      }

      .profile-header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .profile-tabs {
        padding: 16px 24px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
      }

      .profile-tab {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-soft);
        transition: 180ms ease;
      }

      .profile-tab.active {
        color: var(--text);
        border-color: rgba(139, 107, 255, 0.28);
        background: rgba(139, 107, 255, 0.16);
      }

      .profile-content {
        overflow: auto;
        padding: 24px;
        display: grid;
        gap: 18px;
      }

      .profile-grid-4,
      .profile-grid-3,
      .profile-grid-2,
      .profile-stack,
      .profile-phase-list,
      .profile-info-grid {
        display: grid;
        gap: 16px;
      }

      .profile-grid-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .profile-grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .profile-grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .profile-panel,
      .profile-phase,
      .profile-mini-card,
      .profile-info-block {
        border: 1px solid var(--border);
        border-radius: 22px;
        background:
          linear-gradient(180deg, rgba(18, 25, 41, 0.96), rgba(12, 17, 29, 0.96)),
          rgba(18, 25, 41, 0.96);
        box-shadow: var(--shadow-soft);
      }

      .profile-panel {
        padding: 18px;
      }

      .profile-panel-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .profile-panel-head p,
      .profile-phase-head p,
      .profile-info-block p {
        margin: 6px 0 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .profile-mini-card {
        padding: 16px;
      }

      .profile-mini-card strong {
        display: block;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .profile-mini-card span {
        display: block;
        margin-top: 10px;
        font: 700 1.2rem/1.1 var(--headline-font);
      }

      .profile-mini-card small {
        display: block;
        margin-top: 6px;
        color: var(--text-soft);
        font-size: 0.78rem;
      }

      .profile-task-list,
      .profile-note-list,
      .profile-history-list {
        display: grid;
        gap: 10px;
      }

      .profile-task {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: flex-start;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
      }

      .profile-task-main strong {
        display: block;
        font-size: 0.9rem;
      }

      .profile-task-main p {
        margin: 4px 0 0;
        color: var(--text-soft);
        font-size: 0.8rem;
      }

      .profile-task-meta {
        display: grid;
        gap: 8px;

          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");

      function safeParse(value, fallback) {
        try {
          return value ? JSON.parse(value) : fallback;

      }

      function readStorage(key, fallback) {

      function normalizeProfileTask(task, creatorId) {
        const defaultPriority = ["critical", "high", "medium", "low"].includes(task?.priority) ? task.priority : "medium";
        return {
          id: String(task?.id || createId("perfil-task")),
          creatorId,
          area: String(task?.area || "onboarding"),
          phase: String(task?.phase || "manual"),
          title: String(task?.title || "Tarea sin titulo"),
          status: task?.status === "done" ? "done" : "pending",
          priority: defaultPriority,
          owner: String(task?.owner || ""),
          blocked: Boolean(task?.blocked),
          recommended: Boolean(task?.recommended),
          due: String(task?.due || ""),
          notes: String(task?.notes || ""),
          createdAt: String(task?.createdAt || formatDateTimeLabel()),
          completedAt: String(task?.completedAt || ""),
          source: String(task?.source || "manual"),
          templateKey: String(task?.templateKey || "")
        };
      }

      function normalizeCreatorOps(ops, creator) {
        const defaults = getDefaultCreatorOps(creator);
        const existingOps = isPlainObject(ops) ? ops : {};
        const existingTasks = ensureArray(existingOps.tasks).map((task) => normalizeProfileTask(task, creator.id));
        const byTemplateKey = new Map(existingTasks.filter((task) => task.templateKey).map((task) => [task.templateKey, task]));
        const mergedTemplateTasks = PROFILE_TASK_TEMPLATES.map((template) => {
          const key = `${template.area}:${template.phase}:${template.title}`;
          return byTemplateKey.get(key) || createProfileTask(template, creator.id);
        });
        const manualTasks = existingTasks.filter((task) => !task.templateKey);

        return {
          tasks: [...mergedTemplateTasks, ...manualTasks],
          notes: ensureArray(existingOps.notes).map((note) => ({
            id: String(note?.id || createId("perfil-note")),
            text: String(note?.text || ""),
            area: String(note?.area || "summary"),
            createdAt: String(note?.createdAt || formatDateTimeLabel())
          })),
          system: {
            ...defaults.system,
            ...(isPlainObject(existingOps.system) ? existingOps.system : {})
          },
          marketing: {
            ...defaults.marketing,
            ...(isPlainObject(existingOps.marketing) ? existingOps.marketing : {})
          },
          retention: {
            ...defaults.retention,
            ...(isPlainObject(existingOps.retention) ? existingOps.retention : {})
          },
          metrics: {
            ...defaults.metrics,
            ...(isPlainObject(existingOps.metrics) ? existingOps.metrics : {})
          }
        };
      }

      function normalizeCreator(creator) {
        const base = isPlainObject(creator) ? creator : {};
        const normalized = {
          id: String(base.id || createId("creator")),
          name: String(base.name || "Perfil"),
          handle: String(base.handle || ""),
          niche: String(base.niche || ""),

          tier: ["starter", "growth", "premium", "elite"].includes(base.tier) ? base.tier : "starter",
          accountManager: String(base.accountManager || ""),
          retention: ["healthy", "neutral", "at_risk"].includes(base.retention) ? base.retention : "healthy",
          onboardingPct: Number.isFinite(Number(base.onboardingPct)) ? Math.max(0, Math.min(100, Number(base.onboardingPct))) : 0,
          updated: String(base.updated || "")
        };

        normalized.ops = normalizeCreatorOps(base.ops || base.workspace || base.profileOps, normalized);
        return normalized;
      }

      function isPlainObject(value) {
        return Boolean(value) && typeof value === "object" && !Array.isArray(value);
      }

      function ensureArray(value) {
        return Array.isArray(value) ? value : [];
      }

      function normalizeData(value) {
        const defaults = cloneData(DEFAULT_DATA);
        if (!isPlainObject(value)) return defaults;

        return {
          ...defaults,
          ...value,
          user: {
            ...defaults.user,
            ...(isPlainObject(value.user) ? value.user : {})
          },
          leads: ensureArray(value.leads),
          creators: ensureArray(value.creators).map((creator) => normalizeCreator(creator)),
          tasks: ensureArray(value.tasks),
          onboardingBlocks: ensureArray(value.onboardingBlocks),
          contentPieces: ensureArray(value.contentPieces),
          queue: ensureArray(value.queue),
          sops: ensureArray(value.sops),
          metrics: ensureArray(value.metrics)
        };
      }

      function persistData() {
        writeStorage(STORAGE_KEYS.data, DATA);

      function getSyncMeta() {
        if (syncStatus === "syncing") {

        }

        if (syncStatus === "synced") {
          return { toneClass: "chip-success", value: "Sincronizado" };
        }

        if (syncStatus === "error") {
          return { toneClass: "chip-danger", value: "Error" };
        }

        return { toneClass: "chip-info", value: "Local" };
      }

      async function saveRemoteData(options = {}) {
        const { force = false } = options;

        if (!supabaseClient) {
          console.error("Supabase no esta disponible en window.supabase.");
          setSyncStatus("error");
          return false;
        }

        if (!force && !hasHydratedApp) {
          return false;
        }

        if (!force && !pendingRemoteSave) {
          return true;
        }

        const payload = cloneData(DATA);
        pendingRemoteSave = false;
        setSyncStatus("syncing");

        try {
          const { error } = await supabaseClient
            .from(APP_STATE_TABLE)
            .upsert(
              {
                id: APP_STATE_ROW_ID,
                payload,
                updated_at: new Date().toISOString()
              },
              { onConflict: "id" }
            );

          if (error) throw error;

          persistData();
          setSyncStatus("synced");
          return true;
        } catch (error) {
          console.error("Error guardando app_state en Supabase:", error);
          pendingRemoteSave = true;
          setSyncStatus("error");
          return false;
        }
      }

      function queueSave(delay = 700) {
        pendingRemoteSave = true;
        persistData();
        setSyncStatus("syncing");

        if (saveDebounceId) {
          window.clearTimeout(saveDebounceId);
        }

        saveDebounceId = window.setTimeout(() => {
          saveDebounceId = null;
          saveQueue = saveQueue
            .then(() => saveRemoteData())
            .catch((error) => {
              console.error("Error en la cola de guardado remoto:", error);
              setSyncStatus("error");
            });
        }, delay);
      }

      async function loadRemoteData() {
        if (!supabaseClient) {
          console.error("Supabase JS no se cargo correctamente desde el CDN.");
          hydrateData();
          setSyncStatus("error");
          return false;
        }

        setSyncStatus("syncing");

        try {
          const { data, error } = await supabaseClient
            .from(APP_STATE_TABLE)
            .select("id, payload, updated_at")
            .eq("id", APP_STATE_ROW_ID)
            .maybeSingle();

          if (error) throw error;

          if (data?.payload) {
            DATA = normalizeData(data.payload);
            persistData();
            setSyncStatus("synced");
            return true;
          }

          const seeded = await saveRemoteData({ force: true });
          if (!seeded) {
            throw new Error("No se pudo crear el estado inicial remoto.");
          }

          setSyncStatus("synced");
          return true;
        } catch (error) {
          console.error("Error cargando app_state desde Supabase:", error);
          hydrateData();
          setSyncStatus("error");
          return false;
        }
      }

      function toneForLead(status) {
        if (status === "signed") return "success";
        if (status === "contract_sent" || status === "verbal_yes") return "primary";
        if (status === "followup" || status === "call1" || status === "call2") return "warning";
        return "default";
      }

      function toneForPriority(priority) {
        if (priority === "critical") return "danger";
        if (priority === "high") return "warning";
        if (priority === "medium") return "primary";
        return "default";
      }

      function toneForTaskStatus(status) {
        if (status === "done") return "success";
        if (status === "blocked" || status === "cancelled") return "danger";
        if (status === "in_progress") return "info";
        return "default";
      }

      function toneForCreatorStage(stage) {
        if (stage === "active") return "success";
        if (stage === "onboarding") return "primary";
        if (stage === "paused") return "warning";
        return "default";
      }

      function toneForRetention(status) {
        if (status === "healthy") return "success";
        if (status === "neutral") return "warning";
        return "danger";
      }

      function toneForDepartment(department) {
        if (department === "sales") return "success";
        if (department === "onboarding") return "warning";
        if (department === "content") return "info";
        if (department === "analytics") return "primary";
        if (department === "chatting") return "primary";
        return "default";
      }

      function toneForContentStatus(status) {
        if (status === "winner" || status === "posted") return "success";
        if (status === "scheduled" || status === "edited") return "info";
        if (status === "loser") return "danger";
        return "default";
      }

      function toneForQueueStatus(status) {
        if (status === "posted") return "success";
        if (status === "failed") return "danger";
        return "warning";

      function persistState() {
        const persisted = {
          view: state.view,
          sidebarCollapsed: state.sidebarCollapsed,
          leadsView: state.leadsView,
          leadsSearch: state.leadsSearch,
          creatorsSearch: state.creatorsSearch,
          creatorStage: state.creatorStage,
          contentTab: state.contentTab,
          contentCreator: state.contentCreator,

      function hydrateState() {
        const savedState = readStorage(STORAGE_KEYS.ui, {});
        state = {
          ...DEFAULT_STATE,
          ...savedState,
          mobileNav: false,
          activeSopId: null,
          activeForm: null,
          activeCreatorId: null,
          creatorTab: DEFAULT_STATE.creatorTab,
          creatorShowCompleted: false,
          creatorComposer: null
        };

      function setState(patch, options = {}) {
        state = { ...state, ...patch };
        persistState();
        render(options);

      function focusElement({ focusId = null, focusSelector = null } = {}) {
        const target = focusSelector
          ? document.querySelector(focusSelector)
          : focusId
            ? document.getElementById(focusId)
            : null;

        if (!target) return;
        target.focus();

        if (typeof target.value === "string" && typeof target.setSelectionRange === "function") {
          const caret = target.value.length;
          target.setSelectionRange(caret, caret);
        }
      }

      function getLatestMetricsByCreator() {
        const latest = new Map();
        DATA.metrics.forEach((metric) => {
          latest.set(metric.creatorId, metric);
        });
        return Array.from(latest.values());
      }

      function getMetricsMap() {
        return new Map(getLatestMetricsByCreator().map((metric) => [metric.creatorId, metric]));
      }

      function getActiveTasks() {
        return DATA.tasks.filter((task) => !["done", "cancelled"].includes(task.status));
      }

      function getCriticalTasks() {
        return getActiveTasks()
          .filter((task) => task.priority === "critical")
          .sort((a, b) => {
            if (a.overdue !== b.overdue) return a.overdue ? -1 : 1;
            return a.title.localeCompare(b.title);
          });
      }

      function getAtRiskCreators() {
        return DATA.creators.filter((creator) => creator.retention === "at_risk");
      }

      function getCloseReadyLeads() {
        const readyStatuses = ["call2", "verbal_yes", "contract_sent", "signed"];
        return DATA.leads.filter((lead) => readyStatuses.includes(lead.status));
      }

      function getRevenueSnapshot() {
        const latestMetrics = getLatestMetricsByCreator();
        const totalRevenue = latestMetrics.reduce((sum, item) => sum + item.revenue, 0);
        const totalMargin = latestMetrics.reduce((sum, item) => sum + item.margin, 0);
        const closeReadyRevenue = getCloseReadyLeads().reduce((sum, lead) => sum + lead.revenue, 0);
        const winRate = DATA.contentPieces.length
          ? Math.round((DATA.contentPieces.filter((piece) => piece.status === "winner").length / DATA.contentPieces.length) * 100)
          : 0;
        const failedPosts = DATA.queue.filter((item) => item.status === "failed").length;
        return { totalRevenue, totalMargin, closeReadyRevenue, winRate, failedPosts };
      }

      function getDashboardStats() {
        const criticalTasks = getCriticalTasks();
        const atRisk = getAtRiskCreators();
        const activeCreators = DATA.creators.filter((creator) => creator.stage === "active").length;
        const onboardingCreators = DATA.creators.filter((creator) => creator.stage === "onboarding").length;
        const pendingTasks = getActiveTasks().length;
        const backlog = DATA.contentPieces.filter((piece) => ["idea", "scripted"].includes(piece.status)).length;
        const closeReady = getCloseReadyLeads();

        return {
          totalLeads: DATA.leads.length,
          activeCreators,
          onboardingCreators,
          pendingTasks,
          criticalTasks,
          atRisk,
          backlog,
          closeReady,
          onboardingBlocksCount: DATA.onboardingBlocks.length,
          blockingAlerts: criticalTasks.length + DATA.onboardingBlocks.length + atRisk.length
        };
      }

      function getPriorityActions() {
        const actions = [];

        getCriticalTasks().forEach((task) => {
          actions.push({
            id: task.id,
            title: task.title,
            description: task.description,
            meta: `${task.owner} · ${task.due}`,
            view: "tasks",
            tone: toneForPriority(task.priority)
          });
        });

        DATA.onboardingBlocks.forEach((item) => {
          actions.push({
            id: item.id,
            title: item.title,
            description: `${item.creatorName} sigue bloqueada. ${item.impact}`,
            meta: `${item.creatorName} · Dia ${item.day}`,
            view: "creators",
            tone: "warning"
          });
        });

        getAtRiskCreators().forEach((creator) => {
          actions.push({
            id: creator.id,
            title: `Check-in con ${creator.name}`,
            description: `Revisar retencion y conversion con ${creator.accountManager} antes de que siga cayendo el margen.`,
            meta: `${creator.accountManager} · ${creator.updated}`,
            view: "creators",
            tone: "danger"
          });
        });

        return actions.slice(0, 6);
      }

      function getViewFilterCount(viewKey = state.view) {

      function getCreatorContentSummary(creatorId) {
        const pieces = DATA.contentPieces.filter((piece) => piece.creatorId === creatorId);
        const queue = DATA.queue.filter((item) => item.creatorId === creatorId);

        return {
          pieces,
          queue,
          winners: pieces.filter((piece) => piece.status === "winner").length,

          pendingRecording: pieces.filter((piece) => ["idea", "scripted", "recorded"].includes(piece.status)).length,
          pendingPublishing: queue.filter((item) => item.status === "scheduled").length,
          failedPosts: queue.filter((item) => item.status === "failed").length
        };
      }

      function getCreatorBlocks(creator) {
        return DATA.onboardingBlocks.filter((block) => block.creatorName === creator.name);
      }

      function getProfileTasks(creator) {
        return ensureArray(creator?.ops?.tasks).map((task) => normalizeProfileTask(task, creator.id));
      }

      function isProfileTaskDone(task) {
        return task.status === "done";
      }

      function isProfileTaskOverdue(task) {
        if (!task?.due || isProfileTaskDone(task)) return false;
        const dueDate = new Date(task.due);
        if (Number.isNaN(dueDate.getTime())) return false;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        dueDate.setHours(0, 0, 0, 0);
        return dueDate < today;
      }

      function sortProfileTasks(tasks) {
        const priorityOrder = { critical: 0, high: 1, medium: 2, low: 3 };

        return [...tasks].sort((a, b) => {
          if (isProfileTaskDone(a) !== isProfileTaskDone(b)) {
            return isProfileTaskDone(a) ? 1 : -1;
          }
          if (Boolean(a.blocked) !== Boolean(b.blocked)) {
            return a.blocked ? -1 : 1;
          }
          if (Boolean(a.recommended) !== Boolean(b.recommended)) {
            return a.recommended ? -1 : 1;
          }
          if (isProfileTaskOverdue(a) !== isProfileTaskOverdue(b)) {
            return isProfileTaskOverdue(a) ? -1 : 1;
          }
          const aPriority = priorityOrder[a.priority] ?? 9;
          const bPriority = priorityOrder[b.priority] ?? 9;
          if (aPriority !== bPriority) return aPriority - bPriority;
          return a.title.localeCompare(b.title);
        });
      }

      function getProfileTaskGroups(tasks) {
        return tasks.reduce((groups, task) => {
          const key = `${task.area}:${task.phase}`;
          groups[key] = groups[key] || {
            area: task.area,
            phase: task.phase,
            title: PROFILE_PHASE_LABELS[task.phase] || "Fase",
            tasks: []
          };
          groups[key].tasks.push(task);
          return groups;
        }, {});
      }

      function getProfileProgress(creator) {
        const tasks = getProfileTasks(creator);
        const total = tasks.length;
        const completed = tasks.filter((task) => isProfileTaskDone(task)).length;
        return {
          total,
          completed,
          pending: total - completed,
          percentage: total ? Math.round((completed / total) * 100) : 0
        };
      }

      function getProfileNowData(creator) {
        const tasks = sortProfileTasks(getProfileTasks(creator));
        const pending = tasks.filter((task) => !isProfileTaskDone(task));
        const blocks = [
          ...pending.filter((task) => task.blocked),
          ...getCreatorBlocks(creator).map((block) => ({
            id: block.id,
            title: block.title,
            notes: block.impact,
            owner: block.owner,
            source: "block"
          }))
        ];
        const overdue = pending.filter((task) => isProfileTaskOverdue(task));
        const critical = pending.filter((task) => task.priority === "critical" || task.recommended || task.blocked).slice(0, 6);
        const nextStep = pending.find((task) => task.recommended || task.priority === "critical") || pending[0] || null;
        const todayActions = pending.filter((task) => task.priority !== "low" || task.recommended).slice(0, 6);

        return { pending, critical, nextStep, blocks, overdue, todayActions };
      }

      function getCreatorRetentionStatusLabel(value) {
        return PROFILE_RETENTION_LABELS[value] || "Sin definir";
      }

      function markProfileTaskStatus(creatorId, taskId, done) {
        const creator = getCreatorById(creatorId);
        if (!creator) return;

        creator.ops.tasks = getProfileTasks(creator).map((task) => {
          if (task.id !== taskId) return task;
          return {
            ...task,
            status: done ? "done" : "pending",
            completedAt: done ? formatDateTimeLabel() : ""
          };
        });

        touchCreator(creator);
        queueSave();
      }

      function addProfileTask(creatorId, payload) {
        const creator = getCreatorById(creatorId);
        if (!creator) return;

        creator.ops.tasks.unshift(
          normalizeProfileTask(
            {
              id: createId("perfil-task"),
              creatorId,
              area: payload.area,
              phase: payload.phase || "manual",
              title: payload.title,
              status: "pending",
              priority: payload.priority || "medium",
              owner: payload.owner || "",
              blocked: Boolean(payload.blocked),
              recommended: Boolean(payload.recommended),
              due: payload.due || "",
              notes: payload.notes || "",
              createdAt: formatDateTimeLabel(),
              source: "manual"
            },
            creatorId
          )
        );

        touchCreator(creator);
        queueSave();
      }

      function addProfileNote(creatorId, payload) {
        const creator = getCreatorById(creatorId);
        if (!creator) return;

        creator.ops.notes.unshift({
          id: createId("perfil-note"),
          text: payload.text,
          area: payload.area || state.creatorTab || "summary",
          createdAt: formatDateTimeLabel()
        });

        touchCreator(creator);
        queueSave();
      }

      function updateProfileBlock(creatorId, block, values) {
        const creator = getCreatorById(creatorId);
        if (!creator) return;

        creator.ops[block] = {
          ...(creator.ops[block] || {}),
          ...values
        };

        touchCreator(creator);
        queueSave();
      }

      function getProfileTaskAreaDefault() {
        return PROFILE_TASK_AREAS.includes(state.creatorTab) ? state.creatorTab : "onboarding";
      }

      function saveProfileInlineForm(form) {
        const creatorId = form.dataset.creatorId || "";
        const formType = form.dataset.profileForm || "";
        const formData = new FormData(form);

        if (formType === "task") {
          addProfileTask(creatorId, {
            title: String(formData.get("title") || "").trim(),
            area: String(formData.get("area") || getProfileTaskAreaDefault()),
            phase: String(formData.get("phase") || "manual"),
            priority: String(formData.get("priority") || "medium"),
            owner: String(formData.get("owner") || "").trim(),
            due: String(formData.get("due") || "").trim(),
            blocked: formData.get("blocked") === "on",
            recommended: formData.get("recommended") === "on",
            notes: String(formData.get("notes") || "").trim()
          });

          setState({ creatorComposer: null });
          return;
        }

        if (formType === "note") {
          addProfileNote(creatorId, {
            area: String(formData.get("area") || "summary"),
            text: String(formData.get("text") || "").trim()
          });

          setState({ creatorComposer: null });
          return;
        }

        if (formType === "system") {
          updateProfileBlock(creatorId, "system", {
            canalPrincipal: String(formData.get("canalPrincipal") || "").trim(),
            onlyfans: String(formData.get("onlyfans") || "").trim(),
            telegram: String(formData.get("telegram") || "").trim(),
            instagram: String(formData.get("instagram") || "").trim(),
            tiktok: String(formData.get("tiktok") || "").trim(),
            x: String(formData.get("x") || "").trim(),
            warmup: String(formData.get("warmup") || "").trim(),
            accesos: String(formData.get("accesos") || "").trim(),

        if (formType === "marketing") {
          updateProfileBlock(creatorId, "marketing", {
            origenTrafico: String(formData.get("origenTrafico") || "").trim(),
            promoActual: String(formData.get("promoActual") || "").trim(),
            paidTest: String(formData.get("paidTest") || "").trim(),
            links: String(formData.get("links") || "").trim(),

          });

          render({ focusSelector: '[data-profile-form="marketing"] button[type="submit"]' });
          return;
        }

        if (formType === "metrics") {
          updateProfileBlock(creatorId, "metrics", {
            trafico: String(formData.get("trafico") || "").trim(),
            rendimientoContenido: String(formData.get("rendimientoContenido") || "").trim()
          });

          render({ focusSelector: '[data-profile-form="metrics"] button[type="submit"]' });
          return;
        }

        if (formType === "retention") {
          updateProfileBlock(creatorId, "retention", {
            ultimoCheckIn: String(formData.get("ultimoCheckIn") || "").trim(),
            proximoCheckIn: String(formData.get("proximoCheckIn") || "").trim(),
            fricciones: String(formData.get("fricciones") || "").trim(),
            limites: String(formData.get("limites") || "").trim(),
            wins: String(formData.get("wins") || "").trim(),
            siguienteAccion: String(formData.get("siguienteAccion") || "").trim()
          });

          render({ focusSelector: '[data-profile-form="retention"] button[type="submit"]' });
        }
      }

          placeholder = "",
          required = false,
          min = null,
          max = null,

        } = options;
        const inputId = `modal-field-${name}`;

            <label for="${inputId}">${escapeHtml(label)}</label>
            <input
              id="${inputId}"
              class="field-input"
              type="${type}"
              name="${name}"
              value="${escapeHtml(value)}"
              ${placeholder ? `placeholder="${escapeHtml(placeholder)}"` : ""}
              ${required ? "required" : ""}
              ${min !== null ? `min="${min}"` : ""}
              ${max !== null ? `max="${max}"` : ""}
              ${step !== null ? `step="${step}"` : ""}

      function renderProfileTaskGroup(creatorId, group, description = "") {
        const ordered = sortProfileTasks(group.tasks);
        const pending = ordered.filter((task) => !isProfileTaskDone(task));
        const completed = ordered.filter((task) => isProfileTaskDone(task));
        const allCompleted = ordered.length && pending.length === 0;

        if (!ordered.length) return "";

        if (allCompleted && !state.creatorShowCompleted) {
          return `
            <article class="profile-phase">
              <div class="profile-phase-collapsed">
                <div>
                  <strong>${escapeHtml(group.title)}</strong>
                  <p>${completed.length} tareas completadas. Esta fase esta recogida para no ensuciar la vista.</p>
                </div>
                <button class="ghost-button" data-action="toggle-creator-completed">Ver completadas</button>
              </div>
            </article>
          `;
        }

        const visibleTasks = state.creatorShowCompleted ? ordered : pending;

        return `
          <article class="profile-phase">
            <div class="profile-phase-head">
              <div>
                <h4>${escapeHtml(group.title)}</h4>
                <p>${escapeHtml(description || `${pending.length} pendientes · ${completed.length} completadas`)}</p>
              </div>
              ${badge(`${pending.length}/${ordered.length} pendientes`, pending.length ? "warning" : "success")}
            </div>
            <div class="profile-phase-list">
              ${visibleTasks.length
                ? visibleTasks.map((task) => renderProfileTaskCard(creatorId, task)).join("")
                : renderEmptyState("Todo al dia", "No hay tareas pendientes en esta fase.", true)}
            </div>
          </article>
        `;
      }

      function renderProfileTaskArea(creator, area, options = {}) {
        const tasks = sortProfileTasks(getProfileTasks(creator).filter((task) => task.area === area));
        const grouped = Object.values(getProfileTaskGroups(tasks));

        if (!grouped.length) {
          return renderEmptyState(
            options.emptyTitle || "Sin tareas en este bloque",
            options.emptyDescription || "Anade tareas manuales para empezar a operar esta area.",
            true
          );
        }

        return grouped
          .sort((a, b) => {
            const aIndex = PROFILE_PHASE_ORDER.indexOf(a.phase);
            const bIndex = PROFILE_PHASE_ORDER.indexOf(b.phase);
            if (aIndex !== bIndex) {
              return (aIndex === -1 ? 999 : aIndex) - (bIndex === -1 ? 999 : bIndex);
            }
            return (PROFILE_PHASE_LABELS[a.phase] || a.phase).localeCompare(PROFILE_PHASE_LABELS[b.phase] || b.phase);
          })
          .map((group) => renderProfileTaskGroup(creator.id, group))
          .join("");
      }

      function upsertItem(collection, item) {
        const index = collection.findIndex((entry) => entry.id === item.id);
        if (index >= 0) {
          collection[index] = item;
        } else {
          collection.unshift(item);
        }
      }

      function saveProfileForm(formData) {
        DATA.user = {
          ...DATA.user,
          agencyName: String(formData.get("agencyName") || "").trim() || DEFAULT_DATA.user.agencyName,
          workspaceLabel: String(formData.get("workspaceLabel") || "").trim() || DEFAULT_DATA.user.workspaceLabel,
          name: String(formData.get("name") || "").trim() || DEFAULT_DATA.user.name,
          role: String(formData.get("role") || "").trim() || DEFAULT_DATA.user.role,
          email: String(formData.get("email") || "").trim()
        };
      }

      function saveLeadForm(formData, id) {
        const existing = getEntityItem("lead", id);
        const item = {
          id: id || createId("lead"),
          name: String(formData.get("name") || "").trim(),
          handle: String(formData.get("handle") || "").trim(),
          niche: String(formData.get("niche") || "").trim(),
          country: String(formData.get("country") || "").trim(),
          status: String(formData.get("status") || "new"),
          revenue: Number(formData.get("revenue") || 0),
          source: String(formData.get("source") || "").trim(),
          updated: String(formData.get("updated") || "").trim() || formatDateTimeLabel(),
          createdRank: existing?.createdRank || DATA.leads.length + 1
        };

        upsertItem(DATA.leads, item);
      }

      function saveCreatorForm(formData, id) {
        const existing = getEntityItem("creator", id);
        const onboardingPct = Math.min(100, Math.max(0, Number(formData.get("onboardingPct") || 0)));
        const stage = String(formData.get("stage") || "onboarding");
        const creatorId = id || existing?.id || createId("creator");

        const item = {
          id: creatorId,
          name: String(formData.get("name") || "").trim(),
          handle: String(formData.get("handle") || "").trim(),
          niche: String(formData.get("niche") || "").trim(),
          stage,
          tier: String(formData.get("tier") || "starter"),
          accountManager: String(formData.get("accountManager") || "").trim(),
          retention: String(formData.get("retention") || "healthy"),
          onboardingPct: stage === "onboarding" ? onboardingPct : 100,
          updated: String(formData.get("updated") || "").trim() || formatDateTimeLabel(),
          ops: normalizeCreatorOps(existing?.ops, { id: creatorId })
        };

        upsertItem(DATA.creators, normalizeCreator(item));

        if (existing && existing.name !== item.name) {
          DATA.onboardingBlocks = DATA.onboardingBlocks.map((block) =>
            block.creatorName === existing.name ? { ...block, creatorName: item.name } : block
          );
          DATA.contentPieces = DATA.contentPieces.map((piece) =>
            piece.creatorId === item.id ? { ...piece, creatorName: item.name } : piece
          );
          DATA.queue = DATA.queue.map((entry) =>
            entry.creatorId === item.id ? { ...entry, creatorName: item.name } : entry
          );
          DATA.metrics = DATA.metrics.map((metric) =>
            metric.creatorId === item.id ? { ...metric, creatorName: item.name } : metric
          );
        }
      }

      function saveTaskForm(formData, id) {
        const item = {
          id: id || createId("task"),
          title: String(formData.get("title") || "").trim(),
          description: String(formData.get("description") || "").trim(),
          priority: String(formData.get("priority") || "medium"),
          status: String(formData.get("status") || "pending"),
          owner: String(formData.get("owner") || "").trim(),
          type: String(formData.get("type") || "").trim() || "general",
          due: String(formData.get("due") || "").trim(),
          overdue: formData.get("overdue") === "on",
          tags: String(formData.get("tags") || "")
            .split(",")
            .map((tag) => tag.trim())
            .filter(Boolean)
        };

        upsertItem(DATA.tasks, item);
      }

      function saveEntityForm(form) {
        const formData = new FormData(form);
        const entity = form.dataset.entityForm;
        const id = form.dataset.id || "";

        if (entity === "profile") saveProfileForm(formData);
        if (entity === "lead") saveLeadForm(formData, id);
        if (entity === "creator") saveCreatorForm(formData, id);
        if (entity === "task") saveTaskForm(formData, id);

        queueSave();
      }

      function deleteEntityItem(entity, id) {
        if (entity === "lead") {
          DATA.leads = DATA.leads.filter((item) => item.id !== id);
        }

        if (entity === "task") {
          DATA.tasks = DATA.tasks.filter((item) => item.id !== id);
        }

        if (entity === "creator") {
          const creator = getEntityItem("creator", id);
          DATA.creators = DATA.creators.filter((item) => item.id !== id);

          if (creator) {
            DATA.onboardingBlocks = DATA.onboardingBlocks.filter((item) => item.creatorName !== creator.name);
            DATA.contentPieces = DATA.contentPieces.filter((item) => item.creatorId !== id);
            DATA.queue = DATA.queue.filter((item) => item.creatorId !== id);
            DATA.metrics = DATA.metrics.filter((item) => item.creatorId !== id);
          }
        }

        queueSave();
      }
