      function filterTasks() {
        const query = state.taskSearch.trim().toLowerCase();

        return DATA.tasks.filter((task) => {
          const matchSearch = !query || [task.title, task.description, task.owner, task.type, ...(task.tags || [])].some((field) =>
            String(field || "").toLowerCase().includes(query)
          );
          const matchPriority = state.taskPriority === "all" || task.priority === state.taskPriority;
          const matchStatus = state.taskStatus === "all"
            || (state.taskStatus === "active" && !["done", "cancelled"].includes(task.status))
            || (state.taskStatus === "done" && task.status === "done")
            || task.status === state.taskStatus;

          return matchSearch && matchPriority && matchStatus;
        });
      }

      function filterSops() {
        const query = state.sopSearch.trim().toLowerCase();
        return DATA.sops.filter((sop) => {
          const matchSearch = !query || [sop.title, sop.summary, SOP_DEPARTMENT_LABELS[sop.department], sop.docRef].some((field) =>
            String(field || "").toLowerCase().includes(query)
          );
          const matchDepartment = state.sopDepartment === "all" || sop.department === state.sopDepartment;
          return matchSearch && matchDepartment;
        });
      }

      function isRecentSop(updated) {
        const [day, month, year] = updated.split("/").map(Number);
        if (!day || !month || !year) return false;
        const updatedDate = new Date(year, month - 1, day);
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        const diffMs = now - updatedDate;
        return diffMs <= 7 * 24 * 60 * 60 * 1000;
      }

      function renderSops() {
        const sops = filterSops();
        const departments = ["all", "sales", "onboarding", "content", "chatting", "ops", "analytics", "general"];
        const grouped = sops.reduce((acc, sop) => {
          const key = sop.department;
          acc[key] = acc[key] || [];
          acc[key].push(sop);
          return acc;
        }, {});
        const recentUpdates = DATA.sops.filter((sop) => isRecentSop(sop.updated)).length;
        const opsCoverage = DATA.sops.filter((sop) => ["sales", "onboarding", "chatting", "ops"].includes(sop.department)).length;
        const reviewSuggested = DATA.sops.filter((sop) => !isRecentSop(sop.updated)).length;

        return `
          <section class="section">
            <div class="grid-4">
              ${renderStatCard("Biblioteca activa", DATA.sops.length, "guias vivas", "sops", "info")}
              ${renderStatCard("Areas cubiertas", Object.keys(SOP_DEPARTMENT_LABELS).length, "frentes documentados", "dashboard", "primary")}
              ${renderStatCard("Actualizados", recentUpdates, "ultimos 7 dias", "check", "success")}
              ${renderStatCard("Revision sugerida", reviewSuggested, "conviene revisar este mes", "warning", reviewSuggested ? "warning" : "success")}
            </div>
            <div class="filter-row">
              <label class="screen-reader" for="sop-search">Buscar SOPs</label>
              <input id="sop-search" class="search-input" aria-label="Buscar SOPs, areas o referencias" placeholder="Buscar SOPs, areas o referencias..." value="${escapeHtml(state.sopSearch)}" />
              <div class="filter-group" role="group" aria-label="Filtrar SOPs por area">
                ${departments.map((department) => `
                  <button class="filter-button ${state.sopDepartment === department ? "active" : ""}" data-action="set-sop-department" data-value="${department}" aria-pressed="${state.sopDepartment === department}">
                    ${department === "all" ? "Todas" : SOP_DEPARTMENT_LABELS[department]}
                  </button>
                `).join("")}
              </div>
              <div class="chip">
                <span>Nucleo operativo</span>
                <strong>${opsCoverage}</strong>
              </div>
              <div class="filter-spacer"></div>
              ${renderResetFiltersButton("sops")}
            </div>
            ${sops.length ? Object.entries(grouped).map(([department, items]) => `
              <article class="card">
                <div class="card-header">
                  <div>
                    <h3>${SOP_DEPARTMENT_LABELS[department]}</h3>
                    <span>${items.length} documentos visibles</span>
                  </div>
                </div>
                <div class="card-body">
                  <div class="sop-grid">
                    ${items.map((sop) => `
                      <button class="sop-card" data-action="open-sop" data-id="${sop.id}" aria-label="Abrir SOP ${escapeHtml(sop.title)}">
                        <div class="sop-card-head">
                          ${badge(SOP_DEPARTMENT_LABELS[sop.department], toneForDepartment(sop.department))}
                          <span class="dim">v${escapeHtml(sop.version)}</span>
                        </div>
                        <h4>${escapeHtml(sop.title)}</h4>
                        <p class="muted">${escapeHtml(sop.summary)}</p>
                        <div class="card-tags" style="margin-top:16px;">
                          <span class="tag">${escapeHtml(sop.updated)}</span>
                          <span class="tag">${escapeHtml(sop.docRef)}</span>
                        </div>
                      </button>
                    `).join("")}
                  </div>
                </div>
              </article>
            `).join("") : `
              <article class="card">
                ${renderEmptyState("No hay SOPs para este filtro", "Ajusta la busqueda o vuelve a todas las areas.")}
              </article>
            `}
          </section>
        `;
      }

      function getAnalyticsData() {
        const selectedMetrics = state.analyticsCreator === "all"
          ? DATA.metrics
          : DATA.metrics.filter((metric) => metric.creatorId === state.analyticsCreator);

        const periods = [
          ["Jan", "Ene"],
          ["Feb", "Feb"],
          ["Mar", "Mar"],
          ["Apr", "Abr"]
        ];
        const timeSeries = periods.map(([periodKey, periodLabel]) => {
          const periodMetrics = selectedMetrics.filter((metric) => metric.period === periodKey);
          return {
            period: periodLabel,
            revenue: periodMetrics.reduce((sum, item) => sum + item.revenue, 0),
            margin: periodMetrics.reduce((sum, item) => sum + item.margin, 0)
          };
        });

        const latestMetrics = getLatestMetricsByCreator().sort((a, b) => b.revenue - a.revenue);
        const latestSelected = state.analyticsCreator === "all"
          ? {
              creatorName: "Equipo",
              revenue: latestMetrics.reduce((sum, item) => sum + item.revenue, 0),
              margin: latestMetrics.reduce((sum, item) => sum + item.margin, 0),
              subs: latestMetrics.reduce((sum, item) => sum + item.subs, 0),
              messages: latestMetrics.reduce((sum, item) => sum + item.messages, 0),
              tips: latestMetrics.reduce((sum, item) => sum + item.tips, 0),
              chatRatio: latestMetrics.length
                ? latestMetrics.reduce((sum, item) => sum + item.chatRatio, 0) / latestMetrics.length
                : 0
            }
          : DATA.metrics.filter((metric) => metric.creatorId === state.analyticsCreator).slice(-1)[0]
            || {
              creatorName: "Sin datos",
              revenue: 0,
              margin: 0,
              subs: 0,
              messages: 0,
              tips: 0,
              chatRatio: 0
            };

        return { timeSeries, latestMetrics, latestSelected };
      }

      function renderAnalytics() {
        const { timeSeries, latestMetrics, latestSelected } = getAnalyticsData();
        const totalRevenue = latestMetrics.reduce((sum, item) => sum + item.revenue, 0);
        const totalMargin = latestMetrics.reduce((sum, item) => sum + item.margin, 0);
        const totalSubs = latestMetrics.reduce((sum, item) => sum + item.subs, 0);
        const totalMessages = latestMetrics.reduce((sum, item) => sum + item.messages, 0);
        const avgChat = latestMetrics.length
          ? latestMetrics.reduce((sum, item) => sum + item.chatRatio, 0) / latestMetrics.length
          : 0;
        const maxValue = Math.max(...timeSeries.map((point) => Math.max(point.revenue, point.margin)), 1);
        const donutTotal = Math.max(latestSelected.subs + latestSelected.messages + latestSelected.tips, 1);
        const subsPct = (latestSelected.subs / donutTotal) * 360;
        const msgPct = (latestSelected.messages / donutTotal) * 360;
        const donutStyle = `background: conic-gradient(#8b6bff 0deg ${subsPct}deg, #58a6ff ${subsPct}deg ${subsPct + msgPct}deg, #31c48d ${subsPct + msgPct}deg 360deg);`;

        return `
          <section class="section">
            <div class="grid-4">
              ${renderStatCard("Ingresos actuales", currency(totalRevenue), "ultima lectura consolidada", "analytics", "primary")}
              ${renderStatCard("Margen actual", currency(totalMargin), "contribucion del equipo", "check", "success")}
              ${renderStatCard("Ingresos por suscripcion", currency(totalSubs), "base recurrente", "creators", "info")}
              ${renderStatCard("Ratio medio de chat", percent(avgChat), "promedio del equipo", "dashboard", "warning")}
            </div>
            <div class="filter-row">
              <div class="filter-group" role="group" aria-label="Filtrar analitica por creadora">
                <button class="filter-button ${state.analyticsCreator === "all" ? "active" : ""}" data-action="set-analytics-creator" data-value="all" aria-pressed="${state.analyticsCreator === "all"}">Equipo</button>
                ${DATA.creators.filter((creator) => creator.stage === "active").map((creator) => `
                  <button class="filter-button ${state.analyticsCreator === creator.id ? "active" : ""}" data-action="set-analytics-creator" data-value="${creator.id}" aria-pressed="${state.analyticsCreator === creator.id}">
                    ${escapeHtml(creator.name)}
                  </button>
                `).join("")}
              </div>
              <div class="filter-spacer"></div>
              ${renderResetFiltersButton("analytics")}
            </div>
            <div class="grid-3">
              <article class="card" style="grid-column: span 2;">
                <div class="card-header">
                  <div>
                    <h3>Ingresos por periodo</h3>
                    <span>${state.analyticsCreator === "all" ? "Agregado del equipo activo" : `Evolucion de ${escapeHtml(latestSelected.creatorName)}`}</span>
                  </div>
                </div>
                <div class="chart-shell">
                  <div class="bar-legend">
                    <span style="display:inline-flex;align-items:center;gap:8px;"><span class="legend-dot" style="background:#8b6bff;"></span>Ingresos</span>
                    <span style="display:inline-flex;align-items:center;gap:8px;"><span class="legend-dot" style="background:#31c48d;"></span>Margen</span>
                  </div>
                  <div class="bar-chart">
                    ${timeSeries.map((point) => `
                      <div class="bar-group">
                        <div class="bar-columns">
                          <div class="bar revenue" style="height:${(point.revenue / maxValue) * 170}px"></div>
                          <div class="bar margin" style="height:${(point.margin / maxValue) * 170}px"></div>
                        </div>
                        <div class="bar-label">${point.period}</div>
                        <div class="bar-note">${currency(point.revenue)}</div>
                      </div>
                    `).join("")}
                  </div>
                </div>
              </article>
              <article class="card">
                <div class="card-header">
                  <div>
                    <h3>Desglose de ingresos</h3>
                    <span>${escapeHtml(latestSelected.creatorName)}</span>
                  </div>
                </div>
                <div class="card-body donut-shell">
                  <div class="donut" style="${donutStyle}">
                    <div class="donut-center">
                      <div>
                        <strong>${currency(latestSelected.revenue)}</strong>
                        <span>Total</span>
                      </div>
                    </div>
                  </div>
                  <div class="metric-split">
                    <div class="metric-line">
                      <span style="display:inline-flex;align-items:center;gap:8px;"><span class="legend-dot" style="background:#8b6bff;"></span>Suscripciones</span>
                      <strong>${currency(latestSelected.subs)}</strong>
                    </div>
                    <div class="metric-line">
                      <span style="display:inline-flex;align-items:center;gap:8px;"><span class="legend-dot" style="background:#58a6ff;"></span>Mensajes</span>
                      <strong>${currency(latestSelected.messages)}</strong>
                    </div>
                    <div class="metric-line">
                      <span style="display:inline-flex;align-items:center;gap:8px;"><span class="legend-dot" style="background:#31c48d;"></span>Propinas</span>
                      <strong>${currency(latestSelected.tips)}</strong>
                    </div>
                    <div class="metric-line">
                      <span>Ratio de chat</span>
                      <strong>${percent(latestSelected.chatRatio)}</strong>
                    </div>
                  </div>
                </div>
              </article>
              <article class="card" style="grid-column: span 3;">
                <div class="card-header">
                  <div>
                    <h3>Rendimiento por perfil</h3>
                    <span>Lectura mas reciente por perfil activo</span>
                  </div>
                </div>
                ${latestMetrics.length ? `
                  <div class="table-wrap">
                    <table aria-label="Tabla de rendimiento por perfil">
                      <thead>
                        <tr>
                          <th>Perfil</th>
                          <th>Nivel</th>
                          <th>Ingresos</th>
                          <th>Suscripciones</th>
                          <th>Mensajes</th>
                          <th>Propinas</th>
                          <th>Margen</th>
                          <th>Ratio de chat</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${latestMetrics.map((metric) => `
                          <tr>
                            <td><span class="table-title">${escapeHtml(metric.creatorName)}</span></td>
                            <td>${badge(CREATOR_TIER_LABELS[metric.tier], "primary")}</td>
                            <td style="color:#d9cbff;">${currency(metric.revenue)}</td>
                            <td>${currency(metric.subs)}</td>
                            <td>${currency(metric.messages)}</td>
                            <td>${currency(metric.tips)}</td>
                            <td style="color:#96edca;">${currency(metric.margin)}</td>
                            <td>${percent(metric.chatRatio)}</td>
                          </tr>
                        `).join("")}
                      </tbody>
                    </table>
                  </div>
                ` : `
                  <div class="card-body">
                    ${renderEmptyState("Sin analitica cargada", "Puedes seguir usando clientes, perfiles y tareas aunque aun no hayas añadido metricas.")}
                  </div>
                `}
              </article>
            </div>
          </section>
        `;
      }

      function renderScaling() {
        const activeCount = DATA.creators.filter((creator) => creator.stage === "active").length;
        const onboardingCount = DATA.creators.filter((creator) => creator.stage === "onboarding").length;
        const blockedCount = DATA.onboardingBlocks.length;
        const criticalOverdue = DATA.tasks.filter((task) => task.priority === "critical" && task.overdue && task.status !== "done");
        const backlogCount = DATA.contentPieces.filter((piece) => ["idea", "scripted"].includes(piece.status)).length;
        const atRisk = getAtRiskCreators();
        const readinessScore = Math.max(
          0,
          100 - (blockedCount * 12) - (criticalOverdue.length * 18) - (Math.max(backlogCount - 8, 0) * 3) - (atRisk.length * 20)
        );
        const warnings = [
          { key: "blocked", label: "Bloqueos de onboarding", count: blockedCount, threshold: 2, details: DATA.onboardingBlocks.map((item) => `${item.title} · ${item.creatorName}`) },
          { key: "critical", label: "Tareas criticas vencidas", count: criticalOverdue.length, threshold: 1, details: criticalOverdue.map((task) => `${task.title} · ${task.owner}`) },
          { key: "backlog", label: "Contenido en backlog", count: backlogCount, threshold: 10, details: ["Ideas y scripts pendientes de producir."] },
          { key: "risk", label: "Perfiles en riesgo", count: atRisk.length, threshold: 1, details: atRisk.map((creator) => `${creator.name} · revisar retencion`) }
        ];
        const hasWarnings = warnings.some((warning) => warning.count > warning.threshold);

        return `
          <section class="section">
            <article class="readiness ${hasWarnings ? "" : "ok"}">
              <div>
                <h3>${hasWarnings ? "No abras nuevo embudo todavia" : "El sistema tiene margen para escalar"}</h3>
                <p>
                  ${hasWarnings
                    ? "Todavia hay friccion activa en onboarding, tareas criticas o salud del equipo. Antes de sumar mas volumen conviene recuperar capacidad y nivel de servicio operativo."
                    : "No hay senales de saturacion. La operacion puede absorber nuevas altas con control y sin deteriorar calidad."}
                </p>
              </div>
              <div class="readiness-meta">
                <span>Indice de capacidad</span>
                <strong>${readinessScore}/100</strong>
                <div class="muted" style="margin-top:8px;">${activeCount} perfiles activos · ${onboardingCount} onboarding</div>
              </div>
            </article>
            <div class="warning-grid">
              ${warnings.map((warning) => {
                const ok = warning.count <= warning.threshold;
                return `
                  <article class="warning-card ${ok ? "good" : "bad"}">
                    <div class="warning-card-head">
                      <div>
                        <strong>${warning.label}</strong>
                        <p>Limite sano ${warning.threshold} · actual ${warning.count}</p>
                      </div>
                      <div class="warning-count" style="color:${ok ? "#96edca" : "#ffc1c9"};">${warning.count}</div>
                    </div>
                    ${!ok ? `
                      <div class="detail-list">
                        ${warning.details.slice(0, 3).map((detail) => `
                          <div class="detail-item">
                            <span class="detail-bullet"></span>
                            <span>${escapeHtml(detail)}</span>
                          </div>
                        `).join("")}
                      </div>
                    ` : ""}
                  </article>
                `;
              }).join("")}
            </div>
            ${hasWarnings ? `
              <article class="card">
                <div class="card-header">
                  <div>
                    <h3>Acciones recomendadas</h3>
                    <span>Orden sugerido para recuperar capacidad operativa</span>
                  </div>
                </div>
                <div class="card-body" style="display:grid;gap:12px;">
                  <button class="recommendation" data-action="set-view" data-value="creators" aria-label="Abrir onboarding bloqueado">
                    <div class="badge tone-warning">${iconSlot("warning")}</div>
                    <div>
                      <strong>Desbloquear onboarding primero</strong>
                      <p>Resuelve accesos, aprobaciones y dependencias para que las altas en curso no se queden frenadas.</p>
                    </div>
                  </button>
                  <button class="recommendation" data-action="set-view" data-value="tasks" aria-label="Abrir tareas criticas">
                    <div class="badge tone-danger">${iconSlot("warning")}</div>
                    <div>
                      <strong>Cerrar bloqueos directos de revenue</strong>
                      <p>Ataca primero cualquier tarea critica o vencida que este frenando cierres, activaciones o cobros.</p>
                    </div>
                  </button>
                  <button class="recommendation" data-action="set-view" data-value="creators" aria-label="Abrir riesgo de retencion">
                    <div class="badge tone-info">${iconSlot("check")}</div>
                    <div>
                      <strong>Contener bajas antes de escalar</strong>
                      <p>Haz seguimiento de retencion y conversion antes de seguir sumando volumen al sistema.</p>
                    </div>
                  </button>
                </div>
              </article>
            ` : ""}
          </section>
        `;
      }

      const VIEW_RENDERERS = {
        dashboard: renderDashboard,
        leads: renderLeads,
        creators: renderCreators,
        content: renderContent,
        tasks: renderTasks,
        sops: renderSops,
        analytics: renderAnalytics,
        scaling: renderScaling
      };

      function renderMainContent() {
        const renderer = VIEW_RENDERERS[state.view] || renderDashboard;
        return renderer();
      }

      function renderModal() {
        if (state.activeForm) {
          return renderFormModal();
        }

        if (state.activeCreatorId) {
          return renderCreatorDrawer();
        }

        if (!state.activeSopId) return "";
        const sop = DATA.sops.find((item) => item.id === state.activeSopId);
        if (!sop) return "";

        return `
          <div class="modal-backdrop" data-action="close-modal">
            <div class="modal" role="dialog" aria-modal="true" aria-labelledby="sop-modal-title" tabindex="-1">
              <div class="modal-header">
                <div>
                  <h3 id="sop-modal-title">${escapeHtml(sop.title)}</h3>
                  <div style="margin-top:8px;">${badge(SOP_DEPARTMENT_LABELS[sop.department], toneForDepartment(sop.department))} ${badge(`v${sop.version}`, "default")}</div>
                </div>
                <button class="icon-button" data-action="close-modal" aria-label="Cerrar SOP">${iconSlot("close")}</button>
              </div>
              <div class="modal-body">
                <div class="doc-block">
                  <strong>Cuando usarlo</strong>
                  <div class="muted">${escapeHtml(SOP_USE_CASES[sop.department])}</div>
                </div>
                <div class="doc-block">
                  <strong>Resumen operativo</strong>
                  <div class="muted">${escapeHtml(sop.summary)}</div>
                </div>
                <div class="doc-block">
                  <strong>Referencia interna</strong>
                  <div class="muted">${escapeHtml(sop.docRef)}</div>
                </div>
                <div class="dim">Actualizado el ${escapeHtml(sop.updated)}</div>
              </div>
            </div>
          </div>
        `;
      }

      function render(options = {}) {
        document.body.classList.toggle("sidebar-open", state.mobileNav);
        document.body.classList.toggle("sidebar-collapsed", state.sidebarCollapsed);
        document.body.classList.toggle("modal-open", Boolean(state.activeSopId || state.activeForm || state.activeCreatorId));

        document.getElementById("app").innerHTML = `
          <button class="overlay" data-action="close-sidebar" aria-label="Cerrar navegacion lateral"></button>
          <div class="app-shell">
            ${renderSidebar()}
            <main class="main-panel" id="main-content" tabindex="-1">
              ${renderTopbar()}
              ${renderMainContent()}
            </main>
          </div>
          ${renderModal()}
        `;

        if (state.activeForm) {
          focusElement({ focusSelector: '.modal input:not([type="checkbox"]), .modal select, .modal textarea, .modal button' });
          return;
        }

        if (state.activeCreatorId) {
          focusElement({ focusSelector: '.profile-drawer [data-action="close-modal"]' });
          return;
        }

        if (state.activeSopId) {
          focusElement({ focusSelector: '.modal [data-action="close-modal"]' });
          return;
        }

        focusElement(options);
      }

      document.addEventListener("click", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;

        const { action, value, id, mode } = target.dataset;

        switch (action) {
          case "toggle-sidebar":
            setState({ mobileNav: !state.mobileNav });
            return;
          case "close-sidebar":
            setState({ mobileNav: false }, { focusSelector: ".mobile-toggle" });
            return;
          case "toggle-sidebar-collapsed":
            setState({ sidebarCollapsed: !state.sidebarCollapsed });
            return;
          case "set-view":
            setState({
              view: value,
              mobileNav: false,
              activeSopId: null,
              activeForm: null,
              activeCreatorId: null,
              creatorComposer: null,
              creatorShowCompleted: false
            });
            return;
          case "set-leads-view":
            setState({ leadsView: value });
            return;
          case "set-creator-stage":
            setState({ creatorStage: value });
            return;
          case "set-content-tab":
            setState({ contentTab: value });
            return;
          case "set-content-creator":
            setState({ contentCreator: value });
            return;
          case "set-content-type":
            setState({ contentType: value });
            return;
          case "set-task-status":
            setState({ taskStatus: value });
            return;
          case "set-task-priority":
            setState({ taskPriority: value });
            return;
          case "set-sop-department":
            setState({ sopDepartment: value });
            return;
          case "set-analytics-creator":
            setState({ analyticsCreator: value });
            return;
          case "reset-view-filters":
            resetViewFilters(value);
            return;
          case "open-form":
            modalReturnFocusSelector = `[data-action="open-form"][data-value="${value}"][data-mode="${mode || "create"}"]${id ? `[data-id="${id}"]` : ""}`;
            setState({
              activeSopId: null,
              activeCreatorId: null,
              creatorComposer: null,
              activeForm: {
                entity: value,
                mode: mode || "create",
                id: id || ""
              }
            });
            return;
          case "open-sop":
            modalReturnFocusSelector = `[data-action="open-sop"][data-id="${id}"]`;
            setState({ activeSopId: id, activeForm: null, activeCreatorId: null, creatorComposer: null });
            return;
          case "open-creator-detail":
            modalReturnFocusSelector = `[data-action="open-creator-detail"][data-id="${id}"]`;
            setState({
              activeSopId: null,
              activeForm: null,
              activeCreatorId: id,
              creatorTab: "now",
              creatorShowCompleted: false,
              creatorComposer: null
            });
            return;
          case "set-creator-tab":
            setState({ creatorTab: value, creatorComposer: null });
            return;
          case "toggle-creator-completed":
            setState({ creatorShowCompleted: !state.creatorShowCompleted });
            return;
          case "toggle-creator-composer":
            setState({ creatorComposer: state.creatorComposer === value ? null : value });
            return;
          case "complete-profile-task":
            markProfileTaskStatus(value, id, true);
            render({ focusSelector: `[data-action="toggle-creator-completed"]` });
            return;
          case "reopen-profile-task":
            markProfileTaskStatus(value, id, false);
            render({ focusSelector: `[data-action="toggle-creator-completed"]` });
            return;
          case "delete-item": {
            const label = value === "lead" ? "cliente" : value === "creator" ? "perfil" : "tarea";
            if (!window.confirm(`Quieres borrar este ${label}? Esta accion no se puede deshacer.`)) {
              return;
            }

            deleteEntityItem(value, id);

            if (state.activeForm && state.activeForm.id === id) {
              closeModal();
            } else {
              render({ focusId: VIEW_FOCUS_IDS[state.view] || null });
            }
            return;
          }
          case "close-modal":
            if ((target.classList.contains("modal-backdrop") || target.classList.contains("drawer-backdrop")) && event.target !== target) {
              return;
            }
            closeModal();
            return;
          default:
            return;
        }
      });

      document.addEventListener("submit", (event) => {
        const profileForm = event.target.closest("form[data-profile-form]");
        if (profileForm) {
          event.preventDefault();
          saveProfileInlineForm(profileForm);
          return;
        }

        const form = event.target.closest("form[data-entity-form]");
        if (!form) return;

        event.preventDefault();
        saveEntityForm(form);
        closeModal();
      });

      document.addEventListener("input", (event) => {
        const target = event.target;

        if (target.id === "leads-search") {
          setState({ leadsSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "creators-search") {
          setState({ creatorsSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "task-search") {
          setState({ taskSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "sop-search") {
          setState({ sopSearch: target.value }, { focusId: target.id });
        }
      });

      document.addEventListener("change", (event) => {
        const target = event.target;
        const taskId = target.dataset ? target.dataset.taskSelect : null;
        if (!taskId) return;

        const task = DATA.tasks.find((item) => item.id === taskId);
        if (!task) return;

        task.status = target.value;
        queueSave();
        render({ focusSelector: `[data-task-select="${taskId}"]` });
      });

      window.addEventListener("keydown", (event) => {
        if ((event.key === "Enter" || event.key === " ") && event.target.matches?.('[data-action="open-creator-detail"]')) {
          event.preventDefault();
          event.target.click();
          return;
        }

        if (event.key === "Escape" && (state.activeSopId || state.activeForm || state.activeCreatorId)) {
          closeModal();
          return;
        }

        if (event.key === "Escape" && state.mobileNav) {
          setState({ mobileNav: false }, { focusSelector: ".mobile-toggle" });
          return;
        }

        if (event.key === "Tab" && (state.activeSopId || state.activeForm || state.activeCreatorId)) {
          const modal = document.querySelector(".modal") || document.querySelector(".profile-drawer");
          if (!modal) return;

          const focusable = Array.from(
            modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])')
          ).filter((element) => !element.hasAttribute("disabled"));

          if (!focusable.length) return;

          const first = focusable[0];
          const last = focusable[focusable.length - 1];

          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        }
      });

      window.addEventListener("resize", () => {
        if (window.innerWidth > 1024 && state.mobileNav) {
          state.mobileNav = false;
          render();
        }
      });

      async function boot() {
        hydrateData();
        hydrateState();
        render();

        await loadRemoteData();

        hasHydratedApp = true;
        render();

        if (pendingRemoteSave) {
          queueSave(0);
        }
      }

      boot().catch((error) => {
        console.error("Error arrancando la app:", error);
        hasHydratedApp = true;
        setSyncStatus("error");
        render();
      });
    </script>
  </body>
</html>
