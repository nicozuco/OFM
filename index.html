<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Panel OFM | Control editable</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #070b12;
        --bg-soft: #0d131d;
        --panel: rgba(14, 19, 31, 0.92);
        --panel-strong: #121a29;
        --panel-muted: #182131;
        --panel-subtle: rgba(255, 255, 255, 0.03);
        --surface: linear-gradient(180deg, rgba(18, 25, 41, 0.96), rgba(12, 17, 29, 0.96));
        --surface-raised: linear-gradient(180deg, rgba(22, 30, 48, 0.98), rgba(13, 19, 32, 0.98));
        --control-bg: rgba(255, 255, 255, 0.045);
        --control-bg-hover: rgba(255, 255, 255, 0.07);
        --border: rgba(150, 167, 206, 0.14);
        --border-strong: rgba(176, 193, 236, 0.28);
        --text: #f3f6ff;
        --text-soft: #b8c4de;
        --text-dim: #8b97b8;
        --primary: #8b6bff;
        --primary-soft: rgba(139, 107, 255, 0.16);
        --success: #31c48d;
        --success-soft: rgba(49, 196, 141, 0.16);
        --warning: #f5a524;
        --warning-soft: rgba(245, 165, 36, 0.16);
        --danger: #f05f73;
        --danger-soft: rgba(240, 95, 115, 0.14);
        --info: #58a6ff;
        --info-soft: rgba(88, 166, 255, 0.14);
        --shadow: 0 24px 56px rgba(4, 8, 16, 0.32);
        --shadow-soft: 0 16px 34px rgba(4, 8, 16, 0.2);
        --radius-xl: 26px;
        --radius-lg: 20px;
        --radius-md: 16px;
        --radius-sm: 12px;
        --headline-font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
        --body-font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(82, 62, 165, 0.18), transparent 28%),
          radial-gradient(circle at 86% 12%, rgba(28, 104, 186, 0.12), transparent 22%),
          linear-gradient(180deg, #060a11 0%, #0a101a 100%);
        color: var(--text);
        font-family: var(--body-font);
        line-height: 1.45;
        font-feature-settings: "cv11", "ss01";
        letter-spacing: -0.011em;
        -webkit-font-smoothing: antialiased;
        overflow-y: scroll;
      }

      h1, h2, h3, h4, .eyebrow, .nav-label {
        letter-spacing: -0.02em;
      }

      .stat-card strong, .kpi-board strong, .donut-center strong,
      [class*="metric"] strong, [class*="kpi"] strong {
        font-variant-numeric: tabular-nums;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 28px 28px;
        opacity: 0.08;
        pointer-events: none;
        mask-image: radial-gradient(circle at center, black 28%, transparent 88%);
      }

      body.modal-open,
      body.sidebar-open {
        overflow: hidden;
      }

      ::selection {
        background: rgba(139, 107, 255, 0.34);
        color: #fff;
      }

      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(139, 151, 184, 0.25);
        border-radius: 999px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
        border: 0;
        background: none;
        color: inherit;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      a {
        color: inherit;
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible,
      [tabindex]:focus-visible {
        outline: none;
        border-color: rgba(88, 166, 255, 0.48);
        box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.12);
      }

      .screen-reader {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .skip-link {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 60;
        transform: translateY(-160%);
        padding: 10px 14px;
        border-radius: 12px;
        background: #fff;
        color: #09111d;
        font-weight: 700;
        text-decoration: none;
        transition: 180ms ease;
      }

      .skip-link:focus {
        transform: translateY(0);
      }

      .app-shell {
        position: relative;
        display: grid;
        grid-template-columns: 292px minmax(0, 1fr);
        gap: 24px;
        min-height: 100vh;
        padding: 24px;
      }

      .sidebar {
        position: sticky;
        top: 24px;
        height: calc(100vh - 48px);
        display: flex;
        flex-direction: column;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(180deg, rgba(15, 21, 33, 0.98), rgba(10, 15, 25, 0.96)),
          linear-gradient(180deg, rgba(139, 107, 255, 0.05), transparent 42%);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .sidebar::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 24%);
        pointer-events: none;
      }

      .sidebar::after {
        content: "";
        position: absolute;
        right: -50px;
        bottom: -70px;
        width: 170px;
        height: 170px;
        background: radial-gradient(circle, rgba(139, 107, 255, 0.12), transparent 72%);
        pointer-events: none;
      }

      .logo-block {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 8px 10px 18px;
        border-bottom: 1px solid var(--border);
      }

      .logo-brand {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .logo-glyph {
        width: 46px;
        height: 46px;
        display: grid;
        place-items: center;
        border-radius: 15px;
        border: 1px solid rgba(139, 107, 255, 0.32);
        background: linear-gradient(135deg, rgba(139, 107, 255, 0.22), rgba(88, 166, 255, 0.12));
        color: #f7f2ff;
      }

      .logo-copy h1 {
        margin: 0;
        font: 700 1rem/1 var(--headline-font);
        letter-spacing: -0.03em;
      }

      .logo-copy p {
        margin: 6px 0 0;
        color: var(--text-dim);
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .sidebar-collapse,
      .mobile-toggle,
      .icon-button {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-soft);
        transition: 180ms ease;
      }

      .sidebar-collapse:hover,
      .mobile-toggle:hover,
      .icon-button:hover {
        color: var(--text);
        border-color: var(--border-strong);
        background: rgba(255, 255, 255, 0.05);
      }

      .mobile-toggle {
        display: none;
      }

      .sidebar nav {
        flex: 1;
        padding: 18px 4px 8px;
        overflow: auto;
      }

      .nav-group {
        margin-bottom: 18px;
      }

      .nav-label {
        margin: 0 8px 12px;
        color: rgba(184, 196, 222, 0.52);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .nav-button {
        width: 100%;
        display: grid;
        grid-template-columns: 36px minmax(0, 1fr);
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        margin-bottom: 6px;
        border: 1px solid transparent;
        border-radius: 15px;
        color: var(--text-soft);
        text-align: left;
        transition: 180ms ease;
      }

      .nav-button:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.035);
      }

      .nav-button.active {
        color: var(--text);
        border-color: rgba(139, 107, 255, 0.18);
        background:
          linear-gradient(135deg, rgba(139, 107, 255, 0.14), rgba(88, 166, 255, 0.06)),
          rgba(255, 255, 255, 0.025);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .nav-icon {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        color: inherit;
      }

      .nav-button.active .nav-icon {
        background: rgba(139, 107, 255, 0.18);
      }

      .nav-copy strong {
        display: block;
        margin-bottom: 2px;
        font-size: 0.92rem;
      }

      .nav-copy span {
        display: block;
        color: var(--text-dim);
        font-size: 0.74rem;
      }

      .sidebar-footer {
        display: grid;
        gap: 12px;
        margin-top: auto;
      }

      .sidebar-note,
      .user-card {
        position: relative;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
      }

      .sidebar-note {
        padding: 14px;
      }

      .sidebar-note-label {
        display: block;
        color: var(--text-dim);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .sidebar-note strong {
        display: block;
        margin-top: 10px;
        font: 700 1rem/1.2 var(--headline-font);
      }

      .sidebar-note p {
        margin: 6px 0 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .user-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px;
      }

      .avatar {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(139, 107, 255, 0.26), rgba(88, 166, 255, 0.16));
        color: #fff;
        font-weight: 700;
        flex: 0 0 42px;
      }

      .user-card strong {
        display: block;
        margin-bottom: 3px;
        font-size: 0.92rem;
      }

      .user-card span {
        display: block;
        color: var(--text-dim);
        font-size: 0.74rem;
      }

      .main-panel {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }

      .topbar {
        position: sticky;
        top: 24px;
        z-index: 24;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 22px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(180deg, rgba(15, 21, 34, 0.94), rgba(10, 15, 26, 0.9)),
          rgba(13, 18, 29, 0.88);
        backdrop-filter: blur(20px);
        box-shadow: var(--shadow-soft);
      }

      .topbar-main {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        min-width: 0;
      }

      .topbar-kicker {
        margin-bottom: 8px;
        color: rgba(184, 196, 222, 0.6);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .topbar h2 {
        margin: 0;
        font: 700 1.32rem/1.08 var(--headline-font);
        letter-spacing: -0.04em;
      }

      .topbar p {
        margin: 6px 0 0;
        color: var(--text-soft);
        font-size: 0.9rem;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-soft);
        font-size: 0.8rem;
        white-space: nowrap;
      }

      .chip strong {
        color: var(--text);
        font-size: 0.84rem;
      }

      .chip-danger {
        border-color: rgba(240, 95, 115, 0.24);
        background: rgba(240, 95, 115, 0.08);
        color: #f7c7cf;
      }

      .chip-success {
        border-color: rgba(49, 196, 141, 0.24);
        background: rgba(49, 196, 141, 0.08);
        color: #9deccc;
      }

      .chip-warning {
        border-color: rgba(245, 165, 36, 0.24);
        background: rgba(245, 165, 36, 0.08);
        color: #ffd59d;
      }

      .chip-info {
        border-color: rgba(88, 166, 255, 0.24);
        background: rgba(88, 166, 255, 0.08);
        color: #bedfff;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }

      .section {
        display: flex;
        flex-direction: column;
        gap: 20px;
        animation: fade-in 220ms ease;
      }

      .hero-banner {
        display: grid;
        grid-template-columns: minmax(0, 1.7fr) minmax(310px, 1fr);
        gap: 20px;
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(180deg, rgba(16, 22, 36, 0.98), rgba(11, 16, 27, 0.98)),
          radial-gradient(circle at top right, rgba(139, 107, 255, 0.1), transparent 34%);
        box-shadow: var(--shadow);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: rgba(184, 196, 222, 0.76);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .hero-copy {
        display: grid;
        gap: 16px;
        align-content: start;
      }

      .hero-banner h3 {
        margin: 0;
        font: 700 2rem/1.02 var(--headline-font);
        letter-spacing: -0.05em;
        max-width: 14ch;
      }

      .hero-banner p {
        margin: 0;
        color: #d6def4;
        max-width: 62ch;
      }

      .hero-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .hero-primary {
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
      }

      .hero-primary-label {
        display: block;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .hero-primary strong {
        display: block;
        margin-top: 10px;
        font-size: 1rem;
      }

      .hero-primary p {
        margin-top: 6px;
        color: var(--text-soft);
        font-size: 0.86rem;
      }

      .hero-side {
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .hero-stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .hero-stat {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
      }

      .hero-stat span {
        display: block;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .hero-stat strong {
        display: block;
        margin-top: 10px;
        font: 700 1.52rem/1 var(--headline-font);
      }

      .brief-card {
        padding: 16px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
      }

      .brief-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .brief-card-head strong {
        font: 700 0.96rem/1.1 var(--headline-font);
      }

      .brief-list {
        display: grid;
        gap: 10px;
      }

      .brief-item {
        width: 100%;
        display: grid;
        grid-template-columns: 30px minmax(0, 1fr);
        gap: 12px;
        align-items: flex-start;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.025);
        text-align: left;
        transition: 180ms ease;
      }

      .brief-item:hover {
        border-color: rgba(139, 107, 255, 0.22);
        background: rgba(255, 255, 255, 0.04);
      }

      .brief-index {
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        border-radius: 11px;
        background: rgba(139, 107, 255, 0.16);
        color: #ded2ff;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .brief-copy strong {
        display: block;
        font-size: 0.88rem;
      }

      .brief-copy span {
        display: block;
        margin-top: 4px;
        color: var(--text-soft);
        font-size: 0.78rem;
      }

      .priority-grid,
      .grid-4,
      .grid-3,
      .grid-2,
      .warning-grid,
      .creator-grid,
      .sop-grid {
        display: grid;
        gap: 16px;
      }

      .priority-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card,
      .stat-card,
      .priority-card {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: var(--surface);
        box-shadow: var(--shadow-soft);
        overflow: hidden;
      }

      .priority-card {
        padding: 18px;
      }

      .priority-card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .priority-card-label {
        margin: 0 0 6px;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .priority-card strong {
        display: block;
        font-size: 1rem;
      }

      .priority-card p {
        margin: 8px 0 0;
        color: var(--text-soft);
        font-size: 0.84rem;
      }

      .priority-value {
        font: 700 2rem/1 var(--headline-font);
      }

      .stat-card {
        padding: 18px;
      }

      .stat-card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .stat-card-label {
        margin: 0;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .stat-card-value {
        margin: 14px 0 0;
        font: 700 1.92rem/1 var(--headline-font);
        letter-spacing: -0.04em;
      }

      .stat-card-sub {
        margin: 10px 0 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
      }

      .card-header h3,
      .card-header h4 {
        margin: 0;
        font: 700 1rem/1.1 var(--headline-font);
        letter-spacing: -0.03em;
      }

      .card-header span {
        color: var(--text-dim);
        font-size: 0.8rem;
      }

      .card-body {
        padding: 18px 20px;
      }

      .page-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 18px;
        padding: 22px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background:
          var(--surface-raised),
          radial-gradient(circle at top right, rgba(139, 107, 255, 0.08), transparent 34%);
        box-shadow: var(--shadow-soft);
      }

      .page-header-main {
        display: grid;
        gap: 10px;
        min-width: 0;
      }

      .page-eyebrow {
        color: rgba(184, 196, 222, 0.64);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .page-header h3 {
        margin: 0;
        font: 700 1.58rem/1.02 var(--headline-font);
        letter-spacing: -0.04em;
      }

      .page-header p {
        margin: 0;
        max-width: 70ch;
        color: var(--text-soft);
      }

      .page-header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
        flex: 0 0 auto;
      }

      .page-meta-grid,
      .kpi-board {
        display: grid;
        gap: 12px;
      }

      .page-meta-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .page-meta-card,
      .kpi-card {
        padding: 14px 16px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
      }

      .page-meta-card span,
      .kpi-card span {
        display: block;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;

      .page-meta-card strong,

        display: block;
        margin-top: 10px;

      .page-meta-card p,

        margin: 8px 0 0;
        color: var(--text-soft);
        font-size: 0.8rem;
      }

        grid-template-columns: repeat(4, minmax(0, 1fr));

      .section-stack {
        display: grid;
        gap: 18px;
      }

      .fold {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background:

        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 18px 20px;

      .fold-title {

        gap: 6px;
        min-width: 0;
      }

      .fold-title strong {
        font: 700 0.98rem/1.08 var(--headline-font);

      .fold-title p {
        margin: 0;
        color: var(--text-dim);
        font-size: 0.8rem;
      }

      .fold-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .ghost-link {

        align-items: center;
        gap: 8px;
        color: var(--text-soft);
      }

      .stack-divider {

        gap: 14px;
      }

      .subsection {

        gap: 12px;
      }

      .subsection + .subsection {

        padding-top: 18px;
        border-top: 1px solid var(--border);

      .subsection-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .subsection-head strong {
        font-size: 0.9rem;
      }

      .subsection-head span {
        color: var(--text-dim);
        font-size: 0.78rem;
      }

      .ghost-button,

      .filter-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;

        padding: 0 14px;
        border-radius: 14px;
        border: 1px solid var(--border);

        background: rgba(255, 255, 255, 0.03);
        color: var(--text-soft);
      }

      .ghost-button:hover,
      .filter-button:hover {
        color: var(--text);
        border-color: var(--border-strong);
        background: rgba(255, 255, 255, 0.05);
      }

      .primary-button {
        background: linear-gradient(135deg, rgba(139, 107, 255, 0.9), rgba(88, 166, 255, 0.64));
        color: #fff;
        box-shadow: 0 10px 24px rgba(139, 107, 255, 0.2);
      }

      .primary-button:hover {
        filter: brightness(1.03);
      }

      .filter-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.025);
      }

      .filter-spacer {
        flex: 1 1 auto;

      .filter-group {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        padding: 7px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
      }

      .filter-button {
        min-height: 34px;
        padding: 0 12px;
        border-radius: 12px;
      }

      .filter-button.active {
        color: var(--text);
        border-color: rgba(139, 107, 255, 0.28);
        background: rgba(139, 107, 255, 0.16);
      }

      .search-input,
      .select {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--control-bg);
        color: var(--text);

        transition: 180ms ease;
      }

      .search-input {
        min-width: min(320px, 100%);
        height: 42px;
        padding: 0 14px;

        color: var(--text-dim);

        width: 100%;
        padding: 0 12px;

        background: rgba(255,255,255,0.055);

        align-items: center;

        flex-wrap: wrap;
      }

        background: rgba(255,255,255,0.04);

      .file-meta strong {

      .file-meta span {

        flex-wrap: wrap;
      }

      .table-actions {
        justify-content: flex-end;
      }

      .field {

      }

      .field label {

        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .field-input,
      .field-textarea {
        width: 100%;

        border-radius: 14px;
        background: var(--control-bg);
        color: var(--text);
        transition: 180ms ease;
      }

      .field-input {
        min-height: 44px;
        padding: 0 14px;

      .field-textarea {

        padding: 12px 14px;

      .field-grid .field.full {
        grid-column: 1 / -1;

      .checkbox-field {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--text-soft);
        font-size: 0.86rem;
      }

      .checkbox-field input {
        width: 18px;
        height: 18px;
      }

      .helper-text {
        margin: 0;
        color: var(--text-dim);
        font-size: 0.76rem;
      }

      .list {

        flex-direction: column;

      .list-item {
        display: flex;

        gap: 14px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
      }

      .list-item:last-child {

      .list-item:hover {
        background: rgba(255, 255, 255, 0.025);

      .list-item-main {

        min-width: 0;

      .list-item-main strong {

        font-size: 0.92rem;

      .list-item-main p {

        color: var(--text-soft);

      .list-item-meta {

        color: var(--text-dim);

      }

      .list-item-meta strong {

        border: 1px solid transparent;

        font-weight: 600;
        white-space: nowrap;

      .tone-default {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.08);

        background: var(--warning-soft);

        border-color: rgba(240, 95, 115, 0.28);
        color: #ffc1c9;

        border-color: rgba(88, 166, 255, 0.28);

        transition: 180ms ease;

        border-color: var(--border-strong);
        background: rgba(255, 255, 255, 0.055);

        color: var(--text-dim);

        vertical-align: top;

        border-bottom: 1px solid rgba(150, 167, 206, 0.08);

        box-shadow: 0 0 0 4px rgba(240, 95, 115, 0.13), 0 0 18px rgba(240, 95, 115, 0.36);

        font-size: 0.78rem;
        font-weight: 700;
        white-space: nowrap;

        color: #9deccc;

        border-color: rgba(240, 95, 115, 0.22);
        background: rgba(240, 95, 115, 0.08);
        color: #f7c7cf;

        margin-top: 4px;

        justify-content: space-between;

        font-size: 0.78rem;
        line-height: 1.45;

        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;

        gap: 12px;

        color: var(--primary, #8b6bff);
      }

      .call-drawer {
        width: min(1180px, calc(100vw - 36px));
      }

      .call-drawer-side {
        gap: 14px;
      }

      .call-phase-btn {
        text-align: left;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        color: var(--text-soft);
        font-size: 0.78rem;
        cursor: pointer;
      }

      .call-phase-btn:hover {
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
      }

      .call-phase-btn.active {
        border-color: rgba(139, 107, 255, 0.42);
        background: rgba(139, 107, 255, 0.14);
        color: #d6c8ff;
      }

      .call-drawer-main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .call-drawer-body {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
        gap: 18px;
        padding: 18px 22px 22px;
        overflow: auto;
        align-items: start;
      }

      .call-script-pane,
      .call-notes-pane {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .call-phase {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.02);
      }

      .call-phase[open] {
        border-color: rgba(139, 107, 255, 0.32);
        background: rgba(139, 107, 255, 0.06);
      }

      .call-phase summary {
        display: flex;
        flex-direction: column;
        gap: 4px;
        cursor: pointer;
      }

      .call-phase summary strong {
        font-size: 0.92rem;
      }

      .call-objections {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.02);
      }

      .call-objection {
        padding: 10px 0;
        border-top: 1px dashed rgba(255, 255, 255, 0.06);
      }

      .call-objection:first-of-type {
        border-top: none;
        padding-top: 4px;
      }

      .call-obj-q {
        font-weight: 700;
        color: var(--text);
        margin-bottom: 4px;
      }

      .call-obj-a {
        color: var(--text-soft);
        font-size: 0.85rem;
        line-height: 1.45;
      }

      .call-notes-pane .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .call-notes-pane .field span {
        color: var(--text-soft);
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .call-notes-pane textarea {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        font-family: inherit;
        font-size: 0.88rem;
        line-height: 1.45;
        resize: vertical;
      }

      @media (max-width: 880px) {
        .kanban.lead-buckets {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .funnel-row {
          flex-direction: column;
        }

        .funnel-arrow {
          flex-direction: row;
          min-width: 0;
        }

        .funnel-arrow-glyph {
          transform: rotate(90deg);
        }

        .dashboard-funnel-layout {
          grid-template-columns: minmax(0, 1fr);
        }

        .funnel-toolbar {
          align-items: flex-start;
        }

        .call-drawer {
          width: 100%;
          height: 90vh;
          margin: auto 0 0 0;
        }

        .call-drawer-body {
          grid-template-columns: minmax(0, 1fr);
        }
      }

      .kanban-column {
        min-width: 228px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(18, 25, 41, 0.88);
      }

      .kanban-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--border);
      }

      .kanban-head strong {
        font-size: 0.82rem;
      }

      .kanban-stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 14px;
        min-height: 210px;
      }

      .kanban-card {
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
      }

      .kanban-card strong {
        display: block;
        margin-bottom: 6px;
        font-size: 0.88rem;
      }

      .kanban-card p {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.78rem;
      }

      .creator-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .creator-card,
      .sop-card {
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: rgba(18, 25, 41, 0.94);
        box-shadow: var(--shadow-soft);
      }

      .creator-card.interactive {
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .creator-card.interactive:hover {
        transform: translateY(-2px);
        border-color: rgba(139, 107, 255, 0.24);
        background: rgba(20, 28, 46, 0.98);
      }

      .creator-card-head,
      .sop-card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .creator-card h4,
      .sop-card h4 {
        margin: 12px 0 4px;
        font: 700 1rem/1.1 var(--headline-font);
      }

      .creator-card p,
      .sop-card p {
        margin: 0;
      }

      .muted {
        color: var(--text-soft);
      }

      .dim {
        color: var(--text-dim);
      }

      .progress {
        margin-top: 14px;
      }

      .progress-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
        color: var(--text-soft);
        font-size: 0.76rem;
      }

      .progress-track {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #8b6bff, #5ab0ff);
      }

      .insight-box {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.03);
      }

      .insight-box strong {
        display: block;
        margin-bottom: 4px;
        font-size: 0.84rem;
      }

      .insight-box p {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.78rem;
      }

      .chart-shell {
        padding: 18px;
      }

      .bar-legend {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 18px;
        color: var(--text-soft);
        font-size: 0.78rem;
      }

      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .bar-chart {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
        gap: 12px;
        align-items: end;
        min-height: 220px;
      }

      .bar-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .bar-columns {
        height: 180px;
        display: flex;
        align-items: end;
        gap: 8px;
      }

      .bar {
        width: 20px;
        min-height: 6px;
        border-radius: 999px 999px 6px 6px;
      }

      .bar.revenue {
        background: linear-gradient(180deg, #8b6bff, #654eff);
      }

      .bar.margin {
        background: linear-gradient(180deg, #3fd1a4, #19956a);
      }

      .bar-label {
        color: var(--text-soft);
        font-size: 0.76rem;
      }

      .bar-note {
        color: var(--text-dim);
        font-size: 0.72rem;
      }

      .donut-shell {
        display: grid;
        gap: 16px;
        align-content: start;
      }

      .donut {
        width: min(220px, 100%);
        aspect-ratio: 1;
        margin: 0 auto;
        border-radius: 50%;
        position: relative;
      }

      .donut::after {
        content: "";
        position: absolute;
        inset: 24%;
        border-radius: 50%;
        background: #101726;
        border: 1px solid var(--border);
      }

      .donut-center {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        z-index: 1;
        text-align: center;
      }

      .donut-center strong {
        display: block;
        font: 700 1.45rem/1 var(--headline-font);
      }

      .donut-center span {
        display: block;
        margin-top: 6px;
        color: var(--text-dim);
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }

      .metric-split {
        display: grid;
        gap: 10px;
      }

      .metric-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .metric-line strong {
        font-size: 0.88rem;
      }

      .readiness {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(260px, 0.82fr);
        gap: 18px;
        padding: 24px;
        border: 2px solid rgba(240, 95, 115, 0.24);
        border-radius: var(--radius-xl);
        background: linear-gradient(135deg, rgba(240, 95, 115, 0.1), rgba(18, 25, 41, 0.98));
      }

      .readiness.ok {
        border-color: rgba(49, 196, 141, 0.28);
        background: linear-gradient(135deg, rgba(49, 196, 141, 0.1), rgba(18, 25, 41, 0.98));
      }

      .readiness h3 {
        margin: 0;
        font: 700 1.68rem/1.04 var(--headline-font);
        letter-spacing: -0.04em;
      }

      .readiness p {
        margin: 10px 0 0;
        color: var(--text-soft);
      }

      .readiness-meta {
        padding: 18px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(8, 11, 19, 0.28);
        align-self: stretch;
      }

      .readiness-meta span {
        display: block;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .readiness-meta strong {
        display: block;
        margin-top: 10px;
        font: 700 2.3rem/1 var(--headline-font);
      }

      .warning-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .warning-card {
        padding: 18px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: rgba(18, 25, 41, 0.94);
      }

      .warning-card.bad {
        border-color: rgba(240, 95, 115, 0.28);
      }

      .warning-card.good {
        border-color: rgba(49, 196, 141, 0.28);
      }

      .warning-card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .warning-card strong {
        display: block;
        font-size: 0.95rem;
      }

      .warning-card p {
        margin: 6px 0 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .manual-shell {
        display: grid;
        gap: 18px;
      }

      .manual-hero {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
        gap: 18px;
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background:
          radial-gradient(circle at top left, rgba(49, 196, 141, 0.12), transparent 34%),
          linear-gradient(135deg, rgba(18, 25, 41, 0.98), rgba(9, 13, 24, 0.98));
        box-shadow: var(--shadow-soft);
      }

      .manual-hero h3 {
        margin: 0;
        font: 700 1.9rem/1 var(--headline-font);
        letter-spacing: -0.05em;
      }

      .manual-hero p {
        margin: 10px 0 0;
        color: var(--text-soft);
        max-width: 760px;
      }

      .manual-search-card {
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.04);
        align-self: stretch;
      }

      .manual-search-card label {
        display: block;
        margin-bottom: 10px;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .manual-index {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 22px;
        background: rgba(18, 25, 41, 0.78);
      }

      .manual-index-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--text-soft);
        background: rgba(255, 255, 255, 0.03);
        text-decoration: none;
        font-size: 0.82rem;
        transition: 180ms ease;
      }

      .manual-index-link:hover,
      .manual-index-link:focus-visible {
        color: var(--text);
        border-color: rgba(139, 107, 255, 0.34);
        background: rgba(139, 107, 255, 0.13);
      }

      .manual-section-card {
        scroll-margin-top: 120px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(180deg, rgba(18, 25, 41, 0.96), rgba(12, 17, 29, 0.96)),
          rgba(18, 25, 41, 0.96);
        box-shadow: var(--shadow-soft);
        overflow: hidden;
      }

      .manual-section-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        padding: 22px;
        border-bottom: 1px solid var(--border);
      }

      .manual-section-head h3 {
        margin: 0;
        font: 700 1.35rem/1.05 var(--headline-font);
        letter-spacing: -0.04em;
      }

      .manual-section-head p {
        margin: 8px 0 0;
        color: var(--text-soft);
        max-width: 780px;
      }

      .manual-entry-list {
        display: grid;
        gap: 12px;
        padding: 18px;
      }

      .manual-entry {
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        overflow: hidden;
      }

      .manual-entry-head,
      .manual-entry summary {
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 16px;
        list-style: none;
      }

      .manual-entry-head {
        cursor: default;
      }

      .manual-entry summary::-webkit-details-marker {
        display: none;
      }

      .manual-entry-head strong,
      .manual-entry summary strong {
        display: block;
        font-size: 0.96rem;
      }

      .manual-entry-head span,
      .manual-entry summary span {
        color: var(--text-dim);
        font-size: 0.78rem;
        line-height: 1.5;
      }

      .manual-entry-body {
        display: grid;
        gap: 14px;
        padding: 0 16px 16px;
      }

      .manual-entry-body > p {
        margin: 0;
        color: var(--text-soft);
        line-height: 1.65;
      }

      .manual-card-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .manual-info-card {
        padding: 14px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(7, 10, 18, 0.24);
      }

      .manual-info-card strong {
        display: block;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .manual-info-card ul,
      .manual-info-card ol {
        margin: 10px 0 0;
        padding-left: 18px;
        color: var(--text-soft);
      }

      .manual-info-card li + li {
        margin-top: 7px;
      }

      .manual-term-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .manual-term {
        padding: 14px;
        border: 1px solid rgba(139, 107, 255, 0.16);
        border-radius: 16px;
        background: rgba(139, 107, 255, 0.07);
      }

      .manual-term strong {
        display: block;
        margin-bottom: 6px;
      }

      .manual-term p {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.82rem;
        line-height: 1.55;
      }

      .manual-flow {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .manual-flow li {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        color: var(--text-soft);
      }

      .manual-flow span {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border-radius: 999px;
        border: 1px solid rgba(139, 107, 255, 0.28);
        background: rgba(139, 107, 255, 0.12);
        color: var(--text);
        font-size: 0.78rem;
        font-weight: 800;
      }

      .warning-count {
        font: 700 2.2rem/1 var(--headline-font);
      }

      .detail-list {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--border);
      }

      .detail-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 10px;
        color: var(--text-soft);
        font-size: 0.8rem;
      }

      .detail-item:last-child {
        margin-bottom: 0;
      }

      .detail-bullet {
        width: 8px;
        height: 8px;
        margin-top: 6px;
        border-radius: 50%;
        background: var(--danger);
        flex: 0 0 8px;
      }

      .recommendation {
        width: 100%;
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 14px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        text-align: left;
        transition: 180ms ease;
      }

      .recommendation:hover {
        border-color: rgba(139, 107, 255, 0.24);
        background: rgba(255, 255, 255, 0.04);
      }

      .recommendation strong {
        display: block;
        margin-bottom: 4px;
      }

      .recommendation p {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .chat-tabs {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
      }

      .chat-tab {
        min-height: 38px;
        padding: 0 14px;
        border-radius: 14px;
        border: 1px solid transparent;
        color: var(--text-soft);
        transition: 180ms ease;
      }

      .chat-tab:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
      }

      .chat-tab.active {
        color: var(--text);
        border-color: rgba(139, 107, 255, 0.28);
        background: rgba(139, 107, 255, 0.16);
      }

      .quick-action-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
      }

      .module-tabs {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .permission-grid {
        display: grid;
        gap: 12px;
      }

      .permission-row {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) repeat(7, auto);
        gap: 8px;
        align-items: center;
        padding: 12px 16px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
      }

      .permission-row strong {
        font-size: 0.88rem;
      }

      .permission-chip {
        min-width: 74px;
      }

      .metric-pile {
        display: grid;
        gap: 10px;
      }

      .file-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .pipeline-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(220px, 1fr));
        gap: 14px;
        overflow: auto;
      }

      .pipeline-column {
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(18, 25, 41, 0.9);
        min-width: 220px;
      }

      .pipeline-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px;
        border-bottom: 1px solid var(--border);
      }

      .pipeline-stack {
        display: grid;
        gap: 10px;
        padding: 14px;
        min-height: 180px;
      }

      .process-grid {
        display: grid;
        gap: 12px;
      }

      .process-card {
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
      }

      .quick-action {
        min-height: 116px;
        display: grid;
        align-content: space-between;
        gap: 12px;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(18, 25, 41, 0.94), rgba(12, 17, 29, 0.94)),
          rgba(18, 25, 41, 0.94);
        text-align: left;
        transition: 180ms ease;
      }

      .quick-action:hover {
        transform: translateY(-2px);
        border-color: rgba(139, 107, 255, 0.26);
        background: rgba(20, 28, 46, 0.98);
      }

      .quick-action strong {
        display: block;
        font: 700 0.95rem/1.1 var(--headline-font);
      }

      .quick-action span {
        color: var(--text-dim);
        font-size: 0.76rem;
      }

      .chat-summary-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
        gap: 16px;
      }

      .channel-toolbar {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) repeat(3, minmax(160px, 220px));
        gap: 12px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.018);
      }

      .channel-row {
        cursor: pointer;
      }

      .table-link {
        display: inline-flex;
        align-items: center;
        padding: 0;
        border: 0;
        color: var(--text);
        background: transparent;
        font: inherit;
        font-weight: 700;
        text-align: left;
      }

      .table-link:hover {
        color: #d9cbff;
      }

      .channel-signal-row,
      .channel-owner-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
      }

      .channel-drawer {
        width: min(1280px, calc(100vw - 36px));
      }

      .channel-type-card {
        border-color: rgba(139, 107, 255, 0.18);
        background:
          radial-gradient(circle at top right, rgba(139, 107, 255, 0.13), transparent 38%),
          rgba(255, 255, 255, 0.03);
      }

      .channel-focus-card {
        padding: 16px;
        border: 1px solid rgba(139, 107, 255, 0.2);
        border-radius: 20px;
        background: rgba(139, 107, 255, 0.08);
      }

      .channel-focus-card strong {
        display: block;
        margin-bottom: 6px;
        font: 700 0.95rem/1.1 var(--headline-font);
      }

      .channel-focus-card p {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .channel-sections {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 0.82fr);
        gap: 16px;
        align-items: start;
      }

      .channel-column {
        display: grid;
        gap: 16px;
      }

      .channel-note,
      .channel-check-item,
      .channel-linked-item,
      .channel-history-item {
        display: grid;
        gap: 10px;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
      }

      .channel-note p,
      .channel-linked-item p,
      .channel-history-item p {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.82rem;
        line-height: 1.45;
      }

      .channel-note-head,
      .channel-check-head,
      .channel-linked-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .channel-note small,
      .channel-history-item small {
        color: var(--text-dim);
        font-size: 0.74rem;
      }

      .channel-check-item.done {
        opacity: 0.66;
      }

      .channel-check-item.done .channel-check-title {
        text-decoration: line-through;
        color: var(--text-soft);
      }

      .channel-check-title {
        color: var(--text);
        font-weight: 700;
      }

      .channel-composer {
        padding: 16px;
        border: 1px solid rgba(139, 107, 255, 0.18);
        border-radius: 18px;
        background: rgba(139, 107, 255, 0.08);
      }

      .channel-mini-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .score-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 54px;
        min-height: 32px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        font-weight: 700;
      }

      .score-pill.good {
        border-color: rgba(49, 196, 141, 0.28);
        background: rgba(49, 196, 141, 0.12);
        color: #96edca;
      }

      .score-pill.warn {
        border-color: rgba(245, 165, 36, 0.28);
        background: rgba(245, 165, 36, 0.12);
        color: #ffd59d;
      }

      .score-pill.bad {
        border-color: rgba(240, 95, 115, 0.3);
        background: rgba(240, 95, 115, 0.14);
        color: #ffc1c9;
      }

      tr.monitoring-bad td {
        background: rgba(240, 95, 115, 0.05);
      }

      tr.monitoring-review td {
        background: rgba(245, 165, 36, 0.045);
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 168px;
        padding: 24px;
        color: var(--text-soft);
        text-align: center;
        border-radius: 18px;
        background:
          radial-gradient(circle at center, rgba(139, 107, 255, 0.08), transparent 62%),
          rgba(255, 255, 255, 0.02);
      }

      .empty.compact {
        min-height: 110px;
        padding: 18px;
      }

      .empty strong {
        display: block;
        margin-bottom: 8px;
        color: var(--text);
        font-size: 0.92rem;
      }

      .empty p {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.82rem;
        max-width: 42ch;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(4, 7, 14, 0.72);
        backdrop-filter: blur(8px);
        z-index: 40;
      }

      .modal {
        width: min(620px, 100%);
        max-height: min(80vh, 760px);
        border: 1px solid var(--border);
        border-radius: 26px;
        background: linear-gradient(180deg, #141c2f, #0f1524);
        box-shadow: var(--shadow);
        overflow: auto;
      }

      .modal-header {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 22px;
        border-bottom: 1px solid var(--border);
        background: rgba(20, 28, 47, 0.96);
        backdrop-filter: blur(16px);
      }

      .modal-header h3 {
        margin: 0;
        font: 700 1.12rem/1.1 var(--headline-font);
      }

      .modal-body {
        padding: 22px;
        display: grid;
        gap: 16px;
      }

      .modal-footer {
        position: sticky;
        bottom: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        padding: 0 22px 22px;
        flex-wrap: wrap;
        background: linear-gradient(180deg, rgba(15, 21, 36, 0), rgba(15, 21, 36, 0.98) 28%);
      }

      .drawer-backdrop {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: flex-end;
        padding: 18px;
        background: rgba(4, 7, 14, 0.76);
        backdrop-filter: blur(10px);
        z-index: 40;
      }

      .profile-drawer {
        width: min(1220px, calc(100vw - 36px));
        height: calc(100vh - 36px);
        margin-left: auto;
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        border: 1px solid var(--border);
        border-radius: 30px;
        background: linear-gradient(180deg, #12192a, #0c1220);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .profile-drawer-side {
        display: grid;
        align-content: start;
        gap: 18px;
        padding: 22px;
        border-right: 1px solid var(--border);
        background:
          linear-gradient(180deg, rgba(17, 24, 39, 0.98), rgba(11, 16, 27, 0.98)),
          radial-gradient(circle at top right, rgba(139, 107, 255, 0.08), transparent 44%);
        overflow: auto;
      }

      .profile-drawer-main {
        min-width: 0;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        background:
          linear-gradient(180deg, rgba(17, 24, 39, 0.98), rgba(10, 15, 26, 0.98)),
          radial-gradient(circle at top left, rgba(88, 166, 255, 0.06), transparent 40%);
      }

      .profile-summary-card {
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.03);
      }

      .profile-summary-card h3,
      .profile-panel h3,
      .profile-phase h4,
      .profile-info-block h4 {
        margin: 0;
        font: 700 1rem/1.1 var(--headline-font);
      }

      .profile-summary-card p {
        margin: 8px 0 0;
        color: var(--text-soft);
        font-size: 0.84rem;
      }

      .profile-header {
        padding: 24px 24px 18px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .profile-header-main {
        min-width: 0;
        display: grid;
        gap: 12px;
      }

      .profile-kicker {
        color: rgba(184, 196, 222, 0.64);
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .profile-title-row {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      .profile-title-row h3 {
        margin: 0;
        font: 700 1.5rem/1 var(--headline-font);
        letter-spacing: -0.04em;
      }

      .profile-subtitle {
        color: var(--text-soft);
        font-size: 0.88rem;
      }

      .profile-header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .profile-tabs {
        padding: 16px 24px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
      }

      .profile-tab {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-soft);
        transition: 180ms ease;
      }

      .profile-tab.active {
        color: var(--text);
        border-color: rgba(139, 107, 255, 0.28);
        background: rgba(139, 107, 255, 0.16);
      }

      .profile-content {
        overflow: auto;
        padding: 24px;
        display: grid;
        gap: 18px;
      }

      .profile-grid-4,
      .profile-grid-3,
      .profile-grid-2,
      .profile-stack,
      .profile-phase-list,
      .profile-info-grid {
        display: grid;
        gap: 16px;
      }

      .profile-grid-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .profile-grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .profile-grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .profile-panel,
      .profile-phase,
      .profile-mini-card,
      .profile-info-block {
        border: 1px solid var(--border);
        border-radius: 22px;
        background:
          linear-gradient(180deg, rgba(18, 25, 41, 0.96), rgba(12, 17, 29, 0.96)),
          rgba(18, 25, 41, 0.96);
        box-shadow: var(--shadow-soft);
      }

      .profile-panel {
        padding: 18px;
      }

      .profile-panel-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .profile-panel-head p,
      .profile-phase-head p,
      .profile-info-block p {
        margin: 6px 0 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .profile-mini-card {
        padding: 16px;
      }

      .profile-mini-card strong {
        display: block;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .profile-mini-card span {
        display: block;
        margin-top: 10px;
        font: 700 1.2rem/1.1 var(--headline-font);
      }

      .profile-mini-card small {
        display: block;
        margin-top: 6px;
        color: var(--text-soft);
        font-size: 0.78rem;
      }

      .profile-task-list,
      .profile-note-list,
      .profile-history-list {
        display: grid;
        gap: 10px;
      }

      .profile-phase-list {
        max-height: min(52vh, 520px);
        overflow-y: auto;
        padding-right: 4px;
      }

      .profile-task {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: flex-start;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
      }

      .profile-task-main strong {
        display: block;
        font-size: 0.9rem;
      }

      .profile-task-main p {
        margin: 4px 0 0;
        color: var(--text-soft);
        font-size: 0.8rem;
      }

      .profile-task-meta {
        display: grid;
        gap: 8px;
        justify-items: end;
        text-align: right;
      }

      .profile-task-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .profile-phase {
        padding: 18px;
      }

      .profile-phase-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .profile-phase-collapsed {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(49, 196, 141, 0.18);
        background: rgba(49, 196, 141, 0.08);
      }

      .profile-phase-collapsed p {
        margin: 4px 0 0;
        color: var(--text-soft);
        font-size: 0.8rem;
      }

      .profile-composer {
        padding: 16px;
        border: 1px solid rgba(139, 107, 255, 0.18);
        border-radius: 18px;
        background: rgba(139, 107, 255, 0.08);
      }

      .profile-composer-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .profile-info-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .profile-info-block {
        padding: 16px;
      }

      .profile-info-block strong {
        display: block;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .profile-info-block span,
      .profile-info-block div {
        display: block;
        margin-top: 10px;
        color: var(--text);
        font-size: 0.9rem;
      }

      .profile-note {
        padding: 14px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.03);
      }

      .profile-note p {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .profile-note small {
        display: block;
        margin-top: 8px;
        color: var(--text-dim);
        font-size: 0.74rem;
      }

      .profile-history-item {
        padding: 14px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.03);
      }

      .profile-history-item p {
        margin: 4px 0 0;
        color: var(--text-soft);
        font-size: 0.8rem;
      }

      .profile-inline-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .danger-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 40px;
        padding: 0 14px;
        border-radius: 14px;
        border: 1px solid rgba(240, 95, 115, 0.26);
        background: rgba(240, 95, 115, 0.14);
        color: #ffc1c9;
        transition: 180ms ease;
      }

      .danger-button:hover {
        filter: brightness(1.05);
      }

      .doc-block {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
      }

      .doc-block strong {
        display: block;
        margin-bottom: 8px;
      }

      /* =============================================
         NOW TAB — Focused & Premium Layout
         ============================================= */

      .now-focus-layout {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      /* Alert bars: blockers + overdue */
      .now-alert-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 16px;
        border-radius: 14px;
        border: 1px solid rgba(240, 95, 115, 0.26);
        background: rgba(240, 95, 115, 0.07);
        color: #ffc1c9;
        font-size: 0.82rem;
      }

      .now-alert-bar.now-alert-overdue {
        border-color: rgba(245, 165, 36, 0.24);
        background: rgba(245, 165, 36, 0.06);
        color: #ffd59d;
      }

      .now-alert-bar strong {
        white-space: nowrap;
      }

      .now-alert-items {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        color: rgba(255, 255, 255, 0.45);
        font-size: 0.76rem;
      }

      /* Hero card — el foco principal */
      .now-hero-card {
        padding: 26px;
        border: 1px solid;
        border-radius: 24px;
        position: relative;
        overflow: hidden;
      }

      .now-hero-card::after {
        content: "";
        position: absolute;
        top: -40px;
        right: -40px;
        width: 220px;
        height: 220px;
        background: radial-gradient(circle, rgba(139, 107, 255, 0.1), transparent 68%);
        pointer-events: none;
      }

      .now-hero-kicker {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        color: var(--text-dim);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .now-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .now-hero-title {
        margin: 0 0 10px;
        font: 700 1.38rem / 1.1 var(--headline-font);
        letter-spacing: -0.03em;
      }

      .now-hero-desc {
        margin: 0 0 20px;
        color: var(--text-soft);
        font-size: 0.88rem;
        max-width: 58ch;
      }

      .now-hero-footer {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .now-meta {
        color: var(--text-dim);
        font-size: 0.76rem;
      }

      .now-empty-hero {
        display: grid;
        place-items: center;
        min-height: 160px;
        padding: 32px;
        text-align: center;
        border: 1px solid rgba(49, 196, 141, 0.22);
        border-radius: 22px;
        background: rgba(49, 196, 141, 0.05);
      }

      .now-empty-hero strong {
        display: block;
        margin-bottom: 8px;
        font: 700 1.05rem / 1 var(--headline-font);
        color: #96edca;
      }

      .now-empty-hero p {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      /* Lista compacta de pendientes */
      .now-list-card {
        border: 1px solid var(--border);
        border-radius: 20px;
        background: rgba(13, 18, 30, 0.9);
        overflow: hidden;
      }

      .now-list-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 18px;
        border-bottom: 1px solid var(--border);
      }

      .now-list-head strong {
        font-size: 0.86rem;
      }

      .now-list-head span {
        color: var(--text-dim);
        font-size: 0.74rem;
      }

      .now-task-list {
        display: flex;
        flex-direction: column;
        max-height: min(46vh, 440px);
        overflow-y: auto;
      }

      .now-task-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 18px;
        border-bottom: 1px solid rgba(150, 167, 206, 0.07);
        transition: background 140ms ease;
      }

      .now-task-row:last-child {
        border-bottom: 0;
      }

      .now-task-row:hover {
        background: rgba(255, 255, 255, 0.025);
      }

      .now-check-btn {
        width: 26px;
        height: 26px;
        flex-shrink: 0;
        display: grid;
        place-items: center;
        border-radius: 50%;
        border: 1.5px solid rgba(139, 107, 255, 0.28);
        background: rgba(139, 107, 255, 0.06);
        color: rgba(139, 107, 255, 0.55);
        transition: 140ms ease;
      }

      .now-check-btn:hover {
        border-color: rgba(139, 107, 255, 0.6);
        background: rgba(139, 107, 255, 0.16);
        color: #c4b0ff;
      }

      .now-task-info {
        flex: 1;
        min-width: 0;
      }

      .now-task-title {
        display: block;
        font-size: 0.87rem;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .now-task-meta {
        display: block;
        margin-top: 2px;
        color: var(--text-dim);
        font-size: 0.72rem;
      }

      .now-priority-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
        opacity: 0.85;
      }

      .now-list-footer {
        padding: 10px 18px;
        border-top: 1px solid var(--border);
        color: var(--text-dim);
        font-size: 0.74rem;
      }

      .now-history-link {
        display: flex;
        justify-content: center;
        padding-top: 2px;
      }

      /* Animación al completar tarea */
      @keyframes task-done-out {
        0%   { opacity: 1; transform: scale(1); }
        40%  { opacity: 0.4; transform: scale(0.99); }
        100% { opacity: 0; transform: scale(0.97) translateY(-6px); max-height: 0; padding-top: 0; padding-bottom: 0; margin: 0; }
      }

      .now-task-row.completing,
      .profile-task.completing {
        animation: task-done-out 320ms ease forwards;
        pointer-events: none;
        overflow: hidden;
      }

      /* Ficha compacta en los otros tabs — menos tags/ruido */
      .profile-task.compact .card-tags {
        display: none;
      }

      .profile-task.compact .profile-task-main p {
        display: none;
      }

      /* ─────────────────────────────────────────
         AUTH — Pantalla de inicio de sesión
         ───────────────────────────────────────── */

      .auth-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        position: relative;
      }

      .auth-card {
        width: min(440px, 100%);
        padding: 40px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background: linear-gradient(180deg, rgba(16, 22, 36, 0.99), rgba(10, 15, 25, 0.98));
        backdrop-filter: blur(20px);
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
        animation: fade-in 200ms ease;
      }

      .auth-card::before {
        content: "";
        position: absolute;
        top: -60px;
        right: -60px;
        width: 240px;
        height: 240px;
        background: radial-gradient(circle, rgba(139, 107, 255, 0.1), transparent 68%);
        pointer-events: none;
      }

      .auth-logo {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 32px;
      }

      .auth-logo-glyph {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        border: 1px solid rgba(139, 107, 255, 0.32);
        background: linear-gradient(135deg, rgba(139, 107, 255, 0.22), rgba(88, 166, 255, 0.12));
        color: #f7f2ff;
        flex-shrink: 0;
      }

      .auth-logo-copy h1 {
        margin: 0;
        font: 700 1.1rem / 1 var(--headline-font);
        letter-spacing: -0.03em;
      }

      .auth-logo-copy p {
        margin: 5px 0 0;
        color: var(--text-dim);
        font-size: 0.7rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .auth-heading {
        margin: 0 0 6px;
        font: 700 1.56rem / 1.08 var(--headline-font);
        letter-spacing: -0.04em;
      }

      .auth-sub {
        margin: 0 0 28px;
        color: var(--text-soft);
        font-size: 0.9rem;
      }

      .auth-fields {
        display: grid;
        gap: 14px;
        margin-bottom: 20px;
      }

      .auth-error {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 12px 14px;
        margin-bottom: 16px;
        border: 1px solid rgba(240, 95, 115, 0.28);
        border-radius: 14px;
        background: rgba(240, 95, 115, 0.08);
        color: #ffc1c9;
        font-size: 0.82rem;
        line-height: 1.4;
      }

      .auth-submit {
        width: 100%;
        height: 46px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: linear-gradient(135deg, rgba(139, 107, 255, 0.9), rgba(88, 166, 255, 0.64));
        color: #fff;
        font-size: 0.94rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        box-shadow: 0 10px 24px rgba(139, 107, 255, 0.22);
        transition: 180ms ease;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .auth-submit:hover:not(:disabled) {
        filter: brightness(1.06);
      }

      .auth-submit:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .auth-loading-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        gap: 16px;
        color: var(--text-dim);
        font-size: 0.84rem;
        text-align: center;
      }

      .auth-spinner {
        display: block;
        width: 32px;
        height: 32px;
        border: 2px solid rgba(139, 107, 255, 0.2);
        border-top-color: #8b6bff;
        border-radius: 50%;
        animation: auth-spin 0.72s linear infinite;
        margin: 0 auto;
      }

      .auth-spinner.sm {
        width: 16px;
        height: 16px;
        border-width: 2px;
      }

      @keyframes auth-spin {
        to { transform: rotate(360deg); }
      }

      /* user-card con botón de cierre de sesión */
      .user-card {
        gap: 10px;
      }

      .user-card .user-meta {
        flex: 1;
        min-width: 0;
        overflow: hidden;
      }

      .user-card .user-meta span {
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        max-width: 100%;
        display: block;
      }

      .overlay {
        display: none;
      }

      .mobile-tabbar {
        display: none;
      }

      .mobile-fab {
        display: none;
      }

      .desktop-only {
        display: grid;
      }

      svg {
        display: block;
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

        body.sidebar-collapsed .app-shell {
