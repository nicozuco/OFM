      function renderInputField(label, name, value = "", options = {}) {
        const {
          type = "text",
          placeholder = "",
          required = false,
          min = null,
          max = null,
          step = null,
          full = false
        } = options;
        const inputId = `modal-field-${name}`;
        const inputValue = normalizeInputValueForType(value, type);

        return `
          <div class="field${full ? " full" : ""}">
            <label for="${inputId}">${escapeHtml(label)}</label>
            <input
              id="${inputId}"
              class="field-input"
              type="${type}"
              name="${name}"
              value="${escapeHtml(inputValue)}"
              ${placeholder ? `placeholder="${escapeHtml(placeholder)}"` : ""}
              ${required ? "required" : ""}
              ${min !== null ? `min="${min}"` : ""}
              ${max !== null ? `max="${max}"` : ""}
              ${step !== null ? `step="${step}"` : ""}
            />
          </div>
        `;
      }

      function renderSelectField(label, name, value, options, config = {}) {
        const inputId = `modal-field-${name}`;
        return `
          <div class="field${config.full ? " full" : ""}">
            <label for="${inputId}">${escapeHtml(label)}</label>
            <select id="${inputId}" class="select" name="${name}">
              ${options.map(([optionValue, optionLabel]) => `
                <option value="${escapeHtml(optionValue)}" ${String(value) === String(optionValue) ? "selected" : ""}>
                  ${escapeHtml(optionLabel)}
                </option>
              `).join("")}
            </select>
          </div>
        `;
      }

      function renderTextareaField(label, name, value = "", options = {}) {
        const inputId = `modal-field-${name}`;
        const placeholder = options.placeholder ? `placeholder="${escapeHtml(options.placeholder)}"` : "";
        return `
          <div class="field${options.full ? " full" : ""}">
            <label for="${inputId}">${escapeHtml(label)}</label>
            <textarea
              id="${inputId}"
              class="field-textarea"
              name="${name}"
              ${options.required ? "required" : ""}
              ${placeholder}
            >${escapeHtml(value)}</textarea>
          </div>
        `;
      }

      function renderFileField(label, name, currentFileName = "", options = {}) {
        const inputId = `modal-field-${name}`;
        const accept = options.accept ? `accept="${escapeHtml(options.accept)}"` : "";
        const fileType = options.fileType ? ` · ${options.fileType}` : "";
        const uploadedAt = options.uploadedAt ? ` · ${options.uploadedAt}` : "";
        return `
          <div class="field${options.full ? " full" : ""}">
            <label for="${inputId}">${escapeHtml(label)}</label>
            <input id="${inputId}" class="field-input" type="file" name="${name}" ${accept} style="padding:10px 14px;" />
            ${currentFileName ? `
              <div class="file-meta">
                <div>
                  <strong>${escapeHtml(currentFileName)}</strong>
                  <span>Archivo actual${escapeHtml(fileType)}${escapeHtml(uploadedAt)}</span>
                </div>
              </div>
            ` : ""}
          </div>
        `;
      }

      function renderCheckboxField(label, name, checked, options = {}) {
        return `
          <div class="field${options.full ? " full" : ""}">
            <label class="checkbox-field">
              <input type="checkbox" name="${name}" ${checked ? "checked" : ""} />
              <span>${escapeHtml(label)}</span>
            </label>
            ${options.help ? `<p class="helper-text">${escapeHtml(options.help)}</p>` : ""}
          </div>
        `;
      }

      function renderAssignedCreatorChips(values, name = "assignedCreators") {
        const assigned = normalizeAssignedCreators(values);
        if (!assigned.length) {
          return `<span class="helper-text">Sin creadoras asignadas</span>`;
        }

        return assigned.map((value) => {
          const label = getCreatorAssignmentLabel(value);
          return `
            <span class="selection-chip">
              ${escapeHtml(label)}
              <button
                type="button"
                class="chip-remove"
                data-action="remove-multi-value"
                data-target-name="${escapeHtml(name)}"
                data-value="${escapeHtml(value)}"
                aria-label="Quitar ${escapeHtml(label)}"
              >×</button>
            </span>
          `;
        }).join("");
      }

      function renderAssignedCreatorsField(label, name, values = [], options = {}) {
        const assigned = normalizeAssignedCreators(values);
        const selected = new Set(assigned);
        const knownIds = new Set(DATA.creators.map((creator) => creator.id));
        const legacyValues = assigned.filter((value) => !knownIds.has(value));

        return `
          <div class="field${options.full ? " full" : ""}">
            <label>${escapeHtml(label)}</label>
            <div class="multi-select-panel" data-multi-select="${escapeHtml(name)}" data-multi-relation="creator">
              <div class="selected-chips" data-multi-chips="${escapeHtml(name)}">
                ${renderAssignedCreatorChips(assigned, name)}
              </div>
              ${DATA.creators.length ? `
                <div class="multi-options" role="group" aria-label="${escapeHtml(label)}">
                  ${DATA.creators.map((creator, index) => {
                    const inputId = `modal-field-${name}-${index}`;
                    return `
                      <label class="multi-option" for="${inputId}">
                        <input
                          id="${inputId}"
                          type="checkbox"
                          name="${escapeHtml(name)}"
                          value="${escapeHtml(creator.id)}"
                          data-multi-checkbox="${escapeHtml(name)}"
                          data-label="${escapeHtml(creator.name)}"
                          ${selected.has(creator.id) ? "checked" : ""}
                        />
                        <span class="multi-option-copy">
                          <strong>${escapeHtml(creator.name)}</strong>
                          <span>${escapeHtml(creator.handle || creator.stage || "Creadora")}</span>
                        </span>
                      </label>
                    `;
                  }).join("")}
                </div>
              ` : `
                <div class="multi-empty">Todavia no hay creadoras creadas. Crea una creadora primero para asignarla a este usuario.</div>
              `}
              ${legacyValues.map((value) => `
                <input type="hidden" name="${escapeHtml(name)}" value="${escapeHtml(value)}" data-legacy-multi-value="${escapeHtml(name)}" />
              `).join("")}
              <p class="helper-text">Selecciona una o varias creadoras.</p>
            </div>
          </div>
        `;
      }

      function renderGenericMultiSelectChips(values, name, labelMap = {}) {
        const selected = normalizeTextList(values);
        if (!selected.length) {
          return `<span class="helper-text">Sin elementos seleccionados</span>`;
        }

        return selected.map((value) => {
          const label = labelMap[value] || value;
          return `
            <span class="selection-chip">
              ${escapeHtml(label)}
              <button
                type="button"
                class="chip-remove"
                data-action="remove-multi-value"
                data-target-name="${escapeHtml(name)}"
                data-value="${escapeHtml(value)}"
                aria-label="Quitar ${escapeHtml(label)}"
              >×</button>
            </span>
          `;
        }).join("");
      }

      function renderMultiSelectField(label, name, values = [], optionList = [], options = {}) {
        const selected = new Set(normalizeTextList(values));
        const labelMap = Object.fromEntries(optionList.map(([value, optionLabel]) => [String(value), String(optionLabel)]));
        const optionValues = new Set(optionList.map(([value]) => String(value || "")).filter(Boolean));
        const orphanValues = [...selected].filter((value) => value && !optionValues.has(value));

        return `
          <div class="field${options.full ? " full" : ""}">
            <label>${escapeHtml(label)}</label>
            <div class="multi-select-panel" data-multi-select="${escapeHtml(name)}" data-multi-relation="${escapeHtml(options.relation || "generic")}">
              <div class="selected-chips" data-multi-chips="${escapeHtml(name)}">
                ${renderGenericMultiSelectChips([...selected], name, labelMap)}
              </div>
              ${orphanValues.map((value) => `<input type="hidden" name="${escapeHtml(name)}" value="${escapeHtml(value)}" />`).join("")}
              ${optionList.length ? `
                <div class="multi-options" role="group" aria-label="${escapeHtml(label)}">
                  ${optionList.filter(([value]) => String(value || "")).map(([value, optionLabel], index) => {
                    const inputId = `modal-field-${name}-${index}`;
                    return `
                      <label class="multi-option" for="${inputId}">
                        <input
                          id="${inputId}"
                          type="checkbox"
                          name="${escapeHtml(name)}"
                          value="${escapeHtml(value)}"
                          data-label="${escapeHtml(optionLabel)}"
                          data-multi-checkbox="${escapeHtml(name)}"
                          ${selected.has(String(value)) ? "checked" : ""}
                        />
                        <span class="multi-option-copy">
                          <strong>${escapeHtml(optionLabel)}</strong>
                        </span>
                      </label>
                    `;
                  }).join("")}
                </div>
              ` : `<div class="multi-empty">No hay opciones disponibles todavia.</div>`}
              ${options.help ? `<p class="helper-text">${escapeHtml(options.help)}</p>` : ""}
            </div>
          </div>
        `;
      }

      function getMultiSelectValues(widget, name) {
        const values = [];
        widget.querySelectorAll("input").forEach((input) => {
          if (input.name !== name) return;
          if (input.type === "checkbox" && !input.checked) return;
          values.push(String(input.value || "").trim());
        });
        return widget.dataset.multiRelation === "creator"
          ? normalizeAssignedCreators(values)
          : normalizeTextList(values);
      }

      function updateMultiSelectWidget(widget, name) {
        const chips = widget.querySelector(`[data-multi-chips="${name}"]`);
        if (!chips) return;
        const values = getMultiSelectValues(widget, name);
        if (widget.dataset.multiRelation === "creator") {
          chips.innerHTML = renderAssignedCreatorChips(values, name);
          return;
        }

        const labelMap = {};
        widget.querySelectorAll("input").forEach((input) => {
          if (input.name === name && input.value) {
            labelMap[input.value] = input.dataset.label || input.value;
          }
        });
        chips.innerHTML = renderGenericMultiSelectChips(values, name, labelMap);
      }

      function removeMultiSelectValue(button) {
        const name = button.dataset.targetName || "";
        const value = button.dataset.value || "";
        const widget = button.closest(".multi-select-panel");
        if (!widget || !name) return;

        widget.querySelectorAll("input").forEach((input) => {
          if (input.name !== name || input.value !== value) return;
          if (input.type === "checkbox") {
            input.checked = false;
          } else {
            input.remove();
          }
        });

        updateMultiSelectWidget(widget, name);
      }

            { name: "assignedRole", label: "Rol asignado", type: "select", options: () => Object.entries(DELIVERY_OWNER_ROLE_LABELS) },
            { name: "batchDate", label: "Fecha batch", type: "date" },
            { name: "notes", label: "Notas", type: "textarea", full: true }
          ]
        }
      };

      const RELATION_PICKERS = {
        appRole: () => [["", "Sin rol"], ...DATA.appRoles.map((role) => [role.id, displayRoleName(role.name)])],
        chatRole: () => getChatRoleSelectOptions(true),
        chatter: () => getChatAgentSelectOptions(true),
        creator: () => getCreatorSelectOptions(true),
        fan: () => [["", "Sin fan"], ...DATA.fanProfiles.map((fan) => [fan.id, fan.fanName])],
        owner: ({ value }) => getUserSelectOptions({ currentValue: Array.isArray(value) ? "" : value }),
        sop: () => [["", "Sin SOP"], ...DATA.sops.map((sop) => [sop.id, sop.title])],
        task: () => [["", "Sin tarea"], ...DATA.tasks.map((task) => [task.id, task.title])],
        training: () => [["", "Sin formacion"], ...DATA.chatTrainings.map((training) => [training.id, training.title])]
      };

      function getEntitySchema(entity) {
        return ENTITY_SCHEMAS[entity] || null;
      }

      function getSchemaTitle(entity, mode = "create") {
        const schema = getEntitySchema(entity);
        if (!schema) return mode === "edit" ? "Editar elemento" : "Nuevo elemento";
        const newPrefix = ["creator", "task", "chatTraining", "chatMonitoring", "chatApproval", "governanceEntry"].includes(entity) ? "Nueva" : "Nuevo";
        return mode === "edit"
          ? `Editar ${schema.singular}`
          : `${newPrefix} ${schema.singular}`;
      }

      function getSchemaOptions(field, draft = {}) {
        if (typeof field.options === "function") return field.options({ field, draft });
        if (Array.isArray(field.options)) return field.options;
        if (field.relation && RELATION_PICKERS[field.relation]) {
          return RELATION_PICKERS[field.relation]({ field, draft, value: draft?.[field.name] || "" });
        }
        return [];
      }

      function renderSchemaField(field, draft = {}) {
        const value = draft?.[field.name] ?? field.default ?? "";
        const common = {
          required: Boolean(field.required),
          placeholder: field.placeholder || "",
          min: field.min ?? null,
          max: field.max ?? null,
          step: field.step ?? null,
          full: Boolean(field.full),
          help: field.help || ""
        };

        if (field.type === "textarea") {
          return renderTextareaField(field.label, field.name, value, common);
        }

        if (field.type === "checkbox") {
          return renderCheckboxField(field.label, field.name, Boolean(value), common);
        }

        if (field.type === "owner") {
          return renderSelectField(field.label, field.name, value, getUserSelectOptions({ currentValue: value }), common);
        }

        if (field.type === "relation" || field.type === "select" || field.type === "status") {
          return renderSelectField(field.label, field.name, value, getSchemaOptions(field, draft), common);
        }

        if (field.type === "creator-multi") {
          return renderAssignedCreatorsField(field.label, field.name, value, common);
        }

        if (field.type === "multi-select") {
          return renderMultiSelectField(field.label, field.name, value, getSchemaOptions(field, draft), { ...common, relation: field.relation });
        }

        if (field.type === "file") {
          return renderFileField(field.label, field.name, draft?.[field.currentFile || field.name] || "", {
            ...common,
            accept: field.accept || "",
            fileType: draft?.fileType || "",
            uploadedAt: draft?.uploadedAt || ""
          });
        }

        if (field.type === "tags") {
          return renderInputField(field.label, field.name, value, { ...common, type: "text" });
        }

        return renderInputField(field.label, field.name, value, { ...common, type: field.type || "text" });
      }

      function isFormSectionExpanded(entity, mode) {
        const stored = state.formExpanded && Object.prototype.hasOwnProperty.call(state.formExpanded, entity)
          ? state.formExpanded[entity]
          : undefined;
        if (typeof stored === "boolean") return stored;
        return mode === "edit";
      }

      function splitSchemaFields(fields) {
        if (fields.length <= 5) return { essentials: fields, rest: [] };
        const required = fields.filter((f) => f.required || f.alwaysVisible);
        if (required.length > 0 && required.length < fields.length) {
          const requiredSet = new Set(required);
          return {
            essentials: fields.filter((f) => requiredSet.has(f)),
            rest: fields.filter((f) => !requiredSet.has(f))
          };
        }
        return { essentials: fields.slice(0, 5), rest: fields.slice(5) };
      }

      function renderSchemaFields(schema, draft = {}, entity = null, mode = "new") {
        const fields = schema.fields;
        if (!entity || fields.length <= 5) {
          return fields.map((field) => renderSchemaField(field, draft)).join("");
        }
        const { essentials, rest } = splitSchemaFields(fields);
        if (rest.length === 0) {
          return fields.map((field) => renderSchemaField(field, draft)).join("");
        }
        const expanded = isFormSectionExpanded(entity, mode);
        const essentialsHtml = essentials.map((f) => renderSchemaField(f, draft)).join("");
        const restHtml = rest.map((f) => renderSchemaField(f, draft)).join("");
        const toggleLabel = expanded ? `Ocultar ${rest.length} campos opcionales` : `Mostrar ${rest.length} campos mas`;
        return `
          ${essentialsHtml}
          <div class="form-toggle-row" style="grid-column:1/-1;margin:8px 0;">
            <button type="button" class="ghost-button" data-action="toggle-form-expanded" data-entity="${escapeHtml(entity)}" aria-expanded="${expanded}">${toggleLabel}</button>
          </div>
          ${expanded ? restHtml : ""}
        `;
      }

      function validateSchemaForm(schema, formData) {
        if (!schema?.fields?.length) return [];

        return schema.fields
          .filter((field) => field.required)
          .filter((field) => {
            if (field.type === "checkbox" || field.type === "file") return false;
            if (field.type === "creator-multi" || field.type === "multi-select") {
              return !formData.getAll(field.name).filter((value) => String(value || "").trim()).length;
            }
            return !String(formData.get(field.name) || "").trim();
          })
          .map((field) => `Falta ${field.label}`);
      }

      function renderProfileTaskGroup(creatorId, group, description = "") {
        const ordered = sortProfileTasks(group.tasks);
        const pending = ordered.filter((task) => !isProfileTaskDone(task));
        const completed = ordered.filter((task) => isProfileTaskDone(task));
        const allCompleted = ordered.length && pending.length === 0;

        if (!ordered.length) return "";

        if (allCompleted && !state.creatorShowCompleted) {
          return `
            <article class="profile-phase">
              <div class="profile-phase-collapsed">
                <div>
                  <strong>${escapeHtml(group.title)}</strong>
                  <p>${completed.length} tareas completadas. Esta fase esta recogida para no ensuciar la vista.</p>
                </div>
                <button class="ghost-button" data-action="toggle-creator-completed">Ver completadas</button>
              </div>
            </article>
          `;
        }

        const visibleTasks = state.creatorShowCompleted ? ordered : pending;

        return `
          <article class="profile-phase">
            <div class="profile-phase-head">
              <div>
                <h4>${escapeHtml(group.title)}</h4>
                <p>${escapeHtml(description || `${pending.length} pendientes · ${completed.length} completadas`)}</p>
              </div>
              ${badge(`${pending.length}/${ordered.length} pendientes`, pending.length ? "warning" : "success")}
            </div>
            <div class="profile-phase-list">
              ${visibleTasks.length
                ? visibleTasks.map((task) => renderProfileTaskCard(creatorId, task)).join("")
                : renderEmptyState("Todo al dia", "No hay tareas pendientes en esta fase.", true)}
            </div>
          </article>
        `;
      }

      function renderProfileTaskArea(creator, area, options = {}) {
        const tasks = sortProfileTasks(getProfileTasks(creator).filter((task) => task.area === area));
        const grouped = Object.values(getProfileTaskGroups(tasks));

        if (!grouped.length) {
          return renderEmptyState(
            options.emptyTitle || "Sin tareas en este bloque",
            options.emptyDescription || "Anade tareas manuales para empezar a operar esta area.",
            true
          );
        }

        return grouped
          .sort((a, b) => {
            const aIndex = PROFILE_PHASE_ORDER.indexOf(a.phase);
            const bIndex = PROFILE_PHASE_ORDER.indexOf(b.phase);
            if (aIndex !== bIndex) {
              return (aIndex === -1 ? 999 : aIndex) - (bIndex === -1 ? 999 : bIndex);
            }
            return (PROFILE_PHASE_LABELS[a.phase] || a.phase).localeCompare(PROFILE_PHASE_LABELS[b.phase] || b.phase);
          })
          .map((group) => renderProfileTaskGroup(creator.id, group))
          .join("");
      }

      function renderOnboardingTimeline(creator) {
        const tasks = sortProfileTasks(getProfileTasks(creator).filter((task) => task.area === "onboarding"));
        const groups = Object.values(getProfileTaskGroups(tasks));
        const groupMap = new Map(groups.map((group) => [group.phase, group]));
        const completed = tasks.filter((task) => isProfileTaskDone(task)).length;
        const blocked = tasks.filter((task) => task.blocked && !isProfileTaskDone(task)).length;
        const recommended = tasks.filter((task) => task.recommended && !isProfileTaskDone(task)).length;
        const total = tasks.length;
        const pct = total ? Math.round((completed / total) * 100) : 0;
        const buckets = [
          {
            title: "Dia 1",
            subtitle: "Contrato, bienvenida, canal principal y arranque inicial.",
            phases: ["setup_inicial"],
            open: true
          },
          {
            title: "Dias 2-4",
            subtitle: "Guiones, videos guia, formulario de alta inicial, plan de contenido e investigacion.",
            phases: ["alineacion_contenido"],
            open: true
          },
          {
            title: "Dias 5-7",
            subtitle: "Chatters, turnos, biblioteca, entrada operativa, cuentas y operacion real.",
            phases: ["operacion_real"],
            open: false
          }
        ];

        if (!tasks.length) {
          return renderEmptyState("Sin alta inicial", "Esta ficha no tiene checklist de alta inicial todavia.", true);
        }

        return `
          <div class="profile-grid-4">
            <article class="profile-mini-card">
              <strong>Progreso</strong>
              <span>${pct}%</span>
              <small>${completed}/${total} tareas completadas</small>
            </article>
            <article class="profile-mini-card">
              <strong>Bloqueos</strong>
              <span>${blocked}</span>
              <small>frenan el arranque</small>
            </article>
            <article class="profile-mini-card">
              <strong>Siguiente foco</strong>
              <span>${recommended}</span>
              <small>tareas marcadas como recomendadas</small>
            </article>
            <article class="profile-mini-card">
              <strong>Estado</strong>
              <span>${creator.stage === "onboarding" ? "En curso" : "Operativo"}</span>
              <small>${creator.updated || "Sin actualizacion reciente"}</small>
            </article>
          </div>
          <div class="section-stack">
            ${buckets.map((bucket) => {
              const bucketGroups = bucket.phases.map((phase) => groupMap.get(phase)).filter(Boolean);
              const pending = bucketGroups.reduce((sum, group) => sum + group.tasks.filter((task) => !isProfileTaskDone(task)).length, 0);
              const totalBucket = bucketGroups.reduce((sum, group) => sum + group.tasks.length, 0);
              const content = bucketGroups.length
                ? bucketGroups.map((group) => renderProfileTaskGroup(creator.id, group)).join("")
                : renderEmptyState("Sin fases", "No hay tareas de alta inicial en este tramo.", true);
              return renderFoldSection(
                bucket.title,
                bucket.subtitle,
                content,
                {
                  open: bucket.open,
                  tone: pending ? "warning" : "success",
                  meta: badge(`${pending}/${totalBucket || 0} pendientes`, pending ? "warning" : "success")
                }
              );
            }).join("")}
          </div>
        `;
      }

      function renderChannelChecklist(channel) {
        const checklist = ensureArray(channel.checklist);
        const pending = checklist.filter((item) => !item.done);
        const done = checklist.filter((item) => item.done);
        const visible = state.channelShowCompletedChecklist ? [...pending, ...done] : pending;
        const canEdit = canEditChatChannel(channel);
        const body = visible.length ? `
          <div class="profile-task-list">
            ${visible.map((item) => `
              <div class="channel-check-item ${item.done ? "done" : ""}">
                <div class="channel-check-head">
                  <div>
                    <div class="channel-check-title">${escapeHtml(item.title)}</div>
                    <p class="helper-text">
                      ${escapeHtml(getUserReferenceLabel(item.owner, "Sin responsable"))}
                      ${item.due ? ` · vence ${escapeHtml(item.due)}` : ""}
                      ${item.completedAt ? ` · completado ${escapeHtml(item.completedAt)}` : ""}
                    </p>
                  </div>
                  <div>${badge(TASK_PRIORITY_LABELS[item.priority], toneForPriority(item.priority))}</div>
                </div>
                ${canEdit ? `
                  <div class="profile-task-actions">
                    <button class="ghost-button" data-action="toggle-channel-check" data-id="${escapeHtml(channel.id)}" data-check-id="${escapeHtml(item.id)}">${item.done ? "Volver a pendiente" : "Marcar hecho"}</button>
                    <button class="ghost-button" data-action="move-channel-check" data-id="${escapeHtml(channel.id)}" data-check-id="${escapeHtml(item.id)}" data-direction="up">Subir</button>
                    <button class="ghost-button" data-action="move-channel-check" data-id="${escapeHtml(channel.id)}" data-check-id="${escapeHtml(item.id)}" data-direction="down">Bajar</button>
                    <button class="danger-button" data-action="delete-channel-check" data-id="${escapeHtml(channel.id)}" data-check-id="${escapeHtml(item.id)}">Borrar</button>
                  </div>
                ` : ""}
              </div>
            `).join("")}
          </div>
        ` : renderEmptyState("Checklist limpia", done.length ? "No hay checkpoints pendientes. Puedes mostrar completadas si necesitas revisar historial." : "Añade checkpoints para convertir el canal en un centro operativo.", true);

        return renderChannelPanel("Checklist del canal", "Checkpoints rápidos para operar sin perder contexto.", body, {
          meta: `
            <div class="profile-inline-actions">
              ${done.length ? `<button class="ghost-button" data-action="toggle-channel-completed">${state.channelShowCompletedChecklist ? "Ocultar completadas" : `Ver completadas (${done.length})`}</button>` : ""}

            </div>
          `
        });
      }

      function upsertItem(collection, item) {
        const index = collection.findIndex((entry) => entry.id === item.id);
        if (index >= 0) {
          collection[index] = item;
        } else {
          collection.unshift(item);
        }
        const collectionKey = getCollectionKeyByReference(collection);
        if (collectionKey) {
          clearSyncDeleteForItem(collectionKey, item.id);
          recordRecoveryItem(collectionKey, item);
        }
      }

      async function getUploadedFilePayload(formData, fieldName) {
        const file = formData.get(fieldName);
        if (!file || typeof file === "string" || !file.name || !file.size) return null;
        return fileToDataRecord(file);
      }

      async function resolveStoredFilePayload(formData, fieldName, existing = {}) {
        const uploadedFile = await getUploadedFilePayload(formData, fieldName);
        return {
          fileName: uploadedFile?.fileName || existing?.fileName || "",
          fileData: uploadedFile?.fileData || existing?.fileData || "",
          fileType: uploadedFile?.fileType || existing?.fileType || "",
          uploadedAt: uploadedFile?.uploadedAt || existing?.uploadedAt || ""
        };
      }

      function clearStoredFilePayload(item) {
        if (!item) return;
        item.fileName = "";
        item.fileData = "";
        item.fileType = "";
        item.uploadedAt = "";
      }

      function renderStoredFileActions(entity, item) {
        if (!item?.fileData) return `<span class="dim">Sin archivo</span>`;
        const canEdit = canPerformEntityAction(entity, "edit", item.id);
        return `
          <div class="inline-control-group">
            <button class="ghost-button" data-action="download-file" data-entity="${entity}" data-id="${item.id}">
              ${escapeHtml(item.fileName || "Descargar archivo")}
            </button>
            ${canEdit ? `<button class="danger-button" data-action="delete-file" data-entity="${entity}" data-id="${item.id}">Quitar</button>` : ""}
          </div>
        `;
      }

      function saveChannelInlineForm(form) {
        const channel = getChatChannelById(form.dataset.channelId || "");
        if (!channel || !canEditChatChannel(channel)) return;

        const formData = new FormData(form);
        const type = form.dataset.channelForm || "";

        if (type === "note") {
          const text = String(formData.get("text") || "").trim();
          if (!text) return;

          const noteId = form.dataset.noteId || "";
          const existing = ensureArray(channel.channelNotes).find((note) => note.id === noteId);
          if (existing) {
            existing.text = text;
            existing.updatedAt = formatDateTimeLabel();
            existing.updatedBy = getActorName();
            touchChatChannel(channel, `${getActorName()} edito una nota del canal`);
          } else {
            channel.channelNotes = ensureArray(channel.channelNotes);
            channel.channelNotes.unshift(normalizeChannelNote({
              id: createId("channel-note"),
              text,
              author: getActorName(),
              createdAt: formatDateTimeLabel()
            }));
            touchChatChannel(channel, `${getActorName()} añadio una nota al canal`);
          }

          setState({ channelComposer: null, channelEditingNoteId: null }, { focusSelector: `[data-action="toggle-channel-composer"][data-value="note"]` });
          return;
        }

        if (type === "checklist") {
          const title = String(formData.get("title") || "").trim();
          if (!title) return;

          channel.checklist = ensureArray(channel.checklist);
          channel.checklist.unshift(normalizeChannelChecklistItem({
            id: createId("channel-check"),
            title,
            priority: String(formData.get("priority") || "medium"),
            owner: String(formData.get("owner") || ""),
            due: String(formData.get("due") || ""),
            createdAt: formatDateTimeLabel()
          }));
          touchChatChannel(channel, `${getActorName()} añadio un checkpoint`);
          setState({ channelComposer: null }, { focusSelector: `[data-action="toggle-channel-composer"][data-value="checklist"]` });
          return;
        }

        if (type === "links") {
          const sopId = String(formData.get("sopId") || "");
          const trainingId = String(formData.get("trainingId") || "");
          let changed = false;

          if (sopId && !normalizeTextList(channel.linkedSopIds).includes(sopId)) {
            channel.linkedSopIds = [...normalizeTextList(channel.linkedSopIds), sopId];
            changed = true;
          }

          if (trainingId && !normalizeTextList(channel.linkedTrainingIds).includes(trainingId)) {
            channel.linkedTrainingIds = [...normalizeTextList(channel.linkedTrainingIds), trainingId];
            changed = true;
          }

          if (changed) {
            touchChatChannel(channel, `${getActorName()} vinculo recursos al canal`);
          }

          setState({ channelComposer: null }, { focusSelector: `[data-action="toggle-channel-composer"][data-value="links"]` });
        }
      }

      function moveChannelChecklistItem(channelId, checkId, direction) {
        const channel = getChatChannelById(channelId);
        if (!channel || !canEditChatChannel(channel)) return false;

        const list = ensureArray(channel.checklist);
        const index = list.findIndex((entry) => entry.id === checkId);
        if (index < 0) return false;

        const nextIndex = direction === "up" ? index - 1 : index + 1;
        if (nextIndex < 0 || nextIndex >= list.length) return false;

        [list[index], list[nextIndex]] = [list[nextIndex], list[index]];
        channel.checklist = list;
        touchChatChannel(channel, `${getActorName()} reordeno el checklist`);
        return true;
      }

      function getDuplicateTitle(value) {
        const text = String(value || "").trim();
        return text ? `${text} copia` : "Copia";
      }

      function duplicateEntityItem(entity, id) {
        const schema = getEntitySchema(entity);
        if (!schema?.supports?.duplicate || !canPerformEntityAction(entity, "create")) return false;

        const collection = getCollectionForEntity(entity);
        const original = collection.find((item) => item.id === id);
        if (!original) return false;

        const copy = cloneData(original);
        copy.id = createId(schema.idPrefix || entity);

        if (Object.prototype.hasOwnProperty.call(copy, "title")) copy.title = getDuplicateTitle(copy.title);
        if (Object.prototype.hasOwnProperty.call(copy, "name")) copy.name = getDuplicateTitle(copy.name);
        if (Object.prototype.hasOwnProperty.call(copy, "fanName")) copy.fanName = getDuplicateTitle(copy.fanName);
        if (Object.prototype.hasOwnProperty.call(copy, "step")) copy.step = getDuplicateTitle(copy.step);
        if (Object.prototype.hasOwnProperty.call(copy, "personName")) copy.personName = getDuplicateTitle(copy.personName);

        copy.createdAt = formatDateTimeLabel();
        copy.createdBy = getActorName();
        copy.updatedAt = formatDateTimeLabel();
        copy.updatedBy = getActorName();
        appendEntityHistory(copy, `${getActorName()} duplico ${schema.singular}`);

        collection.unshift(copy);
        if (entity === "appRole") ensureRolePermissionEntries(copy.id);
        queueSave();
        return true;
      }

        const schema = getEntitySchema(entity);
        if (!schema?.supports?.archive || !canPerformEntityAction(entity, "edit", id)) return false;

        const item = getEntityItem(entity, id);
        if (!item) return false;

        const archiveField = schema.archiveField || "status";
        if (Object.prototype.hasOwnProperty.call(item, archiveField)) {
          item[archiveField] = schema.archiveValue;
        } else {
          item.archived = true;
        }

        touchEntityItem(item, `${getActorName()} archivo ${schema.singular}`);
        queueSave();
        return true;

      function syncEntityRelations(entity, item, field) {
        if (!item) return;

        if (field === "roleId" && entity === "appUser") {
          item.roleName = getAppRoleById(item.roleId)?.name || "";
        }

        if (field === "roleId" && entity === "chatAgent") {
          item.roleName = getChatRoleById(item.roleId)?.name || "";
        }

        if (["creatorId", "assignedCreatorId"].includes(field)) {
          const creator = getCreatorById(item[field]);
          const nameField = field === "assignedCreatorId" ? "assignedCreatorName" : "creatorName";
          item[nameField] = creator?.name || "";
        }

        if (field === "chatterId") {
          item.chatterName = getChatAgentById(item.chatterId)?.name || "";
        }

        if (field === "assignedTo" && entity === "chatTraining") {
          item.assignedToName = getChatAgentById(item.assignedTo)?.name || "";
        }
      }

      function updateInlineEntityField(entity, id, field, value) {
        if (!canPerformEntityAction(entity, "edit", id)) return false;

        const item = getEntityItem(entity, id);
        if (!item || !field) return false;

        item[field] = value;
        syncEntityRelations(entity, item, field);

        if (entity === "payment" && field === "status" && value === "pagado") {
          item.paidAt = item.paidAt || currentISODate();

      function todayIsoLocal() {
        const d = new Date();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${d.getFullYear()}-${m}-${day}`;
      }

      function parseIsoLocalDate(value) {
        const normalized = normalizeInputValueForType(value, "date");
        if (!/^\d{4}-\d{2}-\d{2}$/.test(normalized)) return null;
        const [year, month, day] = normalized.split("-").map(Number);
        const date = new Date(year, month - 1, day);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function shiftIsoLocalDate(value, days) {
        const date = parseIsoLocalDate(value) || parseIsoLocalDate(todayIsoLocal());
        if (!date) return "";
        date.setDate(date.getDate() + days);
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${date.getFullYear()}-${month}-${day}`;
      }

      function getMonthStartIso(value = todayIsoLocal()) {
        const normalized = normalizeInputValueForType(value, "date") || todayIsoLocal();
        return `${normalized.slice(0, 7)}-01`;
      }

      function formatFunnelDateLabel(value) {
        const date = parseIsoLocalDate(value);
        if (!date) return "";
        return new Intl.DateTimeFormat("es-ES", {
          day: "2-digit",
          month: "2-digit",
          year: "2-digit"
        }).format(date);
      }

      function parseLeadUpdatedDate(value) {
        const raw = String(value || "").trim();
        if (!raw) return null;
        const iso = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (iso) {
          const d = new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]));
          return Number.isNaN(d.getTime()) ? null : d;
        }
        const dmy = raw.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
        if (dmy) {
          const d = new Date(Number(dmy[3]), Number(dmy[2]) - 1, Number(dmy[1]));
          return Number.isNaN(d.getTime()) ? null : d;
        }
        const fallback = new Date(raw);
        return Number.isNaN(fallback.getTime()) ? null : fallback;
      }

      function isWithinDays(value, days) {
        const d = parseLeadUpdatedDate(value);
        if (!d) return false;
        const now = new Date();
        const diffMs = now.getTime() - d.getTime();
        return diffMs >= 0 && diffMs <= days * 24 * 60 * 60 * 1000;
      }

      function isSameLocalDate(value, isoDate = todayIsoLocal()) {
        return normalizeInputValueForType(value, "date") === isoDate;
      }

      function isWithinDateRange(value, startIso, endIso) {
        const normalized = normalizeInputValueForType(value, "date");
        if (!/^\d{4}-\d{2}-\d{2}$/.test(normalized)) return false;
        return normalized >= startIso && normalized <= endIso;
      }

      function getLeadDmDate(lead) {
        return lead?.createdAt || lead?.created || lead?.updated || "";
      }

      function getLeadStageDate(lead) {
        return lead?.updated || lead?.updatedAt || lead?.createdAt || "";
      }

      function getDashboardFunnelRange() {
        const today = todayIsoLocal();
        const preset = ["7d", "30d", "month", "custom"].includes(state.funnelRange) ? state.funnelRange : "7d";
        let start = shiftIsoLocalDate(today, -6);
        let end = today;
        let label = "Ultimos 7 dias";

        if (preset === "30d") {
          start = shiftIsoLocalDate(today, -29);
          label = "Ultimos 30 dias";
        } else if (preset === "month") {
          start = getMonthStartIso(today);
          label = "Mes actual";
        } else if (preset === "custom") {
          start = normalizeInputValueForType(state.funnelStartDate, "date") || shiftIsoLocalDate(today, -6);
          end = normalizeInputValueForType(state.funnelEndDate, "date") || today;
          label = "Personalizado";
        }

        if (start > end) {
          const previousStart = start;
          start = end;
          end = previousStart;
        }

        return {
          preset,
          start,
          end,
          label,
          display: `${formatFunnelDateLabel(start)} - ${formatFunnelDateLabel(end)}`
        };
      }

      function renderDashboard() {
        const today = todayIsoLocal();
        const leads = Array.isArray(DATA.leads) ? DATA.leads : [];
        const creators = Array.isArray(DATA.creators) ? DATA.creators : [];

        const dmTarget = 30;
        const dmsToday = leads.filter((lead) => isSameLocalDate(getLeadDmDate(lead), today)).length;

        const repliedSet = new Set(["replied", "followup", "call1", "call2", "verbal_yes", "contract_sent", "signed"]);
        const callSet = new Set(["call1", "call2", "verbal_yes", "contract_sent", "signed"]);
        const funnelRange = getDashboardFunnelRange();
        const dmsInRange = leads.filter((lead) => isWithinDateRange(getLeadDmDate(lead), funnelRange.start, funnelRange.end)).length;
        const repliesInRange = leads.filter((lead) => repliedSet.has(lead.status) && isWithinDateRange(getLeadStageDate(lead), funnelRange.start, funnelRange.end)).length;
        const callsInRange = leads.filter((lead) => callSet.has(lead.status) && isWithinDateRange(getLeadStageDate(lead), funnelRange.start, funnelRange.end)).length;
        const signedInRange = leads.filter((lead) => lead.status === "signed" && isWithinDateRange(getLeadStageDate(lead), funnelRange.start, funnelRange.end)).length;
        const monthStart = getMonthStartIso(today);
        const signedMonthLeads = leads.filter((lead) => lead.status === "signed" && isWithinDateRange(getLeadStageDate(lead), monthStart, today));
        const signedMonth = signedMonthLeads.length;
        const signedMonthRevenue = signedMonthLeads.reduce((sum, lead) => sum + Number(lead.revenue || 0), 0);

        const ratio = (num, den) => den > 0 ? `${Math.round((num / den) * 1000) / 10}%` : "—";
        const funnelEmpty = dmsInRange === 0 && repliesInRange === 0 && callsInRange === 0 && signedInRange === 0;
        const funnelRangeOptions = [
          ["7d", "7d"],
          ["30d", "30d"],
          ["month", "Mes"],
          ["custom", "Personalizado"]
        ];
        const funnelRangeButtons = funnelRangeOptions.map(([range, label]) => `

        const funnelCustomFields = funnelRange.preset === "custom" ? `

          </div>
        ` : "";

        const funnelBlock = funnelEmpty ? `
          <article class="card" style="padding:18px;">
            <div class="funnel-toolbar">
              <div class="funnel-title">
                <div class="muted" style="font-size:12px;text-transform:uppercase;letter-spacing:0.12em;">Funnel</div>

          </article>
        ` : `
          <article class="card funnel-card" style="padding:18px;">
            <div class="funnel-toolbar">
              <div class="funnel-title">
                <div class="muted" style="font-size:12px;text-transform:uppercase;letter-spacing:0.12em;">Funnel</div>
                <strong>${escapeHtml(funnelRange.label)}</strong>
                <span class="muted" style="font-size:12px;">${escapeHtml(funnelRange.display)}</span>
              </div>
              <div class="filter-group" role="group" aria-label="Periodo del funnel">

            ${funnelCustomFields}
            <div class="funnel-row">

              </div>
              <div class="funnel-arrow"><span class="funnel-pct">${ratio(repliesInRange, dmsInRange)}</span><span class="funnel-arrow-glyph">→</span></div>
              <div class="funnel-node">

                <strong class="funnel-value">${signedInRange}</strong>

      function filterLeads() {
        const query = state.leadsSearch.trim().toLowerCase();
        if (!query) return DATA.leads;

        return DATA.leads.filter((lead) =>
          [
            lead.name,
            lead.handle,
            lead.niche,
            getLeadNicheLabel(lead.niche),
            lead.nicheTier,
            getLeadTierDisplay(getLeadTierKey(lead)),
            LEAD_FIT_LABELS[lead.nicheFit],
            lead.country,
            lead.source,
            getLeadSourceLabel(lead.source),
            lead.owner,
            getUserReferenceLabel(lead.owner, ""),
            lead.coachability,
            getLeadCoachabilityLabel(lead.coachability),
            lead.objections,
            lead.preSignDecision,
            ...getLeadQualityFlags(lead).map((flag) => LEAD_QUALITY_LABELS[flag]?.[0])
          ].some((field) =>
            String(field || "").toLowerCase().includes(query)
          )
        );
      }

      function renderLeads() {
        const leads = filterLeads();
        const stages = LEAD_STATUS_ORDER;
        const byStatus = Object.fromEntries(stages.map((stage) => [stage, leads.filter((lead) => lead.status === stage)]));
        const bucketLeads = LEAD_KANBAN_BUCKETS.map((bucket) => ({
          ...bucket,
          leads: bucket.statuses.flatMap((s) => byStatus[s] || [])
        }));
        const pipelineRevenue = leads.reduce((sum, lead) => sum + lead.revenue, 0);
        const closeReady = leads.filter((lead) => ["call2", "verbal_yes", "contract_sent", "signed"].includes(lead.status));
        const recentCount = leads.filter((lead) => lead.status === "new").length;
        const signedCount = leads.filter((lead) => lead.status === "signed").length;
        const scriptedCount = leads.filter((lead) => lead.dmScript).length;
        const objectionsCount = leads.filter((lead) => lead.objections).length;
        const decisionCount = leads.filter((lead) => lead.preSignDecision).length;
        const coachedCount = leads.filter((lead) => lead.coachability).length;
        const tier1Count = leads.filter((lead) => getLeadTierKey(lead) === "t1").length;
        const tier2Count = leads.filter((lead) => getLeadTierKey(lead) === "t2").length;
        const tier3Count = leads.filter((lead) => getLeadTierKey(lead) === "t3").length;
        const highQualityCount = leads.filter((lead) => getLeadQualityScore(lead) >= 4).length;
        const nicheMeasuredCount = leads.filter((lead) => getLeadTierKey(lead) !== "unknown").length;

                ${renderStatCard("Objeciones", objectionsCount, "fricciones registradas", "warning", objectionsCount ? "warning" : "default")}
                ${renderStatCard("Capacidad de mejora", coachedCount, "con lectura previa", "users", coachedCount ? "info" : "default")}
                ${renderStatCard("Pre-firma", decisionCount, "decision documentada", "check", decisionCount ? "success" : "default")}

      function filterTasks() {
        const query = state.taskSearch.trim().toLowerCase();

        return sortTasksByUrgency(DATA.tasks.filter((task) => {
          const ownerRefs = getTaskOwnerRefs(task);
          const ownerTokens = ownerRefs.flatMap((owner) => getUserReferenceSearchTokens(owner));
          const matchSearch = !query || [task.title, task.description, task.owner, ...ownerRefs, ...ownerTokens, task.type, ...(task.tags || [])].some((field) =>
            String(field || "").toLowerCase().includes(query)
          );
          const matchPriority = state.taskPriority === "all" || task.priority === state.taskPriority;
          const matchStatus = state.taskStatus === "all"
            || (state.taskStatus === "active" && !["done", "cancelled"].includes(task.status))
            || (state.taskStatus === "done" && task.status === "done")
            || task.status === state.taskStatus;

          return matchSearch && matchPriority && matchStatus;
        }));
      }

      function isRecentSop(updated) {
        const raw = String(updated || "").trim();
        if (!raw) return false;
        const directDate = new Date(raw);
        if (!Number.isNaN(directDate.getTime())) {
          const now = new Date();
          now.setHours(23, 59, 59, 999);
          const diffMs = now - directDate;
          return diffMs >= 0 && diffMs <= 7 * 24 * 60 * 60 * 1000;
        }
        const datePart = raw.split(",")[0];
        const [day, month, year] = datePart.split("/").map(Number);
        if (!day || !month || !year) return false;
        const updatedDate = new Date(year, month - 1, day);
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        const diffMs = now - updatedDate;
        return diffMs <= 7 * 24 * 60 * 60 * 1000;
      }

      function getAnalyticsData() {
        const selectedMetrics = state.analyticsCreator === "all"
          ? DATA.metrics
          : DATA.metrics.filter((metric) => metric.creatorId === state.analyticsCreator);

        const periods = [
          ["Jan", "Ene"],
          ["Feb", "Feb"],
          ["Mar", "Mar"],
          ["Apr", "Abr"]
        ];
        const timeSeries = periods.map(([periodKey, periodLabel]) => {
          const periodMetrics = selectedMetrics.filter((metric) => metric.period === periodKey);
          return {
            period: periodLabel,
            revenue: periodMetrics.reduce((sum, item) => sum + item.revenue, 0),
            margin: periodMetrics.reduce((sum, item) => sum + item.margin, 0)
          };
        });

        const latestMetrics = getLatestMetricsByCreator().sort((a, b) => b.revenue - a.revenue);
        const latestSelected = state.analyticsCreator === "all"
          ? {
              creatorName: "Equipo",
              revenue: latestMetrics.reduce((sum, item) => sum + item.revenue, 0),
              margin: latestMetrics.reduce((sum, item) => sum + item.margin, 0),
              subs: latestMetrics.reduce((sum, item) => sum + item.subs, 0),
              messages: latestMetrics.reduce((sum, item) => sum + item.messages, 0),
              tips: latestMetrics.reduce((sum, item) => sum + item.tips, 0),
              chatRatio: latestMetrics.length
                ? latestMetrics.reduce((sum, item) => sum + item.chatRatio, 0) / latestMetrics.length

              revenue: 0,
              margin: 0,
              subs: 0,
              messages: 0,
              tips: 0,
              chatRatio: 0
            };

        return { timeSeries, latestMetrics, latestSelected };
      }

      function isRecentISODate(value, days = 7) {
        if (!value) return false;
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return false;
        const now = new Date();
        now.setHours(23, 59, 59, 999);
        const diffMs = now - date;
        return diffMs >= 0 && diffMs <= days * 24 * 60 * 60 * 1000;
      }

      function getChatStats() {
        const activeChatters = DATA.chatAgents.filter((agent) => agent.status === "activo").length;
        const pendingTrainings = DATA.chatTrainings.filter((training) => training.status !== "completado").length;
        const eosPendingOrRecent = DATA.eosReports.filter((report) => !report.submittedAt || isRecentISODate(report.shiftDate, 7)).length;
        const pendingApprovals = DATA.chatApprovals.filter((approval) => approval.status === "pendiente").length;
        const monitoringIssues = DATA.chatMonitoring.filter((review) => review.status !== "correcto" || Number(review.score) < 80).length;

        return { activeChatters, pendingTrainings, eosPendingOrRecent, pendingApprovals, monitoringIssues };
      }

      function getChatPerformanceSnapshot() {
        const activeMetrics = DATA.metrics.filter((metric) => metric.creatorId);
        const chattingRatio = activeMetrics.length
          ? activeMetrics.reduce((sum, metric) => sum + Number(metric.chatRatio || 0), 0) / activeMetrics.length
          : 0;
        const approvedApprovals = DATA.chatApprovals.filter((approval) => approval.status === "aprobado").length;
        const totalApprovals = DATA.chatApprovals.length || 1;
        const unlockRatio = (approvedApprovals / totalApprovals) * 100;
        const whales = DATA.fanProfiles.filter((fan) => fan.fanType === "whale").length;
        const activeFans = DATA.fanProfiles.length || 1;
        const goldenRatio = (whales / activeFans) * 100;
        const eosWeek = DATA.eosReports.filter((report) => isRecentISODate(report.shiftDate, 7)).length;

        const chatterPerformance = DATA.chatAgents.map((agent) => {
          const reports = DATA.eosReports.filter((report) => report.chatterId === agent.id);
          const reviews = DATA.chatMonitoring.filter((review) => review.chatterId === agent.id);
          const avgScore = reviews.length
            ? reviews.reduce((sum, review) => sum + Number(review.score || 0), 0) / reviews.length
            : 0;
          const issues = reviews.filter((review) => review.status !== "correcto" || Number(review.score) < 80).length;

          return {
            id: agent.id,
            name: agent.name,
            reports: reports.length,
            issues,
            avgScore
          };
        }).sort((a, b) => b.reports - a.reports || b.avgScore - a.avgScore);

        return { chattingRatio, unlockRatio, goldenRatio, eosWeek, chatterPerformance };

        const canDuplicate = Boolean(schema?.supports?.duplicate && canPerformEntityAction(entity, "create"));
        const isArchived = schema?.archiveField
          ? item?.[schema.archiveField] === schema.archiveValue
          : Boolean(item?.archived);
        const canArchive = Boolean(schema?.supports?.archive && canEdit && !isArchived);
        const canMarkDone = Boolean(schema?.doneField && canEdit && item?.[schema.doneField] !== schema.doneValue && !String(extra || "").trim());
        return `

            ${extra}
            ${canMarkDone ? `<button class="ghost-button" data-action="mark-done" data-value="${entity}" data-id="${id}">Completar</button>` : ""}

      function getChatChannelById(id) {
        return DATA.chatChannels.find((channel) => channel.id === id) || null;

      function getChannelPermissionContext(channel) {
        return {
          creatorId: channel?.assignedCreatorId || "",
          creatorName: channel?.assignedCreatorName || ""
        };
      }

      function canEditChatChannel(channel) {
        return Boolean(channel) && canPerformEntityAction("chatChannel", "edit", channel.id);
      }

      function uniqueById(items) {
        const seen = new Set();
        return items.filter((item) => {
          if (!item?.id || seen.has(item.id)) return false;
          seen.add(item.id);
          return true;
        });
      }

      function getChannelRelatedItems(channel) {
        const creatorId = channel?.assignedCreatorId || "";
        const linkedSopIds = new Set(normalizeTextList(channel?.linkedSopIds));
        const linkedTrainingIds = new Set(normalizeTextList(channel?.linkedTrainingIds));
        const linkedEosIds = new Set(normalizeTextList(channel?.linkedEosReportIds));
        const linkedApprovalIds = new Set(normalizeTextList(channel?.linkedApprovalIds));
        const linkedMonitoringIds = new Set(normalizeTextList(channel?.linkedMonitoringIds));

        const sops = uniqueById(DATA.sops.filter((sop) => linkedSopIds.has(sop.id)));
        const trainings = uniqueById(DATA.chatTrainings.filter((training) => linkedTrainingIds.has(training.id)));
        const eosReports = uniqueById(DATA.eosReports.filter((report) =>
          linkedEosIds.has(report.id) || (creatorId && report.creatorId === creatorId)
        )).slice(0, 8);
        const approvals = uniqueById(DATA.chatApprovals.filter((approval) =>
          linkedApprovalIds.has(approval.id) || (creatorId && approval.creatorId === creatorId)
        )).slice(0, 8);
        const monitoring = uniqueById(DATA.chatMonitoring.filter((review) =>
          linkedMonitoringIds.has(review.id) || (creatorId && review.creatorId === creatorId)
        )).slice(0, 8);

        return { sops, trainings, eosReports, approvals, monitoring };
      }

      function getChannelSignals(channel) {
        const related = getChannelRelatedItems(channel);
        const checklistPending = ensureArray(channel?.checklist).filter((item) => !item.done).length;
        const pendingApprovals = related.approvals.filter((approval) => approval.status === "pendiente").length;
        const incidents = related.monitoring.filter((review) => review.status !== "correcto" || Number(review.score) < 80).length;

        return {
          checklistPending,
          linkedSops: related.sops.length,
          linkedTrainings: related.trainings.length,
          pendingApprovals,
          incidents,
          eosReports: related.eosReports.length
        };
      }

      function getFilteredChatChannels() {
        const query = String(state.channelSearch || "").trim().toLowerCase();
        return DATA.chatChannels
          .filter((channel) => canAccessModule("chatting", "read", getChannelPermissionContext(channel)))
          .filter((channel) => state.channelType === "all" || channel.type === state.channelType)
          .filter((channel) => state.channelStatus === "all" || channel.status === state.channelStatus)
          .filter((channel) => {
            if (state.channelCreator === "all") return true;
            if (state.channelCreator === "unassigned") return !channel.assignedCreatorId;
            return channel.assignedCreatorId === state.channelCreator;
          })
          .filter((channel) => {
            if (!query) return true;
            const haystack = [
              channel.name,
              CHAT_CHANNEL_TYPE_LABELS[channel.type],
              channel.assignedCreatorName,
              channel.purpose,
              channel.notes,
              displayTextList(channel.owners, ""),
              ...ensureArray(channel.channelNotes).map((note) => note.text)
            ].join(" ").toLowerCase();
            return haystack.includes(query);
          })
          .sort((a, b) => {
            const statusWeight = { bloqueado: 0, en_revision: 1, activo: 2 };
            return (statusWeight[a.status] ?? 3) - (statusWeight[b.status] ?? 3)
              || String(b.updatedAt || "").localeCompare(String(a.updatedAt || ""))
              || String(a.name || "").localeCompare(String(b.name || ""));
          });
      }

      function getCredentialCreatorName(credential) {
        if (!credential?.creatorId) return "";
        return getCreatorById(credential.creatorId)?.name || "";
      }

      function isCredentialRotationDue(credential) {
        return Boolean(credential?.rotationDue && isDateValuePast(credential.rotationDue));
      }

      function maskSecret(value) {
        const length = Math.min(Math.max(String(value || "").length, 8), 16);
        return "*".repeat(length);
      }

      function renderPasswordVaultContent() {
        const credentials = [...DATA.passwordVault].sort((a, b) => {
          if (isCredentialRotationDue(a) !== isCredentialRotationDue(b)) return isCredentialRotationDue(a) ? -1 : 1;
          if (a.status !== b.status) return String(a.status).localeCompare(String(b.status));
          return String(a.name || "").localeCompare(String(b.name || ""));

        const activeCount = credentials.filter((item) => item.status === "active").length;

      function canEditManualContent() {
        return isOwnerUser();
      }

      function getManualEntryText(entry) {
        return JSON.stringify(entry || {}).toLowerCase();
      }

      function filterManualSections() {
        const manualSections = MANUAL_SIMPLE_SECTIONS;
        const query = state.manualSearch.trim().toLowerCase();
        if (!query) return manualSections;

        return manualSections.map((section) => {
          const sectionText = [section.title, section.kicker, section.summary, ...(section.tags || [])].join(" ").toLowerCase();
          if (sectionText.includes(query)) return section;

          const entries = ensureArray(section.entries).filter((entry) => getManualEntryText(entry).includes(query));
          return entries.length ? { ...section, entries } : null;
        }).filter(Boolean);
      }

      function renderManualListBlock(title, items, ordered = false) {
        const safeItems = ensureArray(items).filter(Boolean);
        if (!safeItems.length) return "";
        const tag = ordered ? "ol" : "ul";

        return `
          <div class="manual-info-card">
            <strong>${escapeHtml(title)}</strong>
            <${tag}>
              ${safeItems.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
            </${tag}>
          </div>
        `;
      }

      function renderManualTerms(terms) {
        const safeTerms = ensureArray(terms);
        if (!safeTerms.length) return "";

        return `
          <div class="manual-term-grid">
            ${safeTerms.map(([term, definition]) => `
              <article class="manual-term">
                <strong>${escapeHtml(term)}</strong>
                <p>${escapeHtml(definition)}</p>
              </article>
            `).join("")}
          </div>
        `;
      }

      function renderManualSteps(steps) {
        const safeSteps = ensureArray(steps);
        if (!safeSteps.length) return "";

        return `
          <ol class="manual-flow">
            ${safeSteps.map((step, index) => `
              <li>
                <span>${index + 1}</span>
                <div>${escapeHtml(step)}</div>
              </li>
            `).join("")}
          </ol>
        `;
      }

      function renderManualEntry(entry, open = false) {
        const cardBlocks = [
          renderManualListBlock(entry.bulletsTitle || "Claves", entry.bullets),
          renderManualListBlock(entry.statesTitle || "Estados", entry.states),
          renderManualListBlock(entry.relatedTitle || "Relaciones", entry.related),
          renderManualListBlock(entry.avoidTitle || "Evita", entry.avoid)
        ].filter(Boolean).join("");

        return `
          <article class="manual-entry">
            <div class="manual-entry-head">
              <div>
                <strong>${escapeHtml(entry.title)}</strong>
                <span>${escapeHtml(entry.text || "Consulta rápida del bloque.")}</span>
              </div>
              ${entry.label ? badge(entry.label, "primary") : ""}
            </div>
            <div class="manual-entry-body">
              ${cardBlocks ? `<div class="manual-card-grid">${cardBlocks}</div>` : ""}
              ${renderManualTerms(entry.terms)}
              ${renderManualSteps(entry.steps)}
            </div>
          </article>
        `;
      }

      function renderManualSection(section, index, hasSearch) {
        const entries = ensureArray(section.entries);
        return `
          <article class="manual-section-card" id="manual-${escapeHtml(section.id)}">
            <div class="manual-section-head">
              <div>
                <div class="profile-kicker">Bloque ${index + 1}</div>
                <h3>${escapeHtml(section.title)}</h3>
                <p>${escapeHtml(section.summary)}</p>
              </div>
            </div>
            <div class="manual-entry-list">
              ${entries.map((entry, entryIndex) => renderManualEntry(entry, hasSearch || index < 2 || entryIndex === 0)).join("")}
            </div>
          </article>
        `;
      }

      function renderManual() {
        const sections = filterManualSections();
        const hasSearch = Boolean(state.manualSearch.trim());
        const manualSections = MANUAL_SIMPLE_SECTIONS;
        const totalEntries = manualSections.reduce((sum, section) => sum + ensureArray(section.entries).length, 0);
        const totalTerms = manualSections.reduce((sum, section) => {
          return sum + ensureArray(section.entries).reduce((entrySum, entry) => entrySum + ensureArray(entry.terms).length, 0);
        }, 0);

        return `
          <section class="section manual-shell">
            <div class="manual-hero">
              <div>
                <span class="eyebrow">Guía rápida</span>
                <h3>Manual simple de la app</h3>

            ${sections.length

              : `<article class="card">${renderEmptyState("Sin resultados", "No hay coincidencias en el manual para esa búsqueda.")}</article>`}

      function renderScaling() {
        const activeCount = DATA.creators.filter((creator) => creator.stage === "active").length;
        const onboardingCount = DATA.creators.filter((creator) => creator.stage === "onboarding").length;
        const blockedCount = DATA.onboardingBlocks.length;
        const criticalOverdue = DATA.tasks.filter((task) => task.priority === "critical" && isTaskOverdue(task));
        const backlogCount = DATA.contentPieces.filter((piece) => ["idea", "scripted"].includes(piece.status)).length;
        const atRisk = getAtRiskCreators();
        const readinessScore = Math.max(
          0,
          100 - (blockedCount * 12) - (criticalOverdue.length * 18) - (Math.max(backlogCount - 8, 0) * 3) - (atRisk.length * 20)
        );
        const warnings = [
          { key: "blocked", label: "Bloqueos de alta inicial", count: blockedCount, threshold: 2, details: DATA.onboardingBlocks.map((item) => `${item.title} · ${item.creatorName}`) },
          { key: "critical", label: "Tareas criticas vencidas", count: criticalOverdue.length, threshold: 1, details: criticalOverdue.map((task) => `${task.title} · ${displayTaskOwners(task)}`) },
          { key: "backlog", label: "Contenido pendiente", count: backlogCount, threshold: 10, details: ["Ideas y guiones pendientes de producir."] },
          { key: "risk", label: "Creadoras en riesgo", count: atRisk.length, threshold: 1, details: atRisk.map((creator) => `${creator.name} · revisar retencion`) }
        ];
        const hasWarnings = warnings.some((warning) => warning.count > warning.threshold);

        return `
          <section class="section">
            ${renderPageHeader("Escalado", "", {
              eyebrow: "Capacidad",
              metrics: [
                { label: "Capacidad", value: `${readinessScore}/100` },
                { label: "Activas", value: activeCount },
                { label: "Alta inicial", value: onboardingCount },
                { label: "Riesgos", value: blockedCount + criticalOverdue.length + atRisk.length }
              ]
            })}
            <article class="readiness ${hasWarnings ? "" : "ok"}">
              <div>
                <h3>${hasWarnings ? "No abras nuevo embudo todavia" : "El sistema tiene margen para escalar"}</h3>
                <p>
                  ${hasWarnings
                    ? "Todavia hay friccion activa en altas iniciales, tareas criticas o salud del equipo. Antes de sumar mas volumen conviene recuperar capacidad y nivel de servicio operativo."
                    : "No hay senales de saturacion. La operacion puede absorber nuevas altas con control y sin deteriorar calidad."}
                </p>
              </div>
              <div class="readiness-meta">
                <span>Indice de capacidad</span>
                <strong>${readinessScore}/100</strong>
	                <div class="muted" style="margin-top:8px;">${activeCount} creadoras activas · ${onboardingCount} en alta inicial</div>
              </div>
            </article>
            <div class="warning-grid">
              ${warnings.map((warning) => {
                const ok = warning.count <= warning.threshold;
                return `
                  <article class="warning-card ${ok ? "good" : "bad"}">
                    <div class="warning-card-head">
                      <div>
                        <strong>${warning.label}</strong>
                        <p>Limite sano ${warning.threshold} · actual ${warning.count}</p>
                      </div>
                      <div class="warning-count" style="color:${ok ? "#96edca" : "#ffc1c9"};">${warning.count}</div>
                    </div>
                    ${!ok ? `
                      <div class="detail-list">
                        ${warning.details.slice(0, 3).map((detail) => `
                          <div class="detail-item">
                            <span class="detail-bullet"></span>
                            <span>${escapeHtml(detail)}</span>
                          </div>
                        `).join("")}
                      </div>
                    ` : ""}
                  </article>
                `;
              }).join("")}
            </div>
            ${hasWarnings ? `
              <article class="card">
                <div class="card-header">
                  <div>
                    <h3>Acciones recomendadas</h3>
                    <span>Orden sugerido para recuperar capacidad operativa</span>
                  </div>
                </div>
                <div class="card-body" style="display:grid;gap:12px;">
                  <button class="recommendation" data-action="set-view" data-value="creators" aria-label="Abrir alta inicial bloqueada">
                    <div class="badge tone-warning">${iconSlot("warning")}</div>
                    <div>
                      <strong>Desbloquear altas iniciales primero</strong>
                      <p>Resuelve accesos, aprobaciones y dependencias para que las altas en curso no se queden frenadas.</p>
                    </div>
                  </button>
                  <button class="recommendation" data-action="set-view" data-value="tasks" aria-label="Abrir tareas criticas">
                    <div class="badge tone-danger">${iconSlot("warning")}</div>
                    <div>
                      <strong>Cerrar bloqueos directos de ingresos</strong>
                      <p>Ataca primero cualquier tarea critica o vencida que este frenando cierres, activaciones o cobros.</p>
                    </div>
                  </button>
                  <button class="recommendation" data-action="set-view" data-value="creators" aria-label="Abrir riesgo de retencion">
                    <div class="badge tone-info">${iconSlot("check")}</div>
                    <div>

                      <p>Haz seguimiento de retencion y conversion antes de seguir sumando volumen al sistema.</p>
                    </div>
                  </button>
                </div>
              </article>
            ` : ""}
          </section>
        `;
      }

         AUTH — Lógica: signIn / signOut / initAuth
         ───────────────────────────────────────────── */

      async function signIn(email, password) {
        if (!supabaseClient) {
          authError = "El servicio de autenticación no está disponible.";
          authLoginLoading = false;
          renderLogin();
          return;
        }

        authError = "";
        authLoginLoading = true;
        renderLogin();

        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: email.trim(),
          password
        });

        if (error) {
          authError = "No se ha podido iniciar sesión. Revisa tus datos.";
          authLoginLoading = false;
          renderLogin();
          return;
        }

        /* Éxito — onAuthStateChange (SIGNED_IN) tomará el control */
        authUser = data.user;
        authLoginLoading = false;
        authError = "";
      }

      async function signOut() {
        await flushPendingSavesBeforeSignOut();
        await stopRemoteSync();
        await stopUserPresence({ renderAfter: false });

        if (supabaseClient) {
          await supabaseClient.auth.signOut();
        }

        authUser = null;
        hasHydratedApp = false;
        pendingRemoteSave = false;
        localChangeRevision = 0;
        lastSyncedDataSnapshot = null;
        lastSyncedRemoteUpdatedAt = "";
        syncStatus = "local";
        DATA = normalizeData(null);
        resetAuthDraftFromRemembered();
        renderLogin();
      }

      async function initAuth() {
        if (!supabaseClient) {
          /* Sin Supabase: entrar directamente en modo local */
          authLoading = false;
          hydrateSyncState({ user: null });
          hydrateData({ user: null });
          hydrateState();
          resetAuthDraftFromRemembered();
          hasHydratedApp = true;
          render();
          return;
        }

        /* Escuchar cambios de sesión futuros (sign in / sign out) */
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
          if (event === "SIGNED_IN") {
            authUser = session.user;
            authLoading = false;
            authLoginLoading = false;
            authError = "";
            hydrateSyncState({ user: authUser, migrateLegacy: true });
            hydrateData({ user: authUser, migrateLegacy: true });
            hydrateState();
            render();

            if (pendingRemoteSave) {
              const flushed = await saveRemoteData({ force: true });
              if (!flushed) {
                hasHydratedApp = true;
                await startUserPresence();
                render();
                return;
              }
            }

            await loadRemoteData();
            await startUserPresence();
            hasHydratedApp = true;
            render();
            if (pendingRemoteSave) queueSave(0);
            startRemoteSync();
          }

          if (event === "SIGNED_OUT") {
            await stopRemoteSync();
            await stopUserPresence({ renderAfter: false });
            authUser = null;
            authLoading = false;
            hasHydratedApp = false;
            pendingRemoteSave = false;
            localChangeRevision = 0;
            lastSyncedDataSnapshot = null;
            lastSyncedRemoteUpdatedAt = "";
            syncStatus = "local";
            DATA = normalizeData(null);
            resetAuthDraftFromRemembered();
            renderLogin();
          }

          if (event === "TOKEN_REFRESHED" && session) {
            authUser = session.user;
            markCurrentUserOnlineLocally();
          }
        });

        /* Comprobar sesión inicial */
        try {
          const { data: { session } } = await supabaseClient.auth.getSession();
          authUser = session?.user || null;
        } catch (e) {
          console.error("Error al obtener sesión:", e);
          authUser = null;
        }

        authLoading = false;

        if (authUser) {
          hydrateSyncState({ user: authUser, migrateLegacy: true });
          hydrateData({ user: authUser, migrateLegacy: true });
          hydrateState();
          render();

          if (pendingRemoteSave) {
            const flushed = await saveRemoteData({ force: true });
            if (!flushed) {
              hasHydratedApp = true;
              await startUserPresence();
              render();
              return;
            }
          }

          await loadRemoteData();
          await startUserPresence();
          hasHydratedApp = true;
          render();
          if (pendingRemoteSave) queueSave(0);
        } else {
          resetAuthDraftFromRemembered();
          renderLogin();
        }
      }

      function applyResponsiveTableLabels() {
        document.querySelectorAll(".table-wrap table").forEach((table) => {
          const labels = Array.from(table.querySelectorAll("thead th")).map((header) => header.textContent.trim());
          table.querySelectorAll("tbody tr").forEach((row) => {
            Array.from(row.children).forEach((cell, index) => {
              if (labels[index]) {
                cell.dataset.label = labels[index];
              }
            });
          });
        });
      }

      async function copyTextToClipboard(text) {
        const value = String(text || "");
        if (!value) return false;

        if (navigator.clipboard?.writeText) {
          try {
            await navigator.clipboard.writeText(value);
            return true;
          } catch (error) {
            console.error("No se pudo copiar con Clipboard API:", error);
          }
        }

        const textarea = document.createElement("textarea");
        textarea.value = value;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();

        try {
          return document.execCommand("copy");
        } finally {
          textarea.remove();
        }
      }

      function getPasswordCredentialById(id) {
        return DATA.passwordVault.find((item) => item.id === id) || null;
      }

      async function copyCredentialField(id, field) {
        if (!canPerformEntityAction("passwordCredential", "read", id)) return;
        const credential = getPasswordCredentialById(id);
        if (!credential) return;
        const value = field === "password" ? credential.password : credential.username;
        const copied = await copyTextToClipboard(value);
        if (copied) window.alert(field === "password" ? "Contrasena copiada." : "Usuario copiado.");
      }

      function togglePasswordVisibility(id, button) {
        if (!canPerformEntityAction("passwordCredential", "read", id)) return;
        const credential = getPasswordCredentialById(id);
        if (!credential) return;

        const mask = Array.from(document.querySelectorAll("[data-password-mask]"))
          .find((element) => element.dataset.passwordMask === id);
        if (!mask) return;

        const visible = mask.dataset.visible === "true";
        mask.textContent = visible ? maskSecret(credential.password) : credential.password;
        mask.dataset.visible = visible ? "false" : "true";
        if (button) button.textContent = visible ? "Ver" : "Ocultar";
      }
