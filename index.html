          lastSyncedRemoteUpdatedAt: String(snapshot.lastSyncedRemoteUpdatedAt || lastSyncedRemoteUpdatedAt || ""),
          lastSyncedPayload: snapshot.lastSyncedPayload === undefined
            ? (lastSyncedDataSnapshot ? cloneData(lastSyncedDataSnapshot) : null)
            : (snapshot.lastSyncedPayload ? cloneData(snapshot.lastSyncedPayload) : null)
        });
      }

      function isCurrentAuthUser(user = authUser) {
        return resolveStorageUserId(user) === resolveStorageUserId(authUser);
      }

      function setSyncStatus(nextStatus) {
        if (syncStatus === nextStatus) return;
        syncStatus = nextStatus;

        if (typeof onSyncStatusChangeForKeeper === "function") {
          onSyncStatusChangeForKeeper(nextStatus);
        }

        if (hasHydratedApp && document.getElementById("app")) {
          if (paintSyncStatusChip()) {
            return;
          }

          render();
        }
      }

      function paintSyncStatusChip() {
        const chip = document.querySelector("[data-sync-chip]");
        if (!chip) return false;

        const syncMeta = getSyncMeta();
        chip.className = `chip ${syncMeta.toneClass}`;

        const valueNode = chip.querySelector("[data-sync-value]");
        if (valueNode) {
          valueNode.textContent = syncMeta.value;
        }

        return true;
      }

      function cloneData(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function cloneSyncValue(value) {
        return value === undefined ? undefined : cloneData(value);
      }

      function valuesEqual(a, b) {
        return JSON.stringify(a ?? null) === JSON.stringify(b ?? null);
      }

      function isIdObjectArray(value) {
        return Array.isArray(value)
          && value.length > 0
          && value.every((item) => isPlainObject(item) && String(item.id || "").trim());
      }

      function mapItemsById(items = []) {
        const map = new Map();
        items.forEach((item) => {
          const id = String(item?.id || "").trim();
          if (id) map.set(id, item);
        });
        return map;
      }

      function orderedMergeIds(baseItems = [], remoteItems = [], localItems = []) {
        const ids = [];
        const seen = new Set();
        [localItems, remoteItems, baseItems].forEach((items) => {
          ensureArray(items).forEach((item) => {
            const id = String(item?.id || "").trim();
            if (!id || seen.has(id)) return;
            seen.add(id);
            ids.push(id);
          });
        });
        return ids;
      }

      function mergeArrayById(baseItems = [], remoteItems = [], localItems = []) {
        const baseMap = mapItemsById(baseItems);
        const remoteMap = mapItemsById(remoteItems);
        const localMap = mapItemsById(localItems);

        return orderedMergeIds(baseItems, remoteItems, localItems).reduce((merged, id) => {
          const baseHas = baseMap.has(id);
          const remoteHas = remoteMap.has(id);
          const localHas = localMap.has(id);
          const baseItem = baseMap.get(id);
          const remoteItem = remoteMap.get(id);
          const localItem = localMap.get(id);

          if (!baseHas) {
            if (remoteHas && localHas) merged.push(mergeSyncValue({}, remoteItem, localItem));
            else if (localHas) merged.push(cloneSyncValue(localItem));
            else if (remoteHas) merged.push(cloneSyncValue(remoteItem));
            return merged;
          }

          const localChanged = !localHas || !valuesEqual(localItem, baseItem);
          const remoteChanged = !remoteHas || !valuesEqual(remoteItem, baseItem);

          if (!localChanged && !remoteChanged) {
            merged.push(cloneSyncValue(baseItem));
            return merged;
          }

          if (localChanged && !remoteChanged) {
            if (localHas) merged.push(cloneSyncValue(localItem));
            return merged;
          }

          if (!localChanged && remoteChanged) {
            if (remoteHas) merged.push(cloneSyncValue(remoteItem));
            return merged;
          }

          if (!localHas) return merged;
          if (!remoteHas) {
            merged.push(cloneSyncValue(localItem));
            return merged;
          }

          merged.push(mergeSyncValue(baseItem, remoteItem, localItem));
          return merged;
        }, []);
      }

      function mergeObjectValues(baseValue = {}, remoteValue = {}, localValue = {}) {
        const merged = {};
        const keys = new Set([
          ...Object.keys(baseValue || {}),
          ...Object.keys(remoteValue || {}),
          ...Object.keys(localValue || {})
        ]);

        keys.forEach((key) => {
          const value = mergeSyncValue(baseValue?.[key], remoteValue?.[key], localValue?.[key]);
          if (value !== undefined) merged[key] = value;
        });

        return merged;
      }

      function mergeSyncValue(baseValue, remoteValue, localValue) {
        if (valuesEqual(localValue, remoteValue)) return cloneSyncValue(localValue);

        const localChanged = !valuesEqual(localValue, baseValue);
        const remoteChanged = !valuesEqual(remoteValue, baseValue);

        if (!localChanged && remoteChanged) return cloneSyncValue(remoteValue);
        if (localChanged && !remoteChanged) return cloneSyncValue(localValue);
        if (!localChanged && !remoteChanged) return cloneSyncValue(baseValue);

        if (isIdObjectArray(baseValue) || isIdObjectArray(remoteValue) || isIdObjectArray(localValue)) {
          return mergeArrayById(ensureArray(baseValue), ensureArray(remoteValue), ensureArray(localValue));
        }

        if (isPlainObject(baseValue) || isPlainObject(remoteValue) || isPlainObject(localValue)) {
          return mergeObjectValues(
            isPlainObject(baseValue) ? baseValue : {},
            isPlainObject(remoteValue) ? remoteValue : {},
            isPlainObject(localValue) ? localValue : {}
          );
        }

        return cloneSyncValue(localValue);
      }

      function mergeDataSnapshots(basePayload, remotePayload, localPayload) {
        const base = applySyncTombstones(basePayload || {});
        const remote = applySyncTombstones(remotePayload || {});
        const local = applySyncTombstones(localPayload || {});
        const merged = normalizeData(mergeSyncValue(base, remote, local));
        return applySyncRecoveryGuards(merged, base, remote, local);
      }

      function isRecoverableCollection(collection) {
        return SYNC_RECOVERABLE_COLLECTIONS.includes(String(collection || ""));
      }

      function getSyncDeleteKey(collection, itemId) {
        const collectionKey = String(collection || "").trim();
        const id = String(itemId || "").trim();
        return collectionKey && id ? `${collectionKey}:${id}` : "";
      }

      function normalizeSyncDelete(item) {
        const base = isPlainObject(item) ? item : {};
        const collection = String(base.collection || "").trim();
        const itemId = String(base.itemId || base.recordId || "").trim();
        const key = getSyncDeleteKey(collection, itemId);
        return {
          id: String(base.id || key || ""),
          collection,
          itemId,
          deletedAt: String(base.deletedAt || ""),
          deletedBy: String(base.deletedBy || "")
        };
      }

      function getSyncDeleteMap(data = {}) {
        const map = new Map();
        ensureArray(data?.syncDeletes).forEach((entry) => {
          const tombstone = normalizeSyncDelete(entry);
          const key = getSyncDeleteKey(tombstone.collection, tombstone.itemId);
          if (key && isRecoverableCollection(tombstone.collection)) {
            map.set(key, tombstone);
          }
        });
        return map;
      }

      function applySyncTombstones(payload) {
        const normalized = normalizeData(payload || {});
        const deleteMap = getSyncDeleteMap(normalized);

        SYNC_RECOVERABLE_COLLECTIONS.forEach((collection) => {
          normalized[collection] = ensureArray(normalized[collection]).filter((item) => {
            return !deleteMap.has(getSyncDeleteKey(collection, item?.id));
          });
        });

        normalized.syncDeletes = Array.from(deleteMap.values()).slice(0, 500);
        return normalized;
      }

      function restoreMissingItemsFromSnapshot(merged, collection, sourceItems, deleteMap) {
        if (!isRecoverableCollection(collection)) return;
        const currentMap = mapItemsById(merged[collection]);

        ensureArray(sourceItems).forEach((item) => {
          const id = String(item?.id || "").trim();
          if (!id || currentMap.has(id)) return;
          if (deleteMap.has(getSyncDeleteKey(collection, id))) return;
          const cloned = cloneSyncValue(item);
          merged[collection].push(cloned);
          currentMap.set(id, cloned);
        });
      }

      function applySyncRecoveryGuards(mergedPayload, basePayload, remotePayload, localPayload) {
        const merged = applySyncTombstones(mergedPayload || {});
        const deleteMap = getSyncDeleteMap(merged);

        SYNC_RECOVERABLE_COLLECTIONS.forEach((collection) => {
          merged[collection] = ensureArray(merged[collection]);
          restoreMissingItemsFromSnapshot(merged, collection, localPayload?.[collection], deleteMap);
          restoreMissingItemsFromSnapshot(merged, collection, remotePayload?.[collection], deleteMap);
        });

        return applySyncTombstones(merged);
      }

      function normalizeRecoveryEntry(entry) {
        const base = isPlainObject(entry) ? entry : {};
        const collection = String(base.collection || "").trim();
        const itemId = String(base.itemId || base.item?.id || "").trim();
        return {
          id: getSyncDeleteKey(collection, itemId),
          collection,
          itemId,
          savedAt: String(base.savedAt || ""),
          source: String(base.source || ""),
          item: isPlainObject(base.item) ? cloneSyncValue(base.item) : null
        };
      }

      function readRecoveryJournal(user = authUser) {
        return ensureArray(readScopedStorage(STORAGE_KEYS.recovery, [], { user }))
          .map((entry) => normalizeRecoveryEntry(entry))
          .filter((entry) => entry.id && isRecoverableCollection(entry.collection) && entry.item);
      }

      function writeRecoveryJournal(entries, user = authUser) {
        const cleanEntries = ensureArray(entries)
          .map((entry) => normalizeRecoveryEntry(entry))
          .filter((entry) => entry.id && isRecoverableCollection(entry.collection) && entry.item)
          .slice(0, LOCAL_RECOVERY_MAX_ITEMS);
        writeStorage(getScopedStorageKey(STORAGE_KEYS.recovery, user), cleanEntries);
      }

      function recordRecoveryItem(collection, item, source = "local-upsert", user = authUser) {
        if (!isRecoverableCollection(collection)) return;
        const id = String(item?.id || "").trim();
        if (!id) return;

        const entry = normalizeRecoveryEntry({
          collection,
          itemId: id,
          savedAt: new Date().toISOString(),
          source,
          item: cloneSyncValue(item)
        });
        const entries = readRecoveryJournal(user).filter((existing) => existing.id !== entry.id);
        writeRecoveryJournal([entry, ...entries], user);
      }

      function recoverLocalJournalItems(payload, user = authUser) {
        const recovered = applySyncTombstones(payload || {});
        const deleteMap = getSyncDeleteMap(recovered);

        readRecoveryJournal(user).forEach((entry) => {
          if (deleteMap.has(getSyncDeleteKey(entry.collection, entry.itemId))) return;
          recovered[entry.collection] = ensureArray(recovered[entry.collection]);
          const currentMap = mapItemsById(recovered[entry.collection]);
          if (currentMap.has(entry.itemId)) return;
          recovered[entry.collection].unshift(cloneSyncValue(entry.item));
        });

        return applySyncTombstones(recovered);
      }

      function getCollectionKeyByReference(collection) {
        return SYNC_RECOVERABLE_COLLECTIONS.find((key) => DATA?.[key] === collection) || "";
      }

      function clearSyncDeleteForItem(collection, itemId) {
        const key = getSyncDeleteKey(collection, itemId);
        if (!key) return;
        DATA.syncDeletes = ensureArray(DATA.syncDeletes).filter((entry) => {
          const tombstone = normalizeSyncDelete(entry);
          return getSyncDeleteKey(tombstone.collection, tombstone.itemId) !== key;
        });
      }

      function markSyncDelete(collection, itemId) {
        const key = getSyncDeleteKey(collection, itemId);
        if (!key || !isRecoverableCollection(collection)) return;
        DATA.syncDeletes = ensureArray(DATA.syncDeletes).filter((entry) => {
          const tombstone = normalizeSyncDelete(entry);
          return getSyncDeleteKey(tombstone.collection, tombstone.itemId) !== key;
        });
        DATA.syncDeletes.unshift(normalizeSyncDelete({
          id: key,
          collection,
          itemId,
          deletedAt: new Date().toISOString(),
          deletedBy: getActorName()
        }));
      }

      function setSyncBaseline(payload, updatedAt = "", user = authUser) {
        lastSyncedDataSnapshot = cloneData(applySyncTombstones(payload || {}));
        lastSyncedRemoteUpdatedAt = String(updatedAt || "");
        persistSyncSnapshot({
          pendingRemoteSave,
          localChangeRevision,
          lastSyncedRemoteUpdatedAt,
          lastSyncedPayload: lastSyncedDataSnapshot
        }, user);
      }

      function createProfileTask(template, creatorId) {

      function getDefaultCreatorOps(creator = {}) {

      function normalizeProfileTask(task, creatorId) {
        const defaultPriority = ["critical", "high", "medium", "low"].includes(task?.priority) ? task.priority : "medium";
        return {
          id: String(task?.id || createId("perfil-task")),
          creatorId,

          priority: defaultPriority,

        };

      function normalizeCreatorOps(ops, creator) {
        const defaults = getDefaultCreatorOps(creator);
        const existingOps = isPlainObject(ops) ? ops : {};
        const existingTasks = ensureArray(existingOps.tasks).map((task) => normalizeProfileTask(task, creator.id));
        const byTemplateKey = new Map(existingTasks.filter((task) => task.templateKey).map((task) => [task.templateKey, task]));
        const mergedTemplateTasks = PROFILE_TASK_TEMPLATES.map((template) => {
          const key = `${template.area}:${template.phase}:${template.title}`;
          return byTemplateKey.get(key) || createProfileTask(template, creator.id);
        });
        const manualTasks = existingTasks.filter((task) => !task.templateKey);

        return {
          tasks: [...mergedTemplateTasks, ...manualTasks],
          notes: ensureArray(existingOps.notes).map((note) => ({
            id: String(note?.id || createId("perfil-note")),
            text: String(note?.text || ""),
            area: String(note?.area || "summary"),
            createdAt: String(note?.createdAt || formatDateTimeLabel())
          })),
          system: {
            ...defaults.system,
            ...(isPlainObject(existingOps.system) ? existingOps.system : {})
          },
          marketing: {
            ...defaults.marketing,
            ...(isPlainObject(existingOps.marketing) ? existingOps.marketing : {})
          },
          retention: {
            ...defaults.retention,
            ...(isPlainObject(existingOps.retention) ? existingOps.retention : {})
          },

      }

      function normalizeTextList(value) {
        if (Array.isArray(value)) {
          return value.map((item) => String(item || "").trim()).filter(Boolean);

        if (typeof value === "string") {
          return value.split(",").map((item) => item.trim()).filter(Boolean);
        }

        return [];

      function normalizeTaskOwners(value, legacyOwner = "") {
        const owners = normalizeTextList(value);
        const legacy = String(legacyOwner || "").trim();
        if (legacy && !owners.includes(legacy)) {

        }
        return owners;
      }

      function isPlainObject(value) {
        return Boolean(value) && typeof value === "object" && !Array.isArray(value);
      }

      function ensureArray(value) {
        return Array.isArray(value) ? value : [];
      }

      function normalizeData(value) {
        const defaults = cloneData(DEFAULT_DATA);
        if (!isPlainObject(value)) return defaults;

        const appRoles = value.appRoles === undefined
          ? cloneData(DEFAULT_APP_ROLES)
          : ensureArray(value.appRoles).map((role) => normalizeAppRole(role));

        const rawRolePermissions = value.rolePermissions === undefined
          ? createDefaultRolePermissions()
          : ensureArray(value.rolePermissions).map((permission) => normalizeRolePermission(permission));

        const rolePermissions = appRoles.flatMap((role) => {
          return Object.keys(RBAC_MODULE_LABELS).map((moduleKey) => {
            return rawRolePermissions.find((permission) => permission.roleId === role.id && permission.moduleKey === moduleKey)
              || normalizeRolePermission({ roleId: role.id, moduleKey });
          });
        });

        const normalizedCreators = ensureArray(value.creators).map((creator) => normalizeCreator(creator));

        return {
          ...defaults,
          ...value,
          user: {
            ...defaults.user,
            ...(isPlainObject(value.user) ? value.user : {})
          },
          leads: ensureArray(value.leads).map((lead) => normalizeLead(lead)),
          creators: normalizedCreators,
          tasks: ensureArray(value.tasks).map((task) => normalizeTask(task)),
          onboardingBlocks: ensureArray(value.onboardingBlocks),
          contentPieces: ensureArray(value.contentPieces),
          queue: ensureArray(value.queue),
          sops: ensureArray(value.sops).map((sop) => normalizeSop(sop)),
          metrics: ensureArray(value.metrics),
          appUsers: ensureArray(value.appUsers).map((user) => normalizeAppUser(user, normalizedCreators)),
          passwordVault: ensureArray(value.passwordVault).map((credential) => normalizePasswordCredential(credential)),
          appRoles,
          rolePermissions,
          contracts: ensureArray(value.contracts).map((contract) => normalizeContract(contract)),
          chatRoles: value.chatRoles === undefined
            ? cloneData(DEFAULT_CHAT_ROLES)
            : ensureArray(value.chatRoles).map((role) => normalizeChatRole(role)),
          chatChannels: ensureArray(value.chatChannels).map((channel) => normalizeChatChannel(channel)),
          chatAgents: ensureArray(value.chatAgents).map((agent) => normalizeChatAgent(agent, normalizedCreators)),
          chatTrainings: ensureArray(value.chatTrainings).map((training) => normalizeChatTraining(training)),
          eosReports: ensureArray(value.eosReports).map((report) => normalizeEosReport(report)),
          chatMonitoring: ensureArray(value.chatMonitoring).map((review) => normalizeChatMonitoring(review)),
          chatApprovals: ensureArray(value.chatApprovals).map((approval) => normalizeChatApproval(approval)),
          fanProfiles: ensureArray(value.fanProfiles).map((fan) => normalizeFanProfile(fan)),
          fanFlow: ensureArray(value.fanFlow).map((flow) => normalizeFanFlow(flow)),
          gfStages: ensureArray(value.gfStages).map((stage) => normalizeGfStage(stage)),
          shifts: ensureArray(value.shifts).map((shift) => normalizeShift(shift)),
          hiringCandidates: ensureArray(value.hiringCandidates).map((candidate) => normalizeHiringCandidate(candidate)),
          processMaps: ensureArray(value.processMaps).map((item) => normalizeProcessMap(item)),
          governanceEntries: ensureArray(value.governanceEntries).map((entry) => normalizeGovernanceEntry(entry)),
          payments: ensureArray(value.payments).map((payment) => normalizePayment(payment)),
          accountInfrastructure: ensureArray(value.accountInfrastructure).map((item) => normalizeAccountInfrastructure(item)),
          contentDocs: ensureArray(value.contentDocs).map((item) => normalizeContentDoc(item)),
          contentStyles: ensureArray(value.contentStyles).map((item) => normalizeContentStyle(item)),

          deliveryFlow: ensureArray(value.deliveryFlow).map((item) => normalizeDeliveryFlow(item)),

        };

      function persistData(user = authUser) {
        persistDataSnapshot(DATA, user);
      }

      function hydrateData(options = {}) {
        const { user = authUser, migrateLegacy = false } = options;
        const storedData = readScopedStorage(STORAGE_KEYS.data, null, { user, migrateLegacy });
        DATA = recoverLocalJournalItems(applySyncTombstones(storedData), user);
      }

      function getRememberedAuth() {
        const saved = readStorage(STORAGE_KEYS.auth, {});
        const email = String(saved?.email || "");
        const remember = Boolean(saved?.remember && email);

        if (Object.prototype.hasOwnProperty.call(saved || {}, "password")) {
          if (remember) {
            writeStorage(STORAGE_KEYS.auth, { email, remember: true });
          } else {
            removeStorage(STORAGE_KEYS.auth);
          }
        }

        return { email, password: "", remember };
      }

      function resetAuthDraftFromRemembered() {
        authDraft = getRememberedAuth();
      }

      function persistRememberedAuth(credentials = {}) {
        const email = String(credentials.email || "").trim();
        const remember = Boolean(credentials.remember);

        authDraft = { email, password: "", remember };

        if (remember) {
          writeStorage(STORAGE_KEYS.auth, { email, remember: true });
          return;
        }

        removeStorage(STORAGE_KEYS.auth);
      }

      function persistSyncState(user = authUser) {
        persistSyncSnapshot({
          pendingRemoteSave,
          localChangeRevision
        }, user);
      }

      function hydrateSyncState(options = {}) {
        const { user = authUser, migrateLegacy = false } = options;
        const savedSyncState = readScopedStorage(STORAGE_KEYS.sync, {}, { user, migrateLegacy });
        pendingRemoteSave = Boolean(savedSyncState?.pendingRemoteSave);
        localChangeRevision = Number.isFinite(Number(savedSyncState?.localChangeRevision))
          ? Number(savedSyncState.localChangeRevision)
          : 0;
        lastSyncedDataSnapshot = savedSyncState?.lastSyncedPayload
          ? cloneData(normalizeData(savedSyncState.lastSyncedPayload))
          : null;
        lastSyncedRemoteUpdatedAt = String(savedSyncState?.lastSyncedRemoteUpdatedAt || "");
      }

      function getSyncMeta() {
        if (syncStatus === "syncing") {
          return { toneClass: "chip-warning", value: "Sincronizando" };
        }

        if (syncStatus === "synced") {
          return { toneClass: "chip-success", value: "Sincronizado" };
        }

        if (syncStatus === "error") {
          return { toneClass: "chip-danger", value: "Error" };
        }

        return { toneClass: "chip-info", value: "Local" };
      }

      function classifySyncError(error) {
        const code = String(error?.code || "").toUpperCase();
        const status = Number(error?.status || error?.statusCode || 0) || null;
        const message = String(error?.message || error?.error_description || "");
        const details = String(error?.details || "");
        const hint = String(error?.hint || "");
        const combined = `${message} ${details} ${hint}`.toLowerCase();

        if (
          code === "42501"
          || status === 401
          || status === 403
          || combined.includes("row-level security")
          || combined.includes("permission denied")
          || combined.includes("not allowed")
        ) {
          return {
            type: "RLS",
            summary: "Supabase rechazo la operacion por RLS o permisos."
          };
        }

        if (
          code === "42703"
          || code === "42P01"
          || code === "PGRST204"
          || combined.includes("schema cache")
          || combined.includes("column")
          || combined.includes("relation")
          || combined.includes("does not exist")
        ) {
          return {
            type: "SCHEMA",
            summary: "La tabla o las columnas no coinciden con el esquema remoto."
          };
        }

        return {
          type: "REMOTE",
          summary: "Supabase devolvio un error durante la sincronizacion."
        };
      }

      function logSyncError(stage, error, context = {}) {
        const info = classifySyncError(error);
        console.error(`[Sync][${stage}][${info.type}] ${info.summary}`, {
          table: APP_STATE_TABLE,
          userId: authUser?.id || null,
          code: error?.code || null,
          status: error?.status || error?.statusCode || null,
          message: error?.message || String(error),
          details: error?.details || null,
          hint: error?.hint || null,
          ...context
        });
      }

      function getRemoteStatePayload(user = authUser) {
        return {
          id: APP_STATE_ROW_ID,
          payload: cloneData(applySyncTombstones(DATA)),
          updated_at: new Date().toISOString()
        };
      }

      async function runSyncQuery(stage, operation) {
        let timeoutId = null;

        try {
          return await Promise.race([
            Promise.resolve().then(operation),
            new Promise((_, reject) => {
              timeoutId = window.setTimeout(() => {
                reject({
                  code: "SYNC_TIMEOUT",
                  message: `La operacion ${stage} excedio ${REMOTE_SYNC_TIMEOUT_MS}ms.`,
                  stage
                });
              }, REMOTE_SYNC_TIMEOUT_MS);
            })
          ]);
        } finally {
          if (timeoutId) {
            window.clearTimeout(timeoutId);
          }
        }
      }

      async function saveRemoteData(options = {}) {
        const { force = false } = options;
        const storageUser = authUser;

        if (!supabaseClient) {
          console.error("Supabase no esta disponible en window.supabase.");
          persistData();
          persistSyncState();
          setSyncStatus("error");
          return false;
        }

        /* No guardar remotamente sin sesión activa */
        if (!storageUser) {
          console.warn("[Sync][WRITE][AUTH] No hay sesion activa/authUser; se conserva solo localStorage.", {
            table: APP_STATE_TABLE
          });
          persistData();
          persistSyncState();
          setSyncStatus("local");
          return true;
        }

        if (!force && !hasHydratedApp) {
          persistData();
          persistSyncState();
          setSyncStatus("local");
          return false;
        }

        if (!force && !pendingRemoteSave) {
          return true;
        }

        const remoteState = getRemoteStatePayload(storageUser);
        const saveRevision = localChangeRevision;
        const localSnapshot = cloneData(recoverLocalJournalItems(applySyncTombstones(DATA), storageUser));
        pendingRemoteSave = false;
        setSyncStatus("syncing");

        try {
          let mergedPayload = applySyncTombstones(localSnapshot);
          let savedUpdatedAt = remoteState.updated_at;
          let writeSucceeded = false;

          for (let attempt = 1; attempt <= 4; attempt += 1) {
            const { data: existingRows, error: readError } = await runSyncQuery("WRITE_READ", () => {
              return supabaseClient
                .from(APP_STATE_TABLE)
                .select("id, payload, updated_at")
                .eq("id", APP_STATE_ROW_ID)
                .limit(2);
            });

            if (readError) throw { stage: "WRITE_READ", cause: readError };

            const rows = Array.isArray(existingRows) ? existingRows : [];
            if (rows.length > 1) {
              console.warn("[Sync][WRITE][DUPLICATE_ROWS] Se encontraron varias filas para el mismo id compartido; se usara la primera.", {
                table: APP_STATE_TABLE,
                rowId: APP_STATE_ROW_ID,
                rows: rows.length
              });
            }

            const existing = rows[0] || null;
            const remotePayload = existing?.payload !== undefined && existing?.payload !== null
              ? applySyncTombstones(existing.payload)
              : applySyncTombstones({});
            const basePayload = lastSyncedDataSnapshot
              ? applySyncTombstones(lastSyncedDataSnapshot)
              : applySyncTombstones({});

            mergedPayload = rows.length > 0
              ? mergeDataSnapshots(basePayload, remotePayload, localSnapshot)
              : applySyncTombstones(localSnapshot);

            const nextUpdatedAt = new Date().toISOString();
            let writeResult;

            if (rows.length > 0) {
              writeResult = await runSyncQuery("WRITE_UPDATE", () => {
                return supabaseClient
                  .from(APP_STATE_TABLE)
                  .update({
                    payload: mergedPayload,
                    updated_at: nextUpdatedAt
                  })
                  .eq("id", APP_STATE_ROW_ID)
                  .eq("updated_at", existing.updated_at)
                  .select("id, updated_at")
                  .limit(1);
              });
            } else {
              writeResult = await runSyncQuery("WRITE_INSERT", () => {
                return supabaseClient
                  .from(APP_STATE_TABLE)
                  .insert({
                    ...remoteState,
                    payload: mergedPayload,
                    updated_at: nextUpdatedAt
                  })
                  .select("id, updated_at")
                  .limit(1);
              });
            }

            if (writeResult.error) {
              const conflictCode = String(writeResult.error.code || "").toUpperCase();
              if (rows.length === 0 && (conflictCode === "23505" || conflictCode === "409")) {
                continue;
              }
              throw {
                stage: rows.length > 0 ? "WRITE_UPDATE" : "WRITE_INSERT",
                cause: writeResult.error
              };
            }

            const writtenRows = Array.isArray(writeResult.data) ? writeResult.data : [];
            if (rows.length > 0 && !writtenRows.length) {
              console.info("[Sync][WRITE][CONFLICT] Otro usuario guardo entre lectura y escritura; reintentando mezcla.", {
                table: APP_STATE_TABLE,
                rowId: APP_STATE_ROW_ID,
                attempt
              });
              continue;
            }

            savedUpdatedAt = writtenRows[0]?.updated_at || nextUpdatedAt;
            writeSucceeded = true;
            break;
          }

          if (!writeSucceeded) {
            throw {
              stage: "WRITE_CONFLICT",
              cause: {
                code: "SYNC_CONFLICT_RETRY_LIMIT",
                message: "No se pudo guardar tras varios reintentos por cambios concurrentes."
              }
            };
          }

          setSyncBaseline(mergedPayload, savedUpdatedAt, storageUser);

          if (!isCurrentAuthUser(storageUser)) {
            console.warn("[Sync][WRITE][STALE] Resultado ignorado porque cambio el usuario activo.", {
              table: APP_STATE_TABLE,
              rowId: APP_STATE_ROW_ID,
              activeUserId: resolveStorageUserId(authUser) || null
            });
            return true;
          }

          const dataBeforeCommit = cloneData(DATA);
          if (!pendingRemoteSave && localChangeRevision === saveRevision) {
            DATA = applySyncTombstones(mergedPayload);
            persistDataSnapshot(DATA, storageUser);
            if (hasHydratedApp && !valuesEqual(dataBeforeCommit, DATA)) {
              render({ preserveScroll: true });
            }
          } else {
            persistDataSnapshot(DATA, storageUser);
          }

          if (pendingRemoteSave || localChangeRevision !== saveRevision) {
            setSyncStatus("syncing");
            return true;
          }

          setSyncStatus("synced");
          return true;
        } catch (error) {
          const stage = String(error?.stage || "WRITE");
          const cause = error?.cause || error;
          logSyncError(stage, cause, {
            mode: stage === "WRITE_INSERT" ? "insert" : "update",
            rowId: APP_STATE_ROW_ID
          });

          if (!isCurrentAuthUser(storageUser)) {
            console.warn("[Sync][WRITE][STALE_ERROR] Error ignorado porque cambio el usuario activo.", {
              table: APP_STATE_TABLE,
              rowId: APP_STATE_ROW_ID,
              activeUserId: resolveStorageUserId(authUser) || null
            });
            persistSyncSnapshot({
              pendingRemoteSave: true,
              localChangeRevision: saveRevision
            }, storageUser);
            return false;
          }

          pendingRemoteSave = true;
          persistData(storageUser);
          persistSyncState(storageUser);
          setSyncStatus("error");
          return false;
        }
      }

      function queueSave(delay = 700) {
        localChangeRevision += 1;
        pendingRemoteSave = true;
        persistData();
        persistSyncState();

        if (!authUser) {
          setSyncStatus("local");
          return;
        }

        if (!supabaseClient) {
          console.error("[Sync][QUEUE][CLIENT] Supabase no esta disponible; se mantiene solo el respaldo local.", {
            table: APP_STATE_TABLE,
            userId: authUser?.id || null
          });
          setSyncStatus("error");
          return;
        }

        if (!hasHydratedApp) {
          setSyncStatus("local");
          return;
        }

        setSyncStatus("syncing");

        if (saveDebounceId) {
          window.clearTimeout(saveDebounceId);
        }

        saveDebounceId = window.setTimeout(() => {
          saveDebounceId = null;
          saveQueue = saveQueue
            .then(() => saveRemoteData())
            .catch((error) => {
              console.error("Error en la cola de guardado remoto:", error);
              setSyncStatus("error");
            });
        }, delay);
      }

      async function loadRemoteData() {
        const storageUser = authUser;

        if (!supabaseClient) {
          console.error("Supabase JS no se cargo correctamente desde el CDN.");
          hydrateData();
          setSyncStatus("error");
          return false;
        }

        /* No cargar datos remotos sin sesión activa */
        if (!storageUser) {
          console.warn("[Sync][READ][AUTH] No hay sesion activa/authUser; la app queda en modo local.", {
            table: APP_STATE_TABLE
          });
          hydrateData();
          setSyncStatus("local");
          return false;
        }

        setSyncStatus("syncing");

        try {
          const { data: rows, error } = await runSyncQuery("READ", () => {
            return supabaseClient
              .from(APP_STATE_TABLE)
              .select("id, payload, updated_at")
              .eq("id", APP_STATE_ROW_ID)
              .limit(2);
          });

          if (error) throw error;

          const remoteRows = Array.isArray(rows) ? rows : [];
          if (remoteRows.length > 1) {
            console.warn("[Sync][READ][DUPLICATE_ROWS] Se encontraron varias filas para el mismo id compartido; se usara la primera.", {
              table: APP_STATE_TABLE,
              rowId: APP_STATE_ROW_ID,
              rows: remoteRows.length
            });
          }

          const remoteState = remoteRows[0] || null;

          if (!isCurrentAuthUser(storageUser)) {
            console.warn("[Sync][READ][STALE] Resultado ignorado porque cambio el usuario activo.", {
              table: APP_STATE_TABLE,
              rowId: APP_STATE_ROW_ID,
              activeUserId: resolveStorageUserId(authUser) || null
            });
            return false;
          }

          if (remoteState && remoteState.payload !== null && remoteState.payload !== undefined) {
            const remotePayload = applySyncTombstones(remoteState.payload);
            const localSnapshot = applySyncTombstones(DATA);
            const basePayload = lastSyncedDataSnapshot
              ? applySyncTombstones(lastSyncedDataSnapshot)
              : remotePayload;
            const shouldMergeWithLocal = Boolean(lastSyncedDataSnapshot) || pendingRemoteSave;
            const mergedPayload = shouldMergeWithLocal
              ? mergeDataSnapshots(basePayload, remotePayload, localSnapshot)
              : remotePayload;
            const recoveredPayload = recoverLocalJournalItems(mergedPayload, storageUser);
            const shouldWriteBack = !valuesEqual(recoveredPayload, remotePayload);

            DATA = recoveredPayload;
            const bootstrappedOwner = bootstrapWorkspaceOwnerFromAuth(storageUser);
            if (!bootstrappedOwner) {
              syncWorkspaceOwnerEmailFromAppUsers();
            }
            pendingRemoteSave = Boolean(bootstrappedOwner || shouldWriteBack);
            setSyncBaseline(remotePayload, remoteState.updated_at, storageUser);
            persistData(storageUser);
            persistSyncState(storageUser);

            if (bootstrappedOwner || shouldWriteBack) {
              const ownerSeedSaved = await saveRemoteData({ force: true });
              if (!ownerSeedSaved) {
                throw new Error("No se pudo guardar la mezcla local/remota en Supabase.");
              }
            }

            setSyncStatus("synced");
            return true;
          }

          bootstrapWorkspaceOwnerFromAuth(storageUser);
          syncWorkspaceOwnerEmailFromAppUsers();
          const seeded = await saveRemoteData({ force: true });
          if (!seeded) {
            throw new Error("No se pudo crear el estado inicial remoto.");
          }

          setSyncStatus("synced");
          return true;
        } catch (error) {
          logSyncError("READ", error, { rowId: APP_STATE_ROW_ID });

          if (!isCurrentAuthUser(storageUser)) {
            console.warn("[Sync][READ][STALE_ERROR] Error ignorado porque cambio el usuario activo.", {
              table: APP_STATE_TABLE,
              rowId: APP_STATE_ROW_ID,
              activeUserId: resolveStorageUserId(authUser) || null
            });
            return false;
          }

          hydrateData();
          setSyncStatus("error");
          return false;
        }
      }

      /* ========== Sincronización continua con Supabase ========== */
      let remoteSyncChannel = null;
      let remoteSyncPollId = null;
      let remoteSyncRetryId = null;
      const REMOTE_SYNC_POLL_MS = 10000;
      const REMOTE_SYNC_RETRY_MIN_MS = 5000;
      const REMOTE_SYNC_RETRY_MAX_MS = 30000;
      let remoteSyncRetryDelay = REMOTE_SYNC_RETRY_MIN_MS;

      async function pullIfIdle(reason = "poll") {
        if (!authUser || !supabaseClient || !hasHydratedApp) return;
        if (pendingRemoteSave || saveDebounceId) return;
        try {
          const before = cloneData(DATA);
          const loaded = await loadRemoteData();
          if (loaded && !valuesEqual(before, DATA) && !pendingRemoteSave) {
            render({ preserveScroll: true });
          }
        } catch (error) {
          console.error(`[Sync][${reason}] fallo pull:`, error);
        }
      }

      async function flushIfPending(reason = "retry") {
        if (!authUser || !supabaseClient || !hasHydratedApp) return;
        if (!pendingRemoteSave) return;
        try {
          await saveRemoteData({ force: true });
        } catch (error) {
          console.error(`[Sync][${reason}] fallo flush:`, error);
        }
      }

      function scheduleRemoteSyncRetry() {
        if (remoteSyncRetryId) return;
        if (!authUser || !supabaseClient) return;
        remoteSyncRetryId = window.setTimeout(async () => {
          remoteSyncRetryId = null;
          if (!authUser) return;
          const wasError = syncStatus === "error";
          await flushIfPending("retry");
          await pullIfIdle("retry");
          if (syncStatus === "error" || pendingRemoteSave) {
            remoteSyncRetryDelay = Math.min(remoteSyncRetryDelay * 2, REMOTE_SYNC_RETRY_MAX_MS);
            scheduleRemoteSyncRetry();
          } else if (wasError) {
            remoteSyncRetryDelay = REMOTE_SYNC_RETRY_MIN_MS;
          }
        }, remoteSyncRetryDelay);
      }

      function onSyncStatusChangeForKeeper(status) {
        if (status === "error" || pendingRemoteSave) {
          scheduleRemoteSyncRetry();
        } else if (status === "synced") {
          remoteSyncRetryDelay = REMOTE_SYNC_RETRY_MIN_MS;
        }
      }

      function handleConnectivityWake() {
        if (!authUser) return;
        remoteSyncRetryDelay = REMOTE_SYNC_RETRY_MIN_MS;
        flushIfPending("wake");
        pullIfIdle("wake");
        if (supabaseClient && !remoteSyncChannel) {
          startRemoteSync();
        }
      }

      function handleVisibilityWake() {
        if (document.visibilityState === "visible") handleConnectivityWake();
      }

      let remoteSyncListenersAttached = false;
      function attachRemoteSyncListeners() {
        if (remoteSyncListenersAttached) return;
        remoteSyncListenersAttached = true;
        window.addEventListener("online", handleConnectivityWake);
        document.addEventListener("visibilitychange", handleVisibilityWake);
        window.addEventListener("focus", handleConnectivityWake);
      }

      async function startRemoteSync() {
        if (!supabaseClient || !authUser) return;
        attachRemoteSyncListeners();

        await stopRemoteSync({ keepListeners: true });

        try {
          const channel = supabaseClient
            .channel(`ofm-app-state-${APP_STATE_ROW_ID}`)
            .on(
              "postgres_changes",
              {
                event: "*",
                schema: "public",
                table: APP_STATE_TABLE,
                filter: `id=eq.${APP_STATE_ROW_ID}`
              },
              () => { pullIfIdle("realtime"); }
            );

          remoteSyncChannel = channel;

          channel.subscribe((status) => {
            if (remoteSyncChannel !== channel) return;
            if (status === "CHANNEL_ERROR" || status === "TIMED_OUT" || status === "CLOSED") {
              console.warn("[Sync][REALTIME] canal caído, reintentando…", status);
              window.setTimeout(() => {
                if (remoteSyncChannel === channel && authUser) startRemoteSync();
              }, REMOTE_SYNC_RETRY_MIN_MS);
            }
          });
        } catch (error) {
          console.error("[Sync][REALTIME] no se pudo abrir canal:", error);
        }

        if (remoteSyncPollId) window.clearInterval(remoteSyncPollId);
        remoteSyncPollId = window.setInterval(() => {
          flushIfPending("poll");
          pullIfIdle("poll");
        }, REMOTE_SYNC_POLL_MS);
      }

      async function stopRemoteSync(options = {}) {
        if (remoteSyncPollId) {
          window.clearInterval(remoteSyncPollId);
          remoteSyncPollId = null;
        }
        if (remoteSyncRetryId) {
          window.clearTimeout(remoteSyncRetryId);
          remoteSyncRetryId = null;
        }
        const channel = remoteSyncChannel;
        remoteSyncChannel = null;
        if (channel && supabaseClient) {
          try { await supabaseClient.removeChannel(channel); }
          catch (error) { console.error("[Sync][REALTIME] error cerrando canal:", error); }
        }
      }

      async function flushPendingSavesBeforeSignOut() {
        persistData();
        persistSyncState();

        if (saveDebounceId) {
          window.clearTimeout(saveDebounceId);
          saveDebounceId = null;
        }

        try {
          await saveQueue;
        } catch (error) {
          console.error("Error esperando la cola de guardado antes de cerrar sesión:", error);
        }

        if (!authUser || !supabaseClient || !pendingRemoteSave) {
          return true;
        }

        return saveRemoteData({ force: true });
      }

      function formatDateLabel() {
        return new Intl.DateTimeFormat("es-ES", {
          day: "2-digit",
          month: "short"
        }).format(new Date());
      }

      function formatDateTimeLabel() {
        return new Intl.DateTimeFormat("es-ES", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        }).format(new Date());
      }

      function currentISODate() {
        return new Date().toISOString().slice(0, 10);
      }

      function formatDateTimeForInput(value = new Date()) {
        const date = value instanceof Date ? value : new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        const pad = (num) => String(num).padStart(2, "0");
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
      }

      function formatDateTimeForWeek(value = new Date()) {
        return formatDateTimeForInput(value).slice(0, 16);
      }

      function parseDateTime(value) {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function normalizeInputValueForType(value, type = "text") {
        const raw = String(value ?? "").trim();
        if (!raw) return "";

        const pad = (num) => String(num).padStart(2, "0");
        const isoMatch = raw.match(/^(\d{4})-(\d{1,2})(?:-(\d{1,2}))?(?:[T\s](\d{1,2}):(\d{2}))?/);
        const localMatch = raw.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{4})(?:,?\s+(\d{1,2}):(\d{2}))?/);

        if (type === "date") {
          if (isoMatch?.[3]) return `${isoMatch[1]}-${pad(isoMatch[2])}-${pad(isoMatch[3])}`;
          if (localMatch) return `${localMatch[3]}-${pad(localMatch[2])}-${pad(localMatch[1])}`;
          const parsed = parseDateTime(raw);
          return parsed ? formatDateTimeForInput(parsed).slice(0, 10) : raw;
        }

        if (type === "datetime-local") {
          if (isoMatch?.[3]) {
            return `${isoMatch[1]}-${pad(isoMatch[2])}-${pad(isoMatch[3])}T${pad(isoMatch[4] || "0")}:${pad(isoMatch[5] || "0")}`;
          }
          if (localMatch) {
            return `${localMatch[3]}-${pad(localMatch[2])}-${pad(localMatch[1])}T${pad(localMatch[4] || "0")}:${pad(localMatch[5] || "0")}`;
          }
          const parsed = parseDateTime(raw);
          return parsed ? formatDateTimeForInput(parsed) : raw;
        }

        if (type === "time") {
          const timeMatch = raw.match(/(\d{1,2}):(\d{2})/);
          return timeMatch ? `${pad(timeMatch[1])}:${pad(timeMatch[2])}` : raw;
        }

        if (type === "month") {
          if (isoMatch) return `${isoMatch[1]}-${pad(isoMatch[2])}`;
          if (localMatch) return `${localMatch[3]}-${pad(localMatch[2])}`;
          const parsed = parseDateTime(raw);
          return parsed ? formatDateTimeForInput(parsed).slice(0, 7) : raw;
        }

        return raw;
      }

      function isDateValuePast(value) {
        const normalized = normalizeInputValueForType(value, "date");
        return /^\d{4}-\d{2}-\d{2}$/.test(normalized) && normalized < currentISODate();
      }

      function fileToDataRecord(file) {
        if (!file || typeof FileReader === "undefined") return Promise.resolve(null);
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            resolve({
              fileName: file.name || "",
              fileType: file.type || "",
              fileData: String(reader.result || ""),
              uploadedAt: formatDateTimeLabel()
            });
          };
          reader.onerror = () => reject(reader.error || new Error("No se pudo leer el archivo"));
          reader.readAsDataURL(file);
        });
      }

      function downloadStoredFile(fileName, fileData) {
        if (!fileData) return;
        const link = document.createElement("a");
        link.href = fileData;
        link.download = fileName || "archivo";
        document.body.appendChild(link);
        link.click();
        link.remove();
      }

      function createId(prefix) {
        return `${prefix}-${Date.now().toString(36)}${Math.random().toString(36).slice(2, 6)}`;
      }

      function getInitial(value, fallback = "U") {
        const text = String(value || "").trim();
        return text ? text.charAt(0).toUpperCase() : fallback;
      }

      function getAgencyName() {
        return DATA.user.agencyName || DEFAULT_DATA.user.agencyName;
      }

      function getWorkspaceLabel() {
        return DATA.user.workspaceLabel || DEFAULT_DATA.user.workspaceLabel;
      }

      function getUserDisplayName() {
        return DATA.user.name || DEFAULT_DATA.user.name;
      }

      function getActorName() {
        return authUser?.email || getUserDisplayName();
      }

      function getActorEmail() {
        return authUser?.email || DATA.user.email || "";
      }

      function getAuthenticatedAppUser() {
        const email = normalizeEmail(getActorEmail());
        if (!email) return null;
        return DATA.appUsers.find((user) => normalizeEmail(user.email) === email) || null;
      }

      function getFirstActiveOwnerAppUser(data = DATA) {
        return ensureArray(data?.appUsers).find((user) => {
          if (!user || user.status === "inactive") return false;
          return user.roleId === "role-owner" || ["Owner", "Propietario"].includes(String(user.roleName || "").trim());
        }) || null;
      }

      function getConfiguredWorkspaceOwnerEmail(data = DATA) {
        const directEmail = normalizeEmail(data?.user?.email || "");
        if (directEmail) return directEmail;
        return normalizeEmail(getFirstActiveOwnerAppUser(data)?.email || "");

      function isWorkspaceDatasetEmpty(data = DATA) {
        const collections = [
          "leads",
          "creators",
          "tasks",
          "onboardingBlocks",
          "contentPieces",
          "queue",
          "sops",
          "metrics",

          "shifts",

          "processMaps",
          "governanceEntries",
          "payments",
          "accountInfrastructure",
          "contentDocs",
          "contentStyles",
          "contentVehicles",
          "deliveryFlow"
        ];

        return collections.every((key) => ensureArray(data?.[key]).length === 0);
      }

      function isBootstrapWorkspaceOwner(user = authUser, data = DATA) {
        const authEmail = normalizeEmail(user?.email || "");
        if (!authEmail) return false;
        return !getConfiguredWorkspaceOwnerEmail(data)
          && (isWorkspaceDatasetEmpty(data) || ensureArray(data?.appUsers).length === 0);
      }

      function isWorkspaceOwnerAuthUser(user = authUser, data = DATA) {
        const authEmail = normalizeEmail(user?.email || "");
        if (!authEmail) return false;

        const matchedUser = ensureArray(data?.appUsers).find((item) => normalizeEmail(item?.email) === authEmail);
        if (matchedUser && matchedUser.status !== "inactive") {
          return matchedUser.roleId === "role-owner" || ["Owner", "Propietario"].includes(String(matchedUser.roleName || "").trim());
        }

        const configuredOwnerEmail = getConfiguredWorkspaceOwnerEmail(data);
        if (configuredOwnerEmail) {
          return configuredOwnerEmail === authEmail;
        }

        return isBootstrapWorkspaceOwner(user, data);
      }

      function bootstrapWorkspaceOwnerFromAuth(user = authUser) {
        if (!isBootstrapWorkspaceOwner(user, DATA)) return false;

        const authEmail = String(user?.email || "").trim();
        if (!authEmail) return false;

        DATA.user = {
          ...DATA.user,
          email: authEmail,
          role: "Propietario",
          name: String(DATA.user.name || "").trim() && DATA.user.name !== DEFAULT_DATA.user.name
            ? DATA.user.name
            : String(user?.user_metadata?.name || authEmail || "Propietario").trim()
        };

        return true;

        const ownerUser = getFirstActiveOwnerAppUser(DATA);

      function serializePresenceSet(values) {
        return Array.from(values).sort().join("|");
      }

      function commitPresenceSets(nextEmails, nextIds, options = {}) {
        const signature = `${serializePresenceSet(nextEmails)}::${serializePresenceSet(nextIds)}`;
        const changed = signature !== lastPresenceSignature;

        onlineUserEmails = nextEmails;
        onlineUserIds = nextIds;
        lastPresenceSignature = signature;

        if (
          changed &&
          options.renderAfter !== false &&
          hasHydratedApp &&
          state.view === "users" &&
          document.getElementById("app")
        ) {
          render();
        }

        return changed;
      }

      function getCurrentPresencePayload() {
        const email = normalizeEmail(authUser?.email || getActorEmail());
        if (!authUser || !email) return null;

        const currentUser = getInternalCurrentUser();

        return {
          email,
          appUserId: currentUser?.id || "",
          name: currentUser?.name || authUser?.user_metadata?.name || authUser?.email || "Usuario",
          roleName: currentUser?.roleName || "",
          tabId: presenceClientId,
          onlineAt: new Date().toISOString()
        };
      }

      function markCurrentUserOnlineLocally(options = {}) {
        const payload = getCurrentPresencePayload();
        if (!payload) return;

        const nextEmails = new Set(onlineUserEmails);
        const nextIds = new Set(onlineUserIds);

        if (payload.email) nextEmails.add(payload.email);
        if (payload.appUserId) nextIds.add(String(payload.appUserId));

        commitPresenceSets(nextEmails, nextIds, options);
      }

      function applyPresenceSnapshot(presenceState = {}) {
        const nextEmails = new Set();
        const nextIds = new Set();

        Object.values(presenceState || {}).forEach((entries) => {
          (Array.isArray(entries) ? entries : []).forEach((entry) => {
            const email = normalizeEmail(entry?.email);
            const appUserId = String(entry?.appUserId || "").trim();

            if (email) nextEmails.add(email);
            if (appUserId) nextIds.add(appUserId);
          });
        });

        const ownPayload = getCurrentPresencePayload();
        if (ownPayload) {
          nextEmails.add(ownPayload.email);
          if (ownPayload.appUserId) nextIds.add(String(ownPayload.appUserId));
        }

        commitPresenceSets(nextEmails, nextIds);
      }

      function clearUserPresence(options = {}) {
        commitPresenceSets(new Set(), new Set(), options);
      }

      function isUserOnline(user) {
        const email = normalizeEmail(user?.email);
        const id = String(user?.id || "").trim();
        return Boolean((email && onlineUserEmails.has(email)) || (id && onlineUserIds.has(id)));
      }

      function renderPresencePill(user) {
        const online = isUserOnline(user);
        return `
          <span class="presence-pill ${online ? "active" : "inactive"}" title="${online ? "Este usuario tiene una sesión abierta ahora mismo" : "No hay ninguna sesión abierta de este usuario ahora mismo"}">
            <span class="status-dot ${online ? "active" : "inactive"}" aria-hidden="true"></span>
            ${online ? "Activo ahora" : "Inactivo ahora"}
          </span>
        `;
      }

      async function stopUserPresence(options = {}) {
        const channel = presenceChannel;
        presenceChannel = null;

        if (channel && supabaseClient) {
          try {
            await channel.untrack();
          } catch (error) {
            console.error("Error al desconectar presencia de usuario:", error);
          }

          try {
            await supabaseClient.removeChannel(channel);
          } catch (error) {
            console.error("Error al cerrar canal de presencia:", error);
          }
        }

        if (!options.keepPresence) {
          clearUserPresence({ renderAfter: options.renderAfter });
        }
      }

      async function startUserPresence() {
        if (!supabaseClient || !authUser) {
          clearUserPresence();
          return;
        }

        const payload = getCurrentPresencePayload();
        if (!payload?.email) {
          clearUserPresence();
          return;
        }

        await stopUserPresence({ renderAfter: false });
        markCurrentUserOnlineLocally();

        try {
          const channel = supabaseClient
            .channel(USER_PRESENCE_CHANNEL, {
              config: {
                presence: {
                  key: payload.email
                }
              }
            })
            .on("presence", { event: "sync" }, () => {
              if (presenceChannel === channel) applyPresenceSnapshot(channel.presenceState());
            })
            .on("presence", { event: "join" }, () => {
              if (presenceChannel === channel) applyPresenceSnapshot(channel.presenceState());
            })
            .on("presence", { event: "leave" }, () => {
              if (presenceChannel === channel) applyPresenceSnapshot(channel.presenceState());
            });

          presenceChannel = channel;

          channel.subscribe(async (status) => {
            if (presenceChannel !== channel) return;

            if (status === "SUBSCRIBED") {
              const freshPayload = getCurrentPresencePayload();
              if (!freshPayload) return;

              const trackStatus = await channel.track(freshPayload);
              if (trackStatus !== "ok") {
                console.error("Supabase Realtime no pudo registrar la presencia:", trackStatus);
              }
              applyPresenceSnapshot(channel.presenceState());
              return;
            }

            if (status === "CHANNEL_ERROR" || status === "TIMED_OUT" || status === "CLOSED") {
              console.error("Canal de presencia no disponible:", status);
              markCurrentUserOnlineLocally();
            }
          });
        } catch (error) {
          console.error("Error iniciando presencia de usuarios:", error);
          markCurrentUserOnlineLocally();
        }
      }

        if (!permission || !permission[action]) return false;
        if (creatorContext && (creatorContext.creatorId || creatorContext.creatorName)) {

          taskPriority: state.taskPriority,

          sopDepartment: state.sopDepartment,

      function hydrateState() {
        const savedState = readStorage(STORAGE_KEYS.ui, {});
        state = {
          ...DEFAULT_STATE,
          ...savedState,
          mobileNav: false,
          activeSopId: null,
          activeForm: null,
          activeCreatorId: null,
          activeChatChannelId: null,

          creatorShowCompleted: false,
          creatorComposer: null,
          channelComposer: null,
          channelEditingNoteId: null,
          channelShowCompletedChecklist: false
        };
      }

      function setState(patch, options = {}) {
        state = { ...state, ...patch };
        persistState();
        render(options);
      }

      function captureScrollPosition() {
        return {
          x: window.scrollX,
          y: window.scrollY,
          sidebarNavY: document.querySelector(".sidebar nav")?.scrollTop || 0
        };
      }

      function restoreScrollPosition(position) {
        if (!position) return;

        const sidebarNav = document.querySelector(".sidebar nav");
        if (sidebarNav) {
          sidebarNav.scrollTop = position.sidebarNavY;
        }

        window.scrollTo(position.x, position.y);
      }

      function focusElement({ focusId = null, focusSelector = null } = {}) {
        const target = focusSelector
          ? document.querySelector(focusSelector)
          : focusId
            ? document.getElementById(focusId)
            : null;

        if (!target) return;

        try {
          target.focus({ preventScroll: true });
        } catch (error) {
          target.focus();
        }

        if (typeof target.value === "string" && typeof target.setSelectionRange === "function") {
          const caret = target.value.length;
          try {
            target.setSelectionRange(caret, caret);
          } catch (error) {
            return;
          }
        }
      }

      function getLatestMetricsByCreator() {
        const latest = new Map();
        DATA.metrics.forEach((metric) => {
          latest.set(metric.creatorId, metric);
        });
        return Array.from(latest.values());
      }

      function getMetricsMap() {
        return new Map(getLatestMetricsByCreator().map((metric) => [metric.creatorId, metric]));
      }

      function getActiveTasks() {
        return DATA.tasks.filter((task) => !["done", "cancelled"].includes(task.status));
      }

      function isTaskOverdue(task) {
        if (!task || ["done", "cancelled"].includes(task.status)) return false;
        return Boolean(task.overdue) || isDateValuePast(task.due);
      }

      function sortTasksByUrgency(tasks) {
        const priorityOrder = { critical: 0, high: 1, medium: 2, low: 3 };

        return [...tasks].sort((a, b) => {
          if (isTaskOverdue(a) !== isTaskOverdue(b)) return isTaskOverdue(a) ? -1 : 1;
          const aPriority = priorityOrder[a.priority] ?? 9;
          const bPriority = priorityOrder[b.priority] ?? 9;
          if (aPriority !== bPriority) return aPriority - bPriority;
          const aDue = normalizeInputValueForType(a.due, "date") || "9999-12-31";
          const bDue = normalizeInputValueForType(b.due, "date") || "9999-12-31";
          if (aDue !== bDue) return aDue.localeCompare(bDue);
          return String(a.title || "").localeCompare(String(b.title || ""));
        });
      }

      function getCurrentWorkerReferenceSet() {
        const matchedUser = getAuthenticatedAppUser();
        const current = getInternalCurrentUser();
        const values = [
          current?.id,
          current?.email,
          current?.name,
          getActorEmail(),
          getActorName(),
          ...(!matchedUser ? [DATA.user.email, DATA.user.name] : [])
        ];

        return new Set(values.map((value) => String(value || "").trim().toLowerCase()).filter(Boolean));
      }

      function isTaskAssignedToCurrentWorker(task) {
        const currentWorkerRefs = getCurrentWorkerReferenceSet();
        return getTaskOwnerRefs(task).some((owner) => {
          const normalizedOwner = String(owner || "").trim().toLowerCase();
          return Boolean(normalizedOwner && currentWorkerRefs.has(normalizedOwner));
        });
      }

      function getCurrentWorkerPendingTasks() {
        return sortTasksByUrgency(getActiveTasks().filter(isTaskAssignedToCurrentWorker));
      }

      function getCriticalTasks() {
        return getActiveTasks()
          .filter((task) => task.priority === "critical")
          .sort((a, b) => {
            if (isTaskOverdue(a) !== isTaskOverdue(b)) return isTaskOverdue(a) ? -1 : 1;
            return a.title.localeCompare(b.title);
          });
      }

      function getAtRiskCreators() {
        return DATA.creators.filter((creator) => creator.retention === "at_risk");
      }

      function getCloseReadyLeads() {
        const readyStatuses = ["call2", "verbal_yes", "contract_sent", "signed"];
        return DATA.leads.filter((lead) => readyStatuses.includes(lead.status));
      }

      function getRevenueSnapshot() {
        const latestMetrics = getLatestMetricsByCreator();
        const totalRevenue = latestMetrics.reduce((sum, item) => sum + item.revenue, 0);
        const totalMargin = latestMetrics.reduce((sum, item) => sum + item.margin, 0);
        const closeReadyRevenue = getCloseReadyLeads().reduce((sum, lead) => sum + lead.revenue, 0);
        const winRate = DATA.contentPieces.length
          ? Math.round((DATA.contentPieces.filter((piece) => piece.status === "winner").length / DATA.contentPieces.length) * 100)
          : 0;
        const failedPosts = DATA.queue.filter((item) => item.status === "failed").length;
        return { totalRevenue, totalMargin, closeReadyRevenue, winRate, failedPosts };
      }

      function getSystemKpis() {
        const onboardingCreators = DATA.creators.filter((creator) => creator.stage === "onboarding").length;
        const contentWinners = DATA.contentPieces.filter((piece) => piece.status === "winner").length;

        const hiredCandidates = DATA.hiringCandidates.filter((candidate) => candidate.status === "contratado").length;
        const trials = DATA.hiringCandidates.filter((candidate) => candidate.status === "trial").length;
        const atRisk = DATA.creators.filter((creator) => creator.retention === "at_risk").length;
        const neutral = DATA.creators.filter((creator) => creator.retention === "neutral").length;
        const acquisitionReady = getCloseReadyLeads();

        return [

            view: "creators",
          title: "Alta inicial",

          },
          {
            key: "contenido",
            view: "content",
            title: "Contenido",
            value: `${contentWinners}/${Math.max(contentWinners + contentLosers, 1)}`,
            sub: `${DATA.contentPieces.filter((piece) => ["idea", "scripted"].includes(piece.status)).length} piezas pendientes`
          },
          {
            key: "marketing",
            view: "content",
            title: "Marketing",
            value: DATA.queue.filter((item) => item.status === "scheduled").length,
            sub: `${DATA.queue.filter((item) => item.status === "failed").length} fallos en salida`
          },
          {
            key: "chatting",
            view: "chatting",
            title: "Chatting",
            value: activeChatters,
            sub: `${monitoringIssues} incidencias y ${DATA.chatApprovals.filter((item) => item.status === "pendiente").length} aprobaciones`
          },
          {
            key: "hiring",
            view: "hiring",
	            title: "Contratacion",

	            sub: `${trials} en prueba · ${hiredCandidates} contratados`
          },
          {
            key: "retencion",
            view: "creators",
            title: "Retencion",

          {

          }

      function renderSystemKpiBoard() {
        const rows = getSystemKpis();
        return `
          <div class="kpi-board">
            ${rows.map((item) => `
              <article class="kpi-card">

      function getDashboardStats() {
        const criticalTasks = getCriticalTasks();
        const atRisk = getAtRiskCreators();
        const activeCreators = DATA.creators.filter((creator) => creator.stage === "active").length;
        const onboardingCreators = DATA.creators.filter((creator) => creator.stage === "onboarding").length;
        const pendingTasks = getActiveTasks().length;

      function getPriorityActions() {

      function getCollectionForEntity(entity) {
        const schema = getEntitySchema(entity);

        if (entity === "lead") return DATA.leads;
        if (entity === "creator") return DATA.creators;
        if (entity === "task") return DATA.tasks;
        if (entity === "appUser") return DATA.appUsers;
        if (entity === "appRole") return DATA.appRoles;
        if (entity === "contract") return DATA.contracts;
        if (entity === "chatRole") return DATA.chatRoles;
        if (entity === "chatChannel") return DATA.chatChannels;
        if (entity === "chatAgent") return DATA.chatAgents;
        if (entity === "chatTraining") return DATA.chatTrainings;
        if (entity === "eosReport") return DATA.eosReports;
        if (entity === "chatMonitoring") return DATA.chatMonitoring;

        if (entity === "fanProfile") return DATA.fanProfiles;

      function getEntityItem(entity, id) {
        if (!id) return null;
        return getCollectionForEntity(entity).find((item) => item.id === id) || null;
      }

      function getCreatorById(id) {
        return DATA.creators.find((creator) => creator.id === id) || null;
      }

      function getChatRoleById(id) {
        return DATA.chatRoles.find((role) => role.id === id) || null;
      }

      function getChatAgentById(id) {
        return DATA.chatAgents.find((agent) => agent.id === id) || null;
      }

      function getCreatorSelectOptions(includeAll = false) {
        const options = includeAll ? [["", "Sin asignar"]] : [];
        return [
          ...options,
          ...DATA.creators.map((creator) => [creator.id, creator.name])
        ];
      }

      function getChatAgentSelectOptions(includeAll = false) {
        const options = includeAll ? [["", "Sin asignar"]] : [];
        return [
          ...options,
          ...DATA.chatAgents.map((agent) => [agent.id, agent.name])
        ];
      }

      function getUserSelectOptions({ includeEmpty = true, currentValue = "" } = {}) {
        const options = includeEmpty ? [["", "Sin asignar"]] : [];
        const seen = new Set(options.map(([value]) => String(value)));
        const addOption = (value, label) => {
          const normalizedValue = String(value || "").trim();
          if (!normalizedValue || seen.has(normalizedValue)) return;
          options.push([normalizedValue, label || normalizedValue]);
          seen.add(normalizedValue);
        };
        const addUser = (user) => {
          const id = String(user?.id || "").trim();
          const name = String(user?.name || "").trim();
          const email = String(user?.email || "").trim();
          const role = displayRoleName(user?.roleName || user?.role || "");
          const value = id || name || email;
          const labelParts = [name || email, role, name && email ? email : ""].filter(Boolean);
          addOption(value, labelParts.join(" · "));
        };

        DATA.appUsers.filter((user) => user.status !== "inactive").forEach(addUser);
        addUser(getInternalCurrentUser());

        const current = String(currentValue || "").trim();
        if (current && !seen.has(current)) {
          options.push([current, `${current} (actual)`]);
        }

        return options;
      }

      function getUserReferenceLabel(value, fallback = "Sin asignar") {
        const ref = String(value || "").trim();
        if (!ref) return fallback;
        const normalized = ref.toLowerCase();
        const matched = DATA.appUsers.find((user) => {
          return String(user.id || "").toLowerCase() === normalized
            || String(user.email || "").toLowerCase() === normalized
            || String(user.name || "").toLowerCase() === normalized;
        });

        if (matched) return matched.name || matched.email || ref;

        const current = getInternalCurrentUser();
        if ([current.id, current.email, current.name].some((item) => String(item || "").toLowerCase() === normalized)) {
          return current.name || current.email || ref;
        }

        return ref;
      }

      function getUserReferenceSearchTokens(value) {
        const ref = String(value || "").trim();
        if (!ref) return [];
        const normalized = ref.toLowerCase();
        const matched = DATA.appUsers.find((user) => {
          return String(user.id || "").toLowerCase() === normalized
            || String(user.email || "").toLowerCase() === normalized
            || String(user.name || "").toLowerCase() === normalized;
        });
        if (!matched) return [ref, getUserReferenceLabel(ref, "")].filter(Boolean);

        return [
          matched.id,
          matched.name,
          matched.email,
          matched.roleName,
          matched.role,
          getUserReferenceLabel(ref, "")
        ].filter(Boolean);
      }

      function getChatRoleSelectOptions(includeAll = false) {
        const options = includeAll ? [["", "Sin rol"]] : [];
        return [
          ...options,
          ...DATA.chatRoles.filter((role) => role.active).map((role) => [role.id, role.name])
        ];
      }

      function displayTextList(items, fallback = "Sin asignar") {
        const list = normalizeTextList(items);
        return list.length ? list.join(", ") : fallback;
      }

      function touchCreator(creator) {
        if (!creator) return;
        creator.updated = formatDateTimeLabel();
      }

      function getCreatorLatestMetric(creatorId) {
        return DATA.metrics.filter((metric) => metric.creatorId === creatorId).slice(-1)[0] || null;
      }

      function getCreatorContentSummary(creatorId) {
        const pieces = DATA.contentPieces.filter((piece) => piece.creatorId === creatorId);
        const queue = DATA.queue.filter((item) => item.creatorId === creatorId);

        return {
          pieces,
          queue,
          winners: pieces.filter((piece) => piece.status === "winner").length,
          losers: pieces.filter((piece) => piece.status === "loser").length,
          pendingRecording: pieces.filter((piece) => ["idea", "scripted", "recorded"].includes(piece.status)).length,
          pendingPublishing: queue.filter((item) => item.status === "scheduled").length,
          failedPosts: queue.filter((item) => item.status === "failed").length
        };
      }

      function getCreatorBlocks(creator) {
        return DATA.onboardingBlocks.filter((block) => block.creatorName === creator.name);
      }

      function getProfileTasks(creator) {
        return ensureArray(creator?.ops?.tasks).map((task) => normalizeProfileTask(task, creator.id));
      }

      function isProfileTaskDone(task) {
        return task.status === "done";
      }

      function isProfileTaskOverdue(task) {
        if (!task?.due || isProfileTaskDone(task)) return false;
        return isDateValuePast(task.due);
      }

      function sortProfileTasks(tasks) {
        const priorityOrder = { critical: 0, high: 1, medium: 2, low: 3 };

        return [...tasks].sort((a, b) => {
          if (isProfileTaskDone(a) !== isProfileTaskDone(b)) {
            return isProfileTaskDone(a) ? 1 : -1;
          }
          if (Boolean(a.blocked) !== Boolean(b.blocked)) {
            return a.blocked ? -1 : 1;
          }
          if (Boolean(a.recommended) !== Boolean(b.recommended)) {
            return a.recommended ? -1 : 1;
          }
          if (isProfileTaskOverdue(a) !== isProfileTaskOverdue(b)) {
            return isProfileTaskOverdue(a) ? -1 : 1;
          }
          const aPriority = priorityOrder[a.priority] ?? 9;
          const bPriority = priorityOrder[b.priority] ?? 9;
          if (aPriority !== bPriority) return aPriority - bPriority;
          return a.title.localeCompare(b.title);
        });
      }

      function getProfileTaskGroups(tasks) {
        return tasks.reduce((groups, task) => {
          const key = `${task.area}:${task.phase}`;
          groups[key] = groups[key] || {
            area: task.area,
            phase: task.phase,
            title: PROFILE_PHASE_LABELS[task.phase] || "Fase",
            tasks: []
          };
          groups[key].tasks.push(task);
          return groups;
        }, {});
      }

      function getProfileProgress(creator) {
        const tasks = getProfileTasks(creator);
        const total = tasks.length;
        const completed = tasks.filter((task) => isProfileTaskDone(task)).length;
        return {
          total,
          completed,
          pending: total - completed,
          percentage: total ? Math.round((completed / total) * 100) : 0
        };
      }

      function getProfileNowData(creator) {
        const tasks = sortProfileTasks(getProfileTasks(creator));
        const pending = tasks.filter((task) => !isProfileTaskDone(task));
        const blocks = [
          ...pending.filter((task) => task.blocked),
          ...getCreatorBlocks(creator).map((block) => ({
            id: block.id,
            title: block.title,
            notes: block.impact,
            owner: block.owner,
            source: "block"
          }))
        ];
        const overdue = pending.filter((task) => isProfileTaskOverdue(task));
        const critical = pending.filter((task) => task.priority === "critical" || task.recommended || task.blocked).slice(0, 6);
        const nextStep = pending.find((task) => task.recommended || task.priority === "critical") || pending[0] || null;
        const todayActions = pending.filter((task) => task.priority !== "low" || task.recommended).slice(0, 6);

        return { pending, critical, nextStep, blocks, overdue, todayActions };
      }

      function getCreatorRetentionStatusLabel(value) {
        return PROFILE_RETENTION_LABELS[value] || "Sin definir";
      }

      function markProfileTaskStatus(creatorId, taskId, done) {
        const creator = getCreatorById(creatorId);
        if (!creator) return;

        creator.ops.tasks = getProfileTasks(creator).map((task) => {
          if (task.id !== taskId) return task;
          return {
            ...task,
            status: done ? "done" : "pending",
            completedAt: done ? formatDateTimeLabel() : ""
          };
        });

        touchCreator(creator);
        queueSave();
      }

      function addProfileTask(creatorId, payload) {
        const creator = getCreatorById(creatorId);
        if (!creator) return;

        creator.ops.tasks.unshift(
          normalizeProfileTask(
            {
              id: createId("perfil-task"),
              creatorId,
              area: payload.area,
              phase: payload.phase || "manual",
              title: payload.title,
              status: "pending",
              priority: payload.priority || "medium",
              owner: payload.owner || "",
              blocked: Boolean(payload.blocked),
              recommended: Boolean(payload.recommended),
              due: payload.due || "",
              notes: payload.notes || "",
              createdAt: formatDateTimeLabel(),
              source: "manual"
            },
            creatorId
          )
        );

        touchCreator(creator);
        queueSave();
      }

      function addProfileNote(creatorId, payload) {
        const creator = getCreatorById(creatorId);
        if (!creator) return;

        creator.ops.notes.unshift({
          id: createId("perfil-note"),
          text: payload.text,
          area: payload.area || state.creatorTab || "summary",
          createdAt: formatDateTimeLabel()
        });

        touchCreator(creator);
        queueSave();
      }

      function updateProfileBlock(creatorId, block, values) {
        const creator = getCreatorById(creatorId);
        if (!creator) return;

        creator.ops[block] = {
          ...(creator.ops[block] || {}),
          ...values
        };

        touchCreator(creator);
        queueSave();
      }

      function getProfileTaskAreaDefault() {
        return PROFILE_TASK_AREAS.includes(state.creatorTab) ? state.creatorTab : "onboarding";
      }

      function saveProfileInlineForm(form) {
        const creatorId = form.dataset.creatorId || "";
        const formType = form.dataset.profileForm || "";
        const formData = new FormData(form);

        if (formType === "task") {
