<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel OFM | Control editable</title>
    <style>
      :root {
        --bg: #070b12;
        --bg-soft: #0d131d;
        --panel: rgba(14, 19, 31, 0.92);
        --panel-strong: #121a29;
        --panel-muted: #182131;
        --panel-subtle: rgba(255, 255, 255, 0.03);
        --border: rgba(150, 167, 206, 0.14);
        --border-strong: rgba(176, 193, 236, 0.28);
        --text: #f3f6ff;
        --text-soft: #b8c4de;
        --text-dim: #8b97b8;
        --primary: #8b6bff;
        --primary-soft: rgba(139, 107, 255, 0.16);
        --success: #31c48d;
        --success-soft: rgba(49, 196, 141, 0.16);
        --warning: #f5a524;
        --warning-soft: rgba(245, 165, 36, 0.16);
        --danger: #f05f73;
        --danger-soft: rgba(240, 95, 115, 0.14);
        --info: #58a6ff;
        --info-soft: rgba(88, 166, 255, 0.14);
        --shadow: 0 24px 56px rgba(4, 8, 16, 0.32);
        --shadow-soft: 0 16px 34px rgba(4, 8, 16, 0.2);
        --radius-xl: 26px;
        --radius-lg: 20px;
        --radius-md: 16px;
        --radius-sm: 12px;
        --headline-font: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
        --body-font: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(82, 62, 165, 0.18), transparent 28%),
          radial-gradient(circle at 86% 12%, rgba(28, 104, 186, 0.12), transparent 22%),
          linear-gradient(180deg, #060a11 0%, #0a101a 100%);
        color: var(--text);
        font-family: var(--body-font);
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 28px 28px;
        opacity: 0.08;
        pointer-events: none;
        mask-image: radial-gradient(circle at center, black 28%, transparent 88%);
      }

      body.modal-open,
      body.sidebar-open {
        overflow: hidden;
      }

      ::selection {
        background: rgba(139, 107, 255, 0.34);
        color: #fff;
      }

      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(139, 151, 184, 0.25);
        border-radius: 999px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
        border: 0;
        background: none;
        color: inherit;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      a {
        color: inherit;
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible,
      [tabindex]:focus-visible {
        outline: none;
        border-color: rgba(88, 166, 255, 0.48);
        box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.12);
      }

      .screen-reader {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .skip-link {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 60;
        transform: translateY(-160%);
        padding: 10px 14px;
        border-radius: 12px;
        background: #fff;
        color: #09111d;
        font-weight: 700;
        text-decoration: none;
        transition: 180ms ease;
      }

      .skip-link:focus {
        transform: translateY(0);
      }

      .app-shell {
        position: relative;
        display: grid;
        grid-template-columns: 292px minmax(0, 1fr);
        gap: 24px;
        min-height: 100vh;
        padding: 24px;
      }

      .sidebar {
        position: sticky;
        top: 24px;
        height: calc(100vh - 48px);
        display: flex;
        flex-direction: column;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(180deg, rgba(15, 21, 33, 0.98), rgba(10, 15, 25, 0.96)),
          linear-gradient(180deg, rgba(139, 107, 255, 0.05), transparent 42%);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .sidebar::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 24%);
        pointer-events: none;
      }

      .sidebar::after {
        content: "";
        position: absolute;
        right: -50px;
        bottom: -70px;
        width: 170px;
        height: 170px;
        background: radial-gradient(circle, rgba(139, 107, 255, 0.12), transparent 72%);
        pointer-events: none;
      }

      .logo-block {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 8px 10px 18px;
        border-bottom: 1px solid var(--border);
      }

      .logo-brand {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .logo-glyph {
        width: 46px;
        height: 46px;
        display: grid;
        place-items: center;
        border-radius: 15px;
        border: 1px solid rgba(139, 107, 255, 0.32);
        background: linear-gradient(135deg, rgba(139, 107, 255, 0.22), rgba(88, 166, 255, 0.12));
        color: #f7f2ff;
      }

      .logo-copy h1 {
        margin: 0;
        font: 700 1rem/1 var(--headline-font);
        letter-spacing: -0.03em;
      }

      .logo-copy p {
        margin: 6px 0 0;
        color: var(--text-dim);
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .sidebar-collapse,
      .mobile-toggle,
      .icon-button {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-soft);
        transition: 180ms ease;
      }

      .sidebar-collapse:hover,
      .mobile-toggle:hover,
      .icon-button:hover {
        color: var(--text);
        border-color: var(--border-strong);
        background: rgba(255, 255, 255, 0.05);
      }

      .mobile-toggle {
        display: none;
      }

      .sidebar nav {
        flex: 1;
        padding: 18px 4px 8px;
        overflow: auto;
      }

      .nav-group {
        margin-bottom: 18px;
      }

      .nav-label {
        margin: 0 8px 12px;
        color: rgba(184, 196, 222, 0.52);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .nav-button {
        width: 100%;
        display: grid;
        grid-template-columns: 36px minmax(0, 1fr);
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        margin-bottom: 6px;
        border: 1px solid transparent;
        border-radius: 15px;
        color: var(--text-soft);
        text-align: left;
        transition: 180ms ease;
      }

      .nav-button:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.035);
      }

      .nav-button.active {
        color: var(--text);
        border-color: rgba(139, 107, 255, 0.18);
        background:
          linear-gradient(135deg, rgba(139, 107, 255, 0.14), rgba(88, 166, 255, 0.06)),
          rgba(255, 255, 255, 0.025);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .nav-icon {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        color: inherit;
      }

      .nav-button.active .nav-icon {
        background: rgba(139, 107, 255, 0.18);
      }

      .nav-copy strong {
        display: block;
        margin-bottom: 2px;
        font-size: 0.92rem;
      }

      .nav-copy span {
        display: block;
        color: var(--text-dim);
        font-size: 0.74rem;
      }

      .sidebar-footer {
        display: grid;
        gap: 12px;
        margin-top: auto;
      }

      .sidebar-note,
      .user-card {
        position: relative;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
      }

      .sidebar-note {
        padding: 14px;
      }

      .sidebar-note-label {
        display: block;
        color: var(--text-dim);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .sidebar-note strong {
        display: block;
        margin-top: 10px;
        font: 700 1rem/1.2 var(--headline-font);
      }

      .sidebar-note p {
        margin: 6px 0 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .user-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px;
      }

      .avatar {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(139, 107, 255, 0.26), rgba(88, 166, 255, 0.16));
        color: #fff;
        font-weight: 700;
        flex: 0 0 42px;
      }

      .user-card strong {
        display: block;
        margin-bottom: 3px;
        font-size: 0.92rem;
      }

      .user-card span {
        display: block;
        color: var(--text-dim);
        font-size: 0.74rem;
      }

      .main-panel {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .topbar {
        position: sticky;
        top: 24px;
        z-index: 15;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 22px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background: rgba(13, 18, 29, 0.88);
        backdrop-filter: blur(20px);
        box-shadow: var(--shadow-soft);
      }

      .topbar-main {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        min-width: 0;
      }

      .topbar-kicker {
        margin-bottom: 8px;
        color: rgba(184, 196, 222, 0.6);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .topbar h2 {
        margin: 0;
        font: 700 1.32rem/1.08 var(--headline-font);
        letter-spacing: -0.04em;
      }

      .topbar p {
        margin: 6px 0 0;
        color: var(--text-soft);
        font-size: 0.9rem;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-soft);
        font-size: 0.8rem;
        white-space: nowrap;
      }

      .chip strong {
        color: var(--text);
        font-size: 0.84rem;
      }

      .chip-danger {
        border-color: rgba(240, 95, 115, 0.24);
        background: rgba(240, 95, 115, 0.08);
        color: #f7c7cf;
      }

      .chip-success {
        border-color: rgba(49, 196, 141, 0.24);
        background: rgba(49, 196, 141, 0.08);
        color: #9deccc;
      }

      .chip-warning {
        border-color: rgba(245, 165, 36, 0.24);
        background: rgba(245, 165, 36, 0.08);
        color: #ffd59d;
      }

      .chip-info {
        border-color: rgba(88, 166, 255, 0.24);
        background: rgba(88, 166, 255, 0.08);
        color: #bedfff;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }

      .section {
        display: flex;
        flex-direction: column;
        gap: 22px;
        animation: fade-in 220ms ease;
      }

      .hero-banner {
        display: grid;
        grid-template-columns: minmax(0, 1.7fr) minmax(310px, 1fr);
        gap: 20px;
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(180deg, rgba(16, 22, 36, 0.98), rgba(11, 16, 27, 0.98)),
          radial-gradient(circle at top right, rgba(139, 107, 255, 0.1), transparent 34%);
        box-shadow: var(--shadow);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: rgba(184, 196, 222, 0.76);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .hero-copy {
        display: grid;
        gap: 16px;
        align-content: start;
      }

      .hero-banner h3 {
        margin: 0;
        font: 700 2rem/1.02 var(--headline-font);
        letter-spacing: -0.05em;
        max-width: 14ch;
      }

      .hero-banner p {
        margin: 0;
        color: #d6def4;
        max-width: 62ch;
      }

      .hero-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .hero-primary {
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
      }

      .hero-primary-label {
        display: block;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .hero-primary strong {
        display: block;
        margin-top: 10px;
        font-size: 1rem;
      }

      .hero-primary p {
        margin-top: 6px;
        color: var(--text-soft);
        font-size: 0.86rem;
      }

      .hero-side {
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .hero-stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .hero-stat {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
      }

      .hero-stat span {
        display: block;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .hero-stat strong {
        display: block;
        margin-top: 10px;
        font: 700 1.52rem/1 var(--headline-font);
      }

      .brief-card {
        padding: 16px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
      }

      .brief-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .brief-card-head strong {
        font: 700 0.96rem/1.1 var(--headline-font);
      }

      .brief-list {
        display: grid;
        gap: 10px;
      }

      .brief-item {
        width: 100%;
        display: grid;
        grid-template-columns: 30px minmax(0, 1fr);
        gap: 12px;
        align-items: flex-start;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.025);
        text-align: left;
        transition: 180ms ease;
      }

      .brief-item:hover {
        border-color: rgba(139, 107, 255, 0.22);
        background: rgba(255, 255, 255, 0.04);
      }

      .brief-index {
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        border-radius: 11px;
        background: rgba(139, 107, 255, 0.16);
        color: #ded2ff;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .brief-copy strong {
        display: block;
        font-size: 0.88rem;
      }

      .brief-copy span {
        display: block;
        margin-top: 4px;
        color: var(--text-soft);
        font-size: 0.78rem;
      }

      .priority-grid,
      .grid-4,
      .grid-3,
      .grid-2,
      .warning-grid,
      .creator-grid,
      .sop-grid {
        display: grid;
        gap: 16px;
      }

      .priority-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card,
      .stat-card,
      .priority-card {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background:
          linear-gradient(180deg, rgba(18, 25, 41, 0.96), rgba(12, 17, 29, 0.96)),
          rgba(18, 25, 41, 0.96);
        box-shadow: var(--shadow-soft);
      }

      .priority-card {
        padding: 18px;
      }

      .priority-card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .priority-card-label {
        margin: 0 0 6px;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .priority-card strong {
        display: block;
        font-size: 1rem;
      }

      .priority-card p {
        margin: 8px 0 0;
        color: var(--text-soft);
        font-size: 0.84rem;
      }

      .priority-value {
        font: 700 2rem/1 var(--headline-font);
      }

      .stat-card {
        padding: 18px;
      }

      .stat-card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .stat-card-label {
        margin: 0;
        color: var(--text-dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .stat-card-value {
        margin: 14px 0 0;
        font: 700 1.92rem/1 var(--headline-font);
        letter-spacing: -0.04em;
      }

      .stat-card-sub {
        margin: 10px 0 0;
        color: var(--text-soft);
        font-size: 0.82rem;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
      }

      .card-header h3,
      .card-header h4 {
        margin: 0;
        font: 700 1rem/1.1 var(--headline-font);
        letter-spacing: -0.03em;
      }

      .card-header span {
        color: var(--text-dim);
        font-size: 0.8rem;
      }

      .card-body {
        padding: 18px 20px;
      }

      .subsection {
        display: grid;
        gap: 12px;
      }

      .subsection + .subsection {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
      }

      .subsection-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .subsection-head strong {
        font-size: 0.9rem;
      }

      .subsection-head span {
        color: var(--text-dim);
        font-size: 0.78rem;
      }

      .ghost-button,
      .primary-button,
      .filter-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 40px;
        padding: 0 14px;
        border-radius: 14px;
        border: 1px solid var(--border);
        transition: 180ms ease;
      }

      .ghost-button,
      .filter-button {
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-soft);
      }

      .ghost-button:hover,
      .filter-button:hover {
        color: var(--text);
        border-color: var(--border-strong);
        background: rgba(255, 255, 255, 0.05);
      }

      .primary-button {
        background: linear-gradient(135deg, rgba(139, 107, 255, 0.9), rgba(88, 166, 255, 0.64));
        color: #fff;
        box-shadow: 0 10px 24px rgba(139, 107, 255, 0.2);
      }

      .primary-button:hover {
        filter: brightness(1.03);
      }

      .filter-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .filter-spacer {
        flex: 1 1 auto;
      }

      .filter-group {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        padding: 7px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
      }

      .filter-button {
        min-height: 34px;
        padding: 0 12px;
        border-radius: 12px;
      }

      .filter-button.active {
        color: var(--text);
        border-color: rgba(139, 107, 255, 0.28);
        background: rgba(139, 107, 255, 0.16);
      }

      .search-input,
      .select {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        outline: none;
      }

      .search-input {
        min-width: min(320px, 100%);
        height: 42px;
        padding: 0 14px;
      }

      .search-input::placeholder {
        color: var(--text-dim);
      }

      .select {
        height: 38px;
        padding: 0 10px;
      }

      .section-actions,
      .table-actions {

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");

      function safeParse(value, fallback) {
        try {
          return value ? JSON.parse(value) : fallback;
        } catch (error) {
          return fallback;
        }
      }

      function readStorage(key, fallback) {
        try {
          return safeParse(window.localStorage.getItem(key), fallback);
        } catch (error) {
          return fallback;
        }
      }

      function writeStorage(key, value) {
        try {
          window.localStorage.setItem(key, JSON.stringify(value));

          return;
        }

      function setSyncStatus(nextStatus) {
        if (syncStatus === nextStatus) return;
        syncStatus = nextStatus;

        if (hasHydratedApp && document.getElementById("app")) {
          render();
        }

      function cloneData(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function isPlainObject(value) {
        return Boolean(value) && typeof value === "object" && !Array.isArray(value);
      }

      function ensureArray(value) {
        return Array.isArray(value) ? value : [];
      }

      function normalizeData(value) {
        const defaults = cloneData(DEFAULT_DATA);
        if (!isPlainObject(value)) return defaults;

        return {
          ...defaults,
          ...value,
          user: {
            ...defaults.user,
            ...(isPlainObject(value.user) ? value.user : {})
          },
          leads: ensureArray(value.leads),
          creators: ensureArray(value.creators),
          tasks: ensureArray(value.tasks),
          onboardingBlocks: ensureArray(value.onboardingBlocks),
          contentPieces: ensureArray(value.contentPieces),
          queue: ensureArray(value.queue),
          sops: ensureArray(value.sops),
          metrics: ensureArray(value.metrics)
        };
      }

        return { toneClass: "chip-info", value: "Local" };

      async function saveRemoteData(options = {}) {
        const { force = false } = options;

        if (!supabase) {
          console.error("Supabase no esta disponible en window.supabase.");
          setSyncStatus("error");
          return false;
        }

        if (!force && !hasHydratedApp) {
          return false;
        }

        if (!force && !pendingRemoteSave) {
          return true;
        }

        const payload = cloneData(DATA);
        pendingRemoteSave = false;
        setSyncStatus("syncing");

        try {
          const { error } = await supabase
            .from(APP_STATE_TABLE)
            .upsert(
              {
                id: APP_STATE_ROW_ID,
                payload,
                updated_at: new Date().toISOString()
              },
              { onConflict: "id" }
            );

          if (error) throw error;

          persistData();
          setSyncStatus("synced");
          return true;
        } catch (error) {
          console.error("Error guardando app_state en Supabase:", error);
          pendingRemoteSave = true;
          setSyncStatus("error");
          return false;
        }
      }

      function queueSave(delay = 700) {
        pendingRemoteSave = true;
        persistData();
        setSyncStatus("syncing");

        if (saveDebounceId) {
          window.clearTimeout(saveDebounceId);
        }

        saveDebounceId = window.setTimeout(() => {
          saveDebounceId = null;
          saveQueue = saveQueue
            .then(() => saveRemoteData())
            .catch((error) => {
              console.error("Error en la cola de guardado remoto:", error);
              setSyncStatus("error");
            });
        }, delay);
      }

      async function loadRemoteData() {
        if (!supabase) {
          console.error("Supabase JS no se cargo correctamente desde el CDN.");
          hydrateData();
          setSyncStatus("error");
          return false;
        }

        setSyncStatus("syncing");

        try {
          const { data, error } = await supabase
            .from(APP_STATE_TABLE)
            .select("id, payload, updated_at")
            .eq("id", APP_STATE_ROW_ID)
            .maybeSingle();

          if (error) throw error;

          if (data?.payload) {
            DATA = normalizeData(data.payload);
            persistData();
            setSyncStatus("synced");
            return true;
          }

          const seeded = await saveRemoteData({ force: true });
          if (!seeded) {
            throw new Error("No se pudo crear el estado inicial remoto.");
          }

          setSyncStatus("synced");
          return true;
        } catch (error) {
          console.error("Error cargando app_state desde Supabase:", error);
          hydrateData();
          setSyncStatus("error");
          return false;
        }
      }

      function focusElement({ focusId = null, focusSelector = null } = {}) {
        const target = focusSelector
          ? document.querySelector(focusSelector)
          : focusId
            ? document.getElementById(focusId)
            : null;

        if (!target) return;
        target.focus();

        if (typeof target.value === "string" && typeof target.setSelectionRange === "function") {
          const caret = target.value.length;
          target.setSelectionRange(caret, caret);
        }
      }

      function getLatestMetricsByCreator() {
        const latest = new Map();
        DATA.metrics.forEach((metric) => {
          latest.set(metric.creatorId, metric);
        });
        return Array.from(latest.values());
      }

      function getMetricsMap() {
        return new Map(getLatestMetricsByCreator().map((metric) => [metric.creatorId, metric]));
      }

      function getActiveTasks() {
        return DATA.tasks.filter((task) => !["done", "cancelled"].includes(task.status));
      }

      function getCriticalTasks() {
        return getActiveTasks()
          .filter((task) => task.priority === "critical")
          .sort((a, b) => {
            if (a.overdue !== b.overdue) return a.overdue ? -1 : 1;
            return a.title.localeCompare(b.title);
          });
      }

      function getAtRiskCreators() {
        return DATA.creators.filter((creator) => creator.retention === "at_risk");
      }

      function getCloseReadyLeads() {
        const readyStatuses = ["call2", "verbal_yes", "contract_sent", "signed"];
        return DATA.leads.filter((lead) => readyStatuses.includes(lead.status));
      }

      function getRevenueSnapshot() {
        const latestMetrics = getLatestMetricsByCreator();
        const totalRevenue = latestMetrics.reduce((sum, item) => sum + item.revenue, 0);
        const totalMargin = latestMetrics.reduce((sum, item) => sum + item.margin, 0);
        const closeReadyRevenue = getCloseReadyLeads().reduce((sum, lead) => sum + lead.revenue, 0);
        const winRate = DATA.contentPieces.length
          ? Math.round((DATA.contentPieces.filter((piece) => piece.status === "winner").length / DATA.contentPieces.length) * 100)
          : 0;
        const failedPosts = DATA.queue.filter((item) => item.status === "failed").length;
        return { totalRevenue, totalMargin, closeReadyRevenue, winRate, failedPosts };
      }

      function getDashboardStats() {
        const criticalTasks = getCriticalTasks();
        const atRisk = getAtRiskCreators();
        const activeCreators = DATA.creators.filter((creator) => creator.stage === "active").length;

        const pendingTasks = getActiveTasks().length;
        const backlog = DATA.contentPieces.filter((piece) => ["idea", "scripted"].includes(piece.status)).length;

        return {
          totalLeads: DATA.leads.length,
          activeCreators,
          onboardingCreators,
          pendingTasks,
          criticalTasks,
          atRisk,
          backlog,
          closeReady,
          onboardingBlocksCount: DATA.onboardingBlocks.length,
          blockingAlerts: criticalTasks.length + DATA.onboardingBlocks.length + atRisk.length

        const {
          type = "text",
          placeholder = "",
          required = false,
          min = null,
          max = null,
          step = null,
          full = false
        } = options;
        const inputId = `modal-field-${name}`;

        return `
          <div class="field${full ? " full" : ""}">
            <label for="${inputId}">${escapeHtml(label)}</label>
            <input
              id="${inputId}"
              class="field-input"
              type="${type}"
              name="${name}"
              value="${escapeHtml(value)}"
              ${placeholder ? `placeholder="${escapeHtml(placeholder)}"` : ""}
              ${required ? "required" : ""}
              ${min !== null ? `min="${min}"` : ""}
              ${max !== null ? `max="${max}"` : ""}
              ${step !== null ? `step="${step}"` : ""}
            />
          </div>
        `;
      }

      function renderSelectField(label, name, value, options, config = {}) {
        const inputId = `modal-field-${name}`;
        return `
          <div class="field${config.full ? " full" : ""}">
            <label for="${inputId}">${escapeHtml(label)}</label>
            <select id="${inputId}" class="select" name="${name}">
              ${options.map(([optionValue, optionLabel]) => `
                <option value="${escapeHtml(optionValue)}" ${value === optionValue ? "selected" : ""}>
                  ${escapeHtml(optionLabel)}
                </option>
              `).join("")}
            </select>
          </div>
        `;
      }

      function renderTextareaField(label, name, value = "", options = {}) {
        const inputId = `modal-field-${name}`;
        const placeholder = options.placeholder ? `placeholder="${escapeHtml(options.placeholder)}"` : "";
        return `
          <div class="field${options.full ? " full" : ""}">
            <label for="${inputId}">${escapeHtml(label)}</label>
            <textarea
              id="${inputId}"
              class="field-textarea"
              name="${name}"
              ${options.required ? "required" : ""}
              ${placeholder}
            >${escapeHtml(value)}</textarea>
          </div>
        `;
      }

      function renderCheckboxField(label, name, checked, options = {}) {
        return `
          <div class="field${options.full ? " full" : ""}">
            <label class="checkbox-field">
              <input type="checkbox" name="${name}" ${checked ? "checked" : ""} />
              <span>${escapeHtml(label)}</span>
            </label>
            ${options.help ? `<p class="helper-text">${escapeHtml(options.help)}</p>` : ""}
          </div>
        `;
      }

      function getActiveFormDraft() {
        if (!state.activeForm) return null;

        if (state.activeForm.entity === "profile") {
          return {
            agencyName: DATA.user.agencyName || "",
            workspaceLabel: DATA.user.workspaceLabel || "",
            name: DATA.user.name || "",
            role: DATA.user.role || "",
            email: DATA.user.email || ""
          };
        }

        const item = getEntityItem(state.activeForm.entity, state.activeForm.id);

        if (state.activeForm.entity === "lead") {
          return {
            name: item?.name || "",
            handle: item?.handle || "",
            niche: item?.niche || "",
            country: item?.country || "",
            status: item?.status || "new",
            revenue: item?.revenue ?? "",
            source: item?.source || "",
            updated: item?.updated || ""
          };
        }

        if (state.activeForm.entity === "creator") {
          return {
            name: item?.name || "",
            handle: item?.handle || "",
            niche: item?.niche || "",
            stage: item?.stage || "onboarding",
            tier: item?.tier || "starter",
            accountManager: item?.accountManager || "",
            retention: item?.retention || "healthy",
            onboardingPct: item?.onboardingPct ?? 0,
            updated: item?.updated || ""
          };
        }

        if (state.activeForm.entity === "task") {
          return {
            title: item?.title || "",
            description: item?.description || "",
            priority: item?.priority || "medium",
            status: item?.status || "pending",
            owner: item?.owner || "",
            type: item?.type || "general",
            due: item?.due || "",
            tags: Array.isArray(item?.tags) ? item.tags.join(", ") : "",
            overdue: Boolean(item?.overdue)
          };
        }

        return null;
      }

          return `

            ${renderSelectField("Estado", "status", draft.status, Object.entries(LEAD_STATUS_LABELS))}
            ${renderInputField("Revenue estimado", "revenue", String(draft.revenue ?? ""), { type: "number", min: 0, step: 100 })}

            ${renderInputField("Handle", "handle", draft.handle)}
            ${renderInputField("Nicho", "niche", draft.niche)}
            ${renderSelectField("Etapa", "stage", draft.stage, Object.entries(CREATOR_STAGE_LABELS))}
            ${renderSelectField("Tier", "tier", draft.tier, Object.entries(CREATOR_TIER_LABELS))}
            ${renderInputField("Account manager", "accountManager", draft.accountManager)}
            ${renderSelectField("Retencion", "retention", draft.retention, [["healthy", "Saludable"], ["neutral", "Vigilancia"], ["at_risk", "En riesgo"]])}
            ${renderInputField("Onboarding %", "onboardingPct", String(draft.onboardingPct ?? 0), { type: "number", min: 0, max: 100 })}
            ${renderInputField("Ultima actualizacion", "updated", draft.updated, { full: true, placeholder: "Se rellena automaticamente si lo dejas vacio" })}

            ${renderSelectField("Prioridad", "priority", draft.priority, Object.entries(TASK_PRIORITY_LABELS))}

      function upsertItem(collection, item) {
        const index = collection.findIndex((entry) => entry.id === item.id);
        if (index >= 0) {
          collection[index] = item;
        } else {
          collection.unshift(item);
        }
      }

      function saveProfileForm(formData) {
        DATA.user = {
          ...DATA.user,
          agencyName: String(formData.get("agencyName") || "").trim() || DEFAULT_DATA.user.agencyName,
          workspaceLabel: String(formData.get("workspaceLabel") || "").trim() || DEFAULT_DATA.user.workspaceLabel,
          name: String(formData.get("name") || "").trim() || DEFAULT_DATA.user.name,
          role: String(formData.get("role") || "").trim() || DEFAULT_DATA.user.role,
          email: String(formData.get("email") || "").trim()
        };
      }

      function saveLeadForm(formData, id) {
        const existing = getEntityItem("lead", id);
        const item = {
          id: id || createId("lead"),
          name: String(formData.get("name") || "").trim(),
          handle: String(formData.get("handle") || "").trim(),
          niche: String(formData.get("niche") || "").trim(),
          country: String(formData.get("country") || "").trim(),
          status: String(formData.get("status") || "new"),
          revenue: Number(formData.get("revenue") || 0),
          source: String(formData.get("source") || "").trim(),
          updated: String(formData.get("updated") || "").trim() || formatDateTimeLabel(),
          createdRank: existing?.createdRank || DATA.leads.length + 1
        };

        upsertItem(DATA.leads, item);
      }

      function saveCreatorForm(formData, id) {
        const existing = getEntityItem("creator", id);
        const onboardingPct = Math.min(100, Math.max(0, Number(formData.get("onboardingPct") || 0)));
        const stage = String(formData.get("stage") || "onboarding");

        const item = {
          id: id || createId("creator"),
          name: String(formData.get("name") || "").trim(),
          handle: String(formData.get("handle") || "").trim(),
          niche: String(formData.get("niche") || "").trim(),
          stage,
          tier: String(formData.get("tier") || "starter"),
          accountManager: String(formData.get("accountManager") || "").trim(),
          retention: String(formData.get("retention") || "healthy"),
          onboardingPct: stage === "onboarding" ? onboardingPct : 100,
          updated: String(formData.get("updated") || "").trim() || formatDateTimeLabel()
        };

        upsertItem(DATA.creators, item);

        if (existing && existing.name !== item.name) {
          DATA.onboardingBlocks = DATA.onboardingBlocks.map((block) =>
            block.creatorName === existing.name ? { ...block, creatorName: item.name } : block
          );
          DATA.contentPieces = DATA.contentPieces.map((piece) =>
            piece.creatorId === item.id ? { ...piece, creatorName: item.name } : piece
          );
          DATA.queue = DATA.queue.map((entry) =>
            entry.creatorId === item.id ? { ...entry, creatorName: item.name } : entry
          );
          DATA.metrics = DATA.metrics.map((metric) =>
            metric.creatorId === item.id ? { ...metric, creatorName: item.name } : metric
          );
        }
      }

      function saveTaskForm(formData, id) {
        const item = {
          id: id || createId("task"),
          title: String(formData.get("title") || "").trim(),
          description: String(formData.get("description") || "").trim(),
          priority: String(formData.get("priority") || "medium"),
          status: String(formData.get("status") || "pending"),
          owner: String(formData.get("owner") || "").trim(),
          type: String(formData.get("type") || "").trim() || "general",
          due: String(formData.get("due") || "").trim(),
          overdue: formData.get("overdue") === "on",
          tags: String(formData.get("tags") || "")
            .split(",")
            .map((tag) => tag.trim())
            .filter(Boolean)
        };

        upsertItem(DATA.tasks, item);
      }

      function saveEntityForm(form) {
        const formData = new FormData(form);
        const entity = form.dataset.entityForm;
        const id = form.dataset.id || "";

        if (entity === "profile") saveProfileForm(formData);
        if (entity === "lead") saveLeadForm(formData, id);
        if (entity === "creator") saveCreatorForm(formData, id);
        if (entity === "task") saveTaskForm(formData, id);

        queueSave();
      }

      function deleteEntityItem(entity, id) {
        if (entity === "lead") {
          DATA.leads = DATA.leads.filter((item) => item.id !== id);
        }

        if (entity === "task") {
          DATA.tasks = DATA.tasks.filter((item) => item.id !== id);
        }

        if (entity === "creator") {
          const creator = getEntityItem("creator", id);
          DATA.creators = DATA.creators.filter((item) => item.id !== id);

          if (creator) {
            DATA.onboardingBlocks = DATA.onboardingBlocks.filter((item) => item.creatorName !== creator.name);
            DATA.contentPieces = DATA.contentPieces.filter((item) => item.creatorId !== id);
            DATA.queue = DATA.queue.filter((item) => item.creatorId !== id);
            DATA.metrics = DATA.metrics.filter((item) => item.creatorId !== id);
          }
        }

        queueSave();
      }

          [lead.name, lead.handle, lead.niche, lead.country, lead.source].some((field) =>
            String(field || "").toLowerCase().includes(query)
          )
        );
      }

            || (state.taskStatus === "done" && task.status === "done")

      function isRecentSop(updated) {
        const [day, month, year] = updated.split("/").map(Number);
        if (!day || !month || !year) return false;
        const updatedDate = new Date(year, month - 1, day);
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        const diffMs = now - updatedDate;
        return diffMs <= 7 * 24 * 60 * 60 * 1000;
      }

      function getAnalyticsData() {
        const selectedMetrics = state.analyticsCreator === "all"
          ? DATA.metrics
          : DATA.metrics.filter((metric) => metric.creatorId === state.analyticsCreator);

        const periods = ["Jan", "Feb", "Mar", "Apr"];
        const timeSeries = periods.map((period) => {
          const periodMetrics = selectedMetrics.filter((metric) => metric.period === period);
          return {
            period,
            revenue: periodMetrics.reduce((sum, item) => sum + item.revenue, 0),
            margin: periodMetrics.reduce((sum, item) => sum + item.margin, 0)
          };
        });

        const latestMetrics = getLatestMetricsByCreator().sort((a, b) => b.revenue - a.revenue);
        const latestSelected = state.analyticsCreator === "all"
          ? {
              creatorName: "Roster",
              revenue: latestMetrics.reduce((sum, item) => sum + item.revenue, 0),
              margin: latestMetrics.reduce((sum, item) => sum + item.margin, 0),
              subs: latestMetrics.reduce((sum, item) => sum + item.subs, 0),
              messages: latestMetrics.reduce((sum, item) => sum + item.messages, 0),
              tips: latestMetrics.reduce((sum, item) => sum + item.tips, 0),
              chatRatio: latestMetrics.length
                ? latestMetrics.reduce((sum, item) => sum + item.chatRatio, 0) / latestMetrics.length
                : 0
            }
          : DATA.metrics.filter((metric) => metric.creatorId === state.analyticsCreator).slice(-1)[0]
            || {
              creatorName: "Sin datos",
              revenue: 0,
              margin: 0,
              subs: 0,
              messages: 0,
              tips: 0,
              chatRatio: 0
            };

        return { timeSeries, latestMetrics, latestSelected };
      }

      function renderScaling() {
        const activeCount = DATA.creators.filter((creator) => creator.stage === "active").length;
        const onboardingCount = DATA.creators.filter((creator) => creator.stage === "onboarding").length;
        const blockedCount = DATA.onboardingBlocks.length;
        const criticalOverdue = DATA.tasks.filter((task) => task.priority === "critical" && task.overdue && task.status !== "done");
        const backlogCount = DATA.contentPieces.filter((piece) => ["idea", "scripted"].includes(piece.status)).length;
        const atRisk = getAtRiskCreators();
        const readinessScore = Math.max(
          0,
          100 - (blockedCount * 12) - (criticalOverdue.length * 18) - (Math.max(backlogCount - 8, 0) * 3) - (atRisk.length * 20)
        );
        const warnings = [
          { key: "blocked", label: "Bloqueos de onboarding", count: blockedCount, threshold: 2, details: DATA.onboardingBlocks.map((item) => `${item.title} · ${item.creatorName}`) },
          { key: "critical", label: "Tareas criticas vencidas", count: criticalOverdue.length, threshold: 1, details: criticalOverdue.map((task) => `${task.title} · ${task.owner}`) },
          { key: "backlog", label: "Contenido en backlog", count: backlogCount, threshold: 10, details: ["Ideas y scripts pendientes de producir."] },
          { key: "risk", label: "Perfiles en riesgo", count: atRisk.length, threshold: 1, details: atRisk.map((creator) => `${creator.name} · revisar retencion`) }
        ];
        const hasWarnings = warnings.some((warning) => warning.count > warning.threshold);

        return `
          <section class="section">
            <article class="readiness ${hasWarnings ? "" : "ok"}">
              <div>
                <h3>${hasWarnings ? "No abras nuevo funnel todavia" : "El sistema tiene margen para escalar"}</h3>

                    <div class="warning-card-head">
                      <div>
                        <strong>${warning.label}</strong>
                        <p>Limite sano ${warning.threshold} · actual ${warning.count}</p>
                      </div>
                      <div class="warning-count" style="color:${ok ? "#96edca" : "#ffc1c9"};">${warning.count}</div>
                    </div>
                    ${!ok ? `
                      <div class="detail-list">
                        ${warning.details.slice(0, 3).map((detail) => `
                          <div class="detail-item">
                            <span class="detail-bullet"></span>
                            <span>${escapeHtml(detail)}</span>
                          </div>
                        `).join("")}
                      </div>
                    ` : ""}
                  </article>
                `;
              }).join("")}

            ${hasWarnings ? `

                    <span>Orden sugerido para recuperar capacidad operativa</span>

                    <div class="badge tone-info">${iconSlot("check")}</div>
                    <div>
                      <strong>Contener churn antes de escalar</strong>
                      <p>Haz seguimiento de retencion y conversion antes de seguir sumando volumen al sistema.</p>
                    </div>
                  </button>
                </div>
              </article>
            ` : ""}
          </section>
        `;
      }

      const VIEW_RENDERERS = {
        dashboard: renderDashboard,
        leads: renderLeads,
        creators: renderCreators,
        content: renderContent,
        tasks: renderTasks,
        sops: renderSops,
        analytics: renderAnalytics,
        scaling: renderScaling
      };

      function renderMainContent() {
        const renderer = VIEW_RENDERERS[state.view] || renderDashboard;
        return renderer();
      }

      function renderModal() {
        if (state.activeForm) {
          return renderFormModal();
        }

        if (!state.activeSopId) return "";
        const sop = DATA.sops.find((item) => item.id === state.activeSopId);
        if (!sop) return "";

        return `
          <div class="modal-backdrop" data-action="close-modal">
            <div class="modal" role="dialog" aria-modal="true" aria-labelledby="sop-modal-title" tabindex="-1">
              <div class="modal-header">
                <div>
                  <h3 id="sop-modal-title">${escapeHtml(sop.title)}</h3>
                  <div style="margin-top:8px;">${badge(SOP_DEPARTMENT_LABELS[sop.department], toneForDepartment(sop.department))} ${badge(`v${sop.version}`, "default")}</div>
                </div>
                <button class="icon-button" data-action="close-modal" aria-label="Cerrar SOP">${iconSlot("close")}</button>
              </div>
              <div class="modal-body">
                <div class="doc-block">
                  <strong>Cuando usarlo</strong>
                  <div class="muted">${escapeHtml(SOP_USE_CASES[sop.department])}</div>
                </div>
                <div class="doc-block">
                  <strong>Resumen operativo</strong>
                  <div class="muted">${escapeHtml(sop.summary)}</div>
                </div>
                <div class="doc-block">
                  <strong>Referencia interna</strong>
                  <div class="muted">${escapeHtml(sop.docRef)}</div>
                </div>
                <div class="dim">Actualizado el ${escapeHtml(sop.updated)}</div>
              </div>
            </div>
          </div>
        `;
      }

      function render(options = {}) {
        document.body.classList.toggle("sidebar-open", state.mobileNav);
        document.body.classList.toggle("sidebar-collapsed", state.sidebarCollapsed);
        document.body.classList.toggle("modal-open", Boolean(state.activeSopId || state.activeForm));

        document.getElementById("app").innerHTML = `
          <button class="overlay" data-action="close-sidebar" aria-label="Cerrar navegacion lateral"></button>
          <div class="app-shell">
            ${renderSidebar()}
            <main class="main-panel" id="main-content" tabindex="-1">
              ${renderTopbar()}
              ${renderMainContent()}
            </main>
          </div>
          ${renderModal()}
        `;

        if (state.activeForm) {
          focusElement({ focusSelector: '.modal input:not([type="checkbox"]), .modal select, .modal textarea, .modal button' });
          return;
        }

        if (state.activeSopId) {
          focusElement({ focusSelector: '.modal [data-action="close-modal"]' });
          return;
        }

        focusElement(options);
      }

      document.addEventListener("click", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;

        const { action, value, id, mode } = target.dataset;

        switch (action) {
          case "toggle-sidebar":
            setState({ mobileNav: !state.mobileNav });
            return;
          case "close-sidebar":
            setState({ mobileNav: false }, { focusSelector: ".mobile-toggle" });
            return;
          case "toggle-sidebar-collapsed":
            setState({ sidebarCollapsed: !state.sidebarCollapsed });
            return;
          case "set-view":
            setState({ view: value, mobileNav: false, activeSopId: null, activeForm: null });
            return;
          case "set-leads-view":
            setState({ leadsView: value });
            return;
          case "set-creator-stage":
            setState({ creatorStage: value });
            return;
          case "set-content-tab":
            setState({ contentTab: value });
            return;
          case "set-content-creator":
            setState({ contentCreator: value });
            return;
          case "set-content-type":
            setState({ contentType: value });
            return;
          case "set-task-status":
            setState({ taskStatus: value });
            return;
          case "set-task-priority":
            setState({ taskPriority: value });
            return;
          case "set-sop-department":
            setState({ sopDepartment: value });
            return;
          case "set-analytics-creator":
            setState({ analyticsCreator: value });
            return;
          case "reset-view-filters":
            resetViewFilters(value);
            return;
          case "open-form":
            modalReturnFocusSelector = `[data-action="open-form"][data-value="${value}"][data-mode="${mode || "create"}"]${id ? `[data-id="${id}"]` : ""}`;
            setState({
              activeSopId: null,
              activeForm: {
                entity: value,
                mode: mode || "create",
                id: id || ""
              }
            });
            return;
          case "open-sop":
            modalReturnFocusSelector = `[data-action="open-sop"][data-id="${id}"]`;
            setState({ activeSopId: id, activeForm: null });
            return;
          case "delete-item": {
            const label = value === "lead" ? "cliente" : value === "creator" ? "perfil" : "tarea";
            if (!window.confirm(`Quieres borrar este ${label}? Esta accion no se puede deshacer.`)) {
              return;
            }

            deleteEntityItem(value, id);

            if (state.activeForm && state.activeForm.id === id) {
              closeModal();
            } else {
              render({ focusId: VIEW_FOCUS_IDS[state.view] || null });
            }
            return;
          }
          case "close-modal":
            if (target.classList.contains("modal-backdrop") && event.target !== target) {
              return;
            }
            closeModal();
            return;
          default:
            return;
        }
      });

      document.addEventListener("submit", (event) => {
        const form = event.target.closest("form[data-entity-form]");
        if (!form) return;

        event.preventDefault();
        saveEntityForm(form);
        closeModal();
      });

      document.addEventListener("input", (event) => {
        const target = event.target;

        if (target.id === "leads-search") {
          setState({ leadsSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "creators-search") {
          setState({ creatorsSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "task-search") {
          setState({ taskSearch: target.value }, { focusId: target.id });
        }
        if (target.id === "sop-search") {
          setState({ sopSearch: target.value }, { focusId: target.id });
        }
      });

      document.addEventListener("change", (event) => {
        const target = event.target;
        const taskId = target.dataset ? target.dataset.taskSelect : null;
        if (!taskId) return;

        const task = DATA.tasks.find((item) => item.id === taskId);
        if (!task) return;

        task.status = target.value;
        queueSave();
        render({ focusSelector: `[data-task-select="${taskId}"]` });
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && (state.activeSopId || state.activeForm)) {
          closeModal();
          return;
        }

        if (event.key === "Escape" && state.mobileNav) {
          setState({ mobileNav: false }, { focusSelector: ".mobile-toggle" });
          return;
        }

        if (event.key === "Tab" && (state.activeSopId || state.activeForm)) {
          const modal = document.querySelector(".modal");
          if (!modal) return;

          const focusable = Array.from(
            modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])')
          ).filter((element) => !element.hasAttribute("disabled"));

          if (!focusable.length) return;

          const first = focusable[0];
          const last = focusable[focusable.length - 1];

          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        }
      });

      window.addEventListener("resize", () => {
        if (window.innerWidth > 1024 && state.mobileNav) {
          state.mobileNav = false;
          render();
        }
      });

      async function boot() {
        hydrateData();
        hydrateState();
        render();

        await loadRemoteData();

        hasHydratedApp = true;
        render();

        if (pendingRemoteSave) {
          queueSave(0);
        }
      }

      boot().catch((error) => {
        console.error("Error arrancando la app:", error);
        hasHydratedApp = true;
        setSyncStatus("error");
        render();
      });
    </script>
  </body>
</html>
